        <button type="button" class="btn-quick" id="lq-pm"     onclick="pickLeavePreset('pm')">下午</button>
        <button type="button" class="btn-quick" id="lq-custom" onclick="pickLeavePreset('custom')">零計</button>
      </div>
    </div>
    <div style="display:flex;gap:10px">
      <div class="ff" style="flex:1"><label>開始時間（24h）</label>
        <input type="text" id="lf-start" inputmode="numeric" maxlength="5" placeholder="08:30" oninput="fmtTimeInput(this);markLeaveCustom();updateLeaveCalc()"></div>
      <div class="ff" style="flex:1"><label>結束時間（24h）</label>
        <input type="text" id="lf-end" inputmode="numeric" maxlength="5" placeholder="18:00" oninput="fmtTimeInput(this);markLeaveCustom();updateLeaveCalc()"></div>
    </div>
    <div id="lf-calc" style="background:#f1f3f4;border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:12px">請選擇預計請假時段</div>
    <div class="ff"><label>申請原因</label>
      <textarea id="lf-reason" rows="3" placeholder="請填寫請假原因">${editing ? escHtml(lv.reason) : ''}</textarea></div>
    <div class="ff"><label>證明照片${photoNote}</label>
      <input type="file" id="lf-photo" accept="image/*" style="font-size:13px"></div>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="closeModal()">取消</button>
      <button class="btn" onclick="saveLeave()">${editing ? '更新並重新送審' : '送出申請'}</button>
    </div>
    <div style="font-size:11px;color:#999;margin-top:8px">${shiftNote}</div>`, true);
  _LF_SHIFT = sh;
  updateLeaveDay();
  if (editing) {
    document.getElementById('lf-start').value = lv.start_time || '';
    document.getElementById('lf-end').value   = lv.end_time   || '';
    updateLeaveCalc();
  } else {
    pickLeavePreset('full');
  }
}

function updateLeaveDay() {
  const v = document.getElementById('lf-date')?.value;
  const span = document.getElementById('lf-date-day');
  if (v && span) {
    const days = ['日','一','二','三','四','五','六'];
    span.textContent = `(${days[new Date(v).getDay()]})`;
  }
}

function pickLeavePreset(kind) {
  const sh = _LF_SHIFT || { am:['08:30','12:30'], pm:['14:00','18:00'] };
  const s = document.getElementById('lf-start');
  const e = document.getElementById('lf-end');
  if (kind === 'full')        { s.value = sh.am[0]; e.value = sh.pm[1]; }
  else if (kind === 'am')     { s.value = sh.am[0]; e.value = sh.am[1]; }
  else if (kind === 'pm')     { s.value = sh.pm[0]; e.value = sh.pm[1]; }
  else if (kind === 'custom') { s.value = ''; e.value = ''; }
  ['full','am','pm','custom'].forEach(k =>
    document.getElementById('lq-'+k)?.classList.toggle('active', k === kind));
  updateLeaveCalc();
}

function markLeaveCustom() {
  ['full','am','pm'].forEach(k => document.getElementById('lq-'+k)?.classList.remove('active'));
  document.getElementById('lq-custom')?.classList.add('active');
}

function updateLeaveCalc() {
  const s = document.getElementById('lf-start')?.value;
  const e = document.getElementById('lf-end')?.value;
  const box = document.getElementById('lf-calc');
  if (!box) return;
  const hrs = calcLeaveHours(s, e);
  if (!hrs) {
    box.textContent = (s && e) ? '⚠️ 時間區間無效' : '請選擇預計請假時段';
    box.dataset.hours = ''; box.dataset.days = '';
    return;
  }
  const shiftHours = _LF_SHIFT?.hours || 8;
  const days = hrs / shiftHours;
  const dayTxt = days >= 1 ? `（共 ${days % 1 === 0 ? days : days.toFixed(2)} 天）` : '';
  box.innerHTML = `本次請假 <b>${hrs}</b> 小時${dayTxt}`;
  box.dataset.hours = hrs;
  box.dataset.days = days.toFixed(2);
}

async function saveLeave() {
  const type   = document.getElementById('lf-type').value;
  const date   = document.getElementById('lf-date').value;
  const start  = document.getElementById('lf-start').value;
  const end    = document.getElementById('lf-end').value;
  const reason = document.getElementById('lf-reason').value.trim();
  const box    = document.getElementById('lf-calc');
  const hours  = box?.dataset.hours;
  const days   = box?.dataset.days;
  if (!date) { toast('請選擇請假日期', 'red'); return; }
  if (!start || !end) { toast('請填寫開始與結束時間', 'red'); return; }
  if (!hours || Number(hours) <= 0) { toast('時間區間無效', 'red'); return; }
  const F = CONFIG.FID.L;
  const photoFile = document.getElementById('lf-photo')?.files?.[0];
  const fields = {
    [F.email]:      ME.email,
    [F.name]:       MY_WORKER?.name || ME.name,
    [F.leave_type]: type,
    [F.start_date]: date.replace(/-/g,'/'),
    [F.start_time]: start,
    [F.end_time]:   end,
    [F.hours]:      hours,
    [F.days]:       days,
    [F.reason]:     reason,
    [F.apply_time]: fmtDateTime(new Date()),  // 以最後送出時間為準
    [F.status]:     'pending'
  };
  const editing = !!_LF_EDIT_ID;
  try {
    let ragicId;
    if (editing) {
      await ragicPost(CONFIG.SHEETS.LEAVES + '/' + _LF_EDIT_ID, fields);
      ragicId = _LF_EDIT_ID;
    } else {
      ragicId = await ragicPost(CONFIG.SHEETS.LEAVES, fields);
    }
    if (photoFile && ragicId && CONFIG.FID.L.photo) {
      toast('上傳照片中…', 'green');
      await uploadLeavePhoto(ragicId, photoFile);
    }
    _LF_EDIT_ID = null;
    closeModal(); toast(editing ? '已更新 ✓' : '請假申請已送出 ✓', 'green'); viewLeave();
  } catch(e) { toast('送出失敗：' + e.message, 'red'); }
}

function showLeaveApproval(ragicId) {
  openModal(`
    <div class="modal-title">審核請假申請</div>
    <div class="ff"><label>駁回原因（核准可留空）</label>
      ${rejectPresetBtns('la-note')}
      <textarea id="la-note" rows="3" placeholder="選填，駁回時請填寫原因"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="closeModal()">取消</button>
      <button class="btn" style="background:#ea4335" onclick="doLeaveReview(${ragicId},'rejected')">駁回</button>
      <button class="btn" onclick="doLeaveReview(${ragicId},'approved')">核准</button>
    </div>`, true);
}

async function doLeaveReview(ragicId, decision) {
  const note = document.getElementById('la-note')?.value.trim() || '';
  if (decision === 'rejected' && !note) { toast('請填寫駁回原因', 'red'); return; }
  const F = CONFIG.FID.L;
  try {
    await ragicPost(CONFIG.SHEETS.LEAVES + '/' + ragicId, {
      [F.status]:      decision,
      [F.reviewed_by]: ME.email,
      [F.reviewed_at]: fmtDateTime(new Date()),
      [F.reject_note]: note
    });
    closeModal(); toast(decision === 'approved' ? '已核准 ✓' : '已駁回', 'green'); viewAdminLeave();
  } catch(e) { toast('審核失敗：' + e.message, 'red'); }
}

// ═══════════════════════════════════════════════════════════════════════
//  加班 / 補休（正職員工）
// ═══════════════════════════════════════════════════════════════════════

const OT_TYPES = ['加班','補休'];
let _MY_OT = [];
let _OF_SHIFT = null, _OF_EDIT_ID = null;

function parseOtRec(r) {
  const F = CONFIG.FID.O;
  return {
    ragicId:     r._ragicId,
    email:       r[F.email]       || '',
    name:        r[F.name]        || '',
    ot_type:     r[F.ot_type]     || '',
    date:        (r[F.date]       || '').slice(0,10).replace(/-/g,'/'),
    start_time:  stripSec(r[F.start_time]) || '',
    end_time:    stripSec(r[F.end_time])   || '',
    hours:       r[F.hours]       || '',
    reason:      r[F.reason]      || '',
    apply_time:  r[F.apply_time]  || '',
    status:      r[F.status]      || 'pending',
    reviewed_by: r[F.reviewed_by] || '',
    reviewed_at: r[F.reviewed_at] || '',
    reject_note: r[F.reject_note] || ''
  };
}

async function getMyOt() {
  const F = CONFIG.FID.O;
  const all = await ragicGet(CONFIG.SHEETS.OVERTIME, { where:`${F.email},eq,${ME.email}` });
  return all.map(parseOtRec).filter(o => o.status !== 'cancelled').sort((a,b) => b.apply_time.localeCompare(a.apply_time));
}
async function getAllOt() {
  const all = await ragicGet(CONFIG.SHEETS.OVERTIME);
  return all.map(parseOtRec).filter(o => o.status !== 'cancelled').sort((a,b) => b.apply_time.localeCompare(a.apply_time));
}

function minToStr(m) { return `${pad(Math.floor(m/60))}:${pad(m%60)}`; }
// 加班時數：單純 end−start，不扣午休（午休加班是真的在工作）
function calcRawHours(s, e) {
  if (!s || !e) return 0;
  const m = toMin(e) - toMin(s);
  return m > 0 ? Math.round(m / 60 * 100) / 100 : 0;
}

// 依類型渲染快捷按鈕：加班=早晨/中午/下午，補休=整天/上午/下午/零計
function renderOtPresets() {
  const type = document.getElementById('of-type')?.value;
  const box = document.getElementById('of-presets');
  if (!box) return;
  if (type === '加班') {
    box.innerHTML =
      `<button type="button" class="btn-quick" onclick="pickOtPreset('morning')">早晨</button>
       <button type="button" class="btn-quick" onclick="pickOtPreset('noon')">中午</button>
       <button type="button" class="btn-quick" onclick="pickOtPreset('evening')">下午</button>`;
  } else {
    box.innerHTML =
      `<button type="button" class="btn-quick" onclick="pickOtPreset('full')">整天</button>
       <button type="button" class="btn-quick" onclick="pickOtPreset('am')">上午</button>
       <button type="button" class="btn-quick" onclick="pickOtPreset('pm')">下午</button>
       <button type="button" class="btn-quick" onclick="pickOtPreset('custom')">零計</button>`;
  }
}

// 補休餘額：已核准加班時數 − 已核准補休時數
function calcOtBalance(records) {
  let bal = 0;
  records.forEach(o => {
    if (o.status !== 'approved') return;
    const h = parseFloat(o.hours) || 0;
    if (o.ot_type === '加班') bal += h;
    else if (o.ot_type === '補休') bal -= h;
  });
  return Math.round(bal * 100) / 100;
}

function buildOtCard(ot, isAdmin) {
  const stCls = { pending:'st-pending', approved:'st-approved', rejected:'st-rejected' }[ot.status] || '';
  const stBadge = `<span class="b-${ot.status}">${LEAVE_STATUS[ot.status] || ot.status}</span>`;
  const nameTag = isAdmin ? `<span class="leave-name">${escHtml(ot.name)}</span>` : '';
  const typeColor = ot.ot_type === '加班' ? '#1a73e8' : '#9333ea';
  const rejectNote = ot.reject_note ? `<div class="leave-note">駁回原因：${escHtml(ot.reject_note)}</div>` : '';
  const adminBtn = isAdmin && ot.status === 'pending'
    ? `<button class="btn btn-sm" style="padding:5px 12px;font-size:12px" onclick="showOtApproval(${ot.ragicId})">審核</button>` : '';
  const ownerEdit = isAdmin ? '' :
    ot.status === 'pending'
      ? `<button class="btn btn-sm" style="padding:5px 12px;font-size:12px;background:#e8f0fe;color:#1a73e8;border:none;border-radius:8px;cursor:pointer" onclick="editMyOt(${ot.ragicId})">編輯</button>`
      : ot.status === 'rejected'
      ? `<button class="btn btn-sm" style="padding:5px 12px;font-size:12px;background:#e8f0fe;color:#1a73e8;border:none;border-radius:8px;cursor:pointer" onclick="editMyOt(${ot.ragicId})">重新申請</button>
         <button class="btn btn-sm" style="padding:5px 12px;font-size:12px;background:#fce8e6;color:#ea4335;border:none;border-radius:8px;cursor:pointer" onclick="cancelMyOt(${ot.ragicId})">取消</button>`
      : '';
  const timeRange = (ot.start_time && ot.end_time) ? `${ot.start_time}–${ot.end_time}` : '';
  const ap = ot.apply_time || '';
  const applyTxt = ap ? `${addDay(ap)} ${ap.slice(11,16)}` : '—';
  return `
    <div class="leave-card ${stCls}">
      <div class="leave-hd">
        <div class="leave-hd-left">
          ${nameTag}
          <span class="leave-type" style="color:${typeColor}">${ot.ot_type}</span>
          <span class="leave-date-main">${addDay(ot.date)}${timeRange ? ' '+timeRange : ''}</span>
        </div>
        <div class="leave-hd-right">
          <span class="leave-days">${parseFloat(ot.hours)||0} 小時</span>
          ${stBadge}${adminBtn}${ownerEdit}
        </div>
      </div>
      <div class="leave-reason">${escHtml(ot.reason)}</div>
      ${rejectNote}
      <div class="leave-apply">申請：${applyTxt}</div>
    </div>`;
}

function editMyOt(id) { const o = _MY_OT.find(x => x.ragicId === id); if (o) showOtForm(o); }

async function cancelMyOt(id) {
  if (!confirm('確定取消此次申請？取消後不可復原。')) return;
  try {
    await ragicPost(CONFIG.SHEETS.OVERTIME + '/' + id, { [CONFIG.FID.O.status]: 'cancelled' });
    toast('已取消申請', 'green'); viewOt();
  } catch(e){ toast('取消失敗：' + e.message, 'red'); }
}

async function viewOt() {
  setView('<div class="loading">載入中…</div>');
  try {
    const list = await getMyOt();
    _MY_OT = list;
    const bal = calcOtBalance(list);
    const cards = list.map(o => buildOtCard(o, false)).join('');
    setView(`<div class="view">
      <div class="ot-balance">補休餘額　<b>${bal}</b> 小時</div>
      <button class="btn btn-full" style="margin-bottom:14px" onclick="showOtForm()">＋ 申請加班 / 補休</button>
      ${cards || '<p style="color:#999;text-align:center;margin-top:30px">尚無申請紀錄</p>'}
    </div>`);
  } catch(e){ setView(`<div class="view"><div class="err-box">${e.message}</div></div>`); }
}

async function viewAdminOt() {
  setView('<div class="loading">載入中…</div>');
  try {
    const list = await getAllOt();
    const pending = list.filter(o => o.status === 'pending');
    const others  = list.filter(o => o.status !== 'pending');
    let h = '<div class="view">';
    if (pending.length) {
      h += `<div style="font-size:13px;font-weight:600;color:#f59e0b;margin-bottom:8px">待審核（${pending.length}）</div>`;
      h += pending.map(o => buildOtCard(o, true)).join('');
      h += `<div style="height:1px;background:#eee;margin:14px 0"></div>`;
    }
    if (others.length) {
      h += `<div style="font-size:13px;font-weight:600;color:#999;margin-bottom:8px">已處理</div>`;
      h += others.map(o => buildOtCard(o, true)).join('');
    }
    if (!list.length) h += '<p style="color:#999;text-align:center;margin-top:30px">尚無加班/補休申請</p>';
    setView(h + '</div>');
  } catch(e){ setView(`<div class="view"><div class="err-box">${e.message}</div></div>`); }
}

function showOtForm(ot) {
  const editing = !!ot;
  _OF_EDIT_ID = editing ? ot.ragicId : null;
  const today = editing ? (ot.date||'').slice(0,10).replace(/\//g,'-') : fmtDate(new Date()).replace(/\//g,'-');
  const shift = MY_WORKER?.shift || '';
  _OF_SHIFT = CONFIG.SHIFTS[shift] || { am:['08:30','12:30'], pm:['14:00','18:00'], hours:8 };
  const bal = calcOtBalance(_MY_OT);
  openModal(`
    <div class="modal-title">${editing ? '編輯申請' : '申請加班 / 補休'}</div>
    <div class="ff"><label>類型</label>
      <select id="of-type" onchange="renderOtPresets();updateOtCalc()">
        ${OT_TYPES.map(t => `<option ${editing && ot.ot_type===t ? 'selected':''}>${t}</option>`).join('')}
      </select>
      <div style="font-size:11px;color:#999;margin-top:4px">補休餘額：${bal} 小時（加班核准後累積，補休核准後扣除）</div>
    </div>
    <div class="ff"><label>日期</label>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="date" id="of-date" value="${today}" onchange="updateOtDay()" style="width:auto">
        <span id="of-date-day" style="color:#1a73e8;font-size:16px;font-weight:700"></span>
      </div>
    </div>
    <div class="ff"><label>快捷時段</label>
      <div id="of-presets" style="display:flex;gap:6px"></div>
    </div>
    <div style="display:flex;gap:10px">
      <div class="ff" style="flex:1"><label>開始時間（24h）</label>
        <input type="text" id="of-start" inputmode="numeric" maxlength="5" placeholder="18:00" oninput="fmtTimeInput(this);updateOtCalc()"></div>
      <div class="ff" style="flex:1"><label>結束時間（24h）</label>
        <input type="text" id="of-end" inputmode="numeric" maxlength="5" placeholder="20:00" oninput="fmtTimeInput(this);updateOtCalc()"></div>
    </div>
    <div id="of-calc" style="background:#f1f3f4;border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:12px">請填寫時間</div>
    <div class="ff"><label>原因</label>
      <textarea id="of-reason" rows="3" placeholder="請填寫加班 / 補休原因">${editing ? escHtml(ot.reason) : ''}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="closeModal()">取消</button>
      <button class="btn" onclick="saveOt()">${editing ? '更新並重新送審' : '送出申請'}</button>
    </div>`, true);
  updateOtDay();
  renderOtPresets();
  if (editing) {
    document.getElementById('of-start').value = ot.start_time || '';
    document.getElementById('of-end').value   = ot.end_time   || '';
  }
  updateOtCalc();
}

function updateOtDay() {
  const v = document.getElementById('of-date')?.value, span = document.getElementById('of-date-day');
  if (v && span) { const d = ['日','一','二','三','四','五','六']; span.textContent = `(${d[new Date(v).getDay()]})`; }
}
function pickOtPreset(kind) {
  const sh = _OF_SHIFT || { am:['08:30','12:30'], pm:['14:00','18:00'] };
  const s = document.getElementById('of-start'), e = document.getElementById('of-end');
  // 加班時段
  if (kind === 'morning')      { s.value = minToStr(toMin(sh.am[0]) - 60); e.value = sh.am[0]; }  // 上班前1小時
  else if (kind === 'noon')    { s.value = sh.am[1]; e.value = sh.pm[0]; }                        // 午休 12:30–14:00
  else if (kind === 'evening') { s.value = sh.pm[1]; e.value = minToStr(toMin(sh.pm[1]) + 30); }  // 下班後
  // 補休時段
  else if (kind === 'full')    { s.value = sh.am[0]; e.value = sh.pm[1]; }
  else if (kind === 'am')      { s.value = sh.am[0]; e.value = sh.am[1]; }
  else if (kind === 'pm')      { s.value = sh.pm[0]; e.value = sh.pm[1]; }
  else                         { s.value = ''; e.value = ''; }
  updateOtCalc();
}
function updateOtCalc() {
  const s = document.getElementById('of-start')?.value, e = document.getElementById('of-end')?.value;
  const box = document.getElementById('of-calc'); if (!box) return;
  const type = document.getElementById('of-type')?.value;
  // 加班不扣午休；補休扣午休
  const hrs = type === '加班' ? calcRawHours(s, e) : calcLeaveHours(s, e);
  if (!hrs) { box.textContent = (s && e) ? '⚠️ 時間區間無效' : '請填寫時間'; box.dataset.hours = ''; return; }
  let msg = `本次 <b>${hrs}</b> 小時`;
  if (type === '補休') {
    const bal = calcOtBalance(_MY_OT);
    msg += `（補休餘額 ${bal} 小時）`;
    if (!Number.isInteger(hrs)) msg += ` <span style="color:#ea4335">需整數小時</span>`;
    else if (hrs > bal) msg += ` <span style="color:#ea4335">超過餘額！</span>`;
  }
  box.innerHTML = msg; box.dataset.hours = hrs;
}
async function saveOt() {
  const type   = document.getElementById('of-type').value;
  const date   = document.getElementById('of-date').value;
  const start  = document.getElementById('of-start').value;
  const end    = document.getElementById('of-end').value;
  const reason = document.getElementById('of-reason').value.trim();
  const hours  = document.getElementById('of-calc')?.dataset.hours;
  if (!date) { toast('請選擇日期', 'red'); return; }
  if (!start || !end) { toast('請填寫時間', 'red'); return; }
  if (!hours || Number(hours) <= 0) { toast('時間區間無效', 'red'); return; }
  if (type === '補休') {
    if (!Number.isInteger(Number(hours))) {
      toast('補休需以整數小時為單位申請（例如 1、2、3 小時）', 'red'); return;
    }
    if (Number(hours) > calcOtBalance(_MY_OT)) {
      toast(`補休時數超過餘額（${calcOtBalance(_MY_OT)} 小時）`, 'red'); return;
    }
  }
  const F = CONFIG.FID.O;
  const fields = {
    [F.email]:      ME.email,
    [F.name]:       MY_WORKER?.name || ME.name,
    [F.ot_type]:    type,
    [F.date]:       date.replace(/-/g,'/'),
    [F.start_time]: start,
    [F.end_time]:   end,
    [F.hours]:      hours,
    [F.reason]:     reason,
    [F.apply_time]: fmtDateTime(new Date()),
    [F.status]:     'pending'
  };
  const editing = !!_OF_EDIT_ID;
  try {
    if (editing) await ragicPost(CONFIG.SHEETS.OVERTIME + '/' + _OF_EDIT_ID, fields);
    else         await ragicPost(CONFIG.SHEETS.OVERTIME, fields);
    _OF_EDIT_ID = null;
    closeModal(); toast(editing ? '已更新 ✓' : '申請已送出 ✓', 'green'); viewOt();
  } catch(e){ toast('送出失敗：' + e.message, 'red'); }
}
function showOtApproval(id) {
  openModal(`
    <div class="modal-title">審核加班 / 補休</div>
    <div class="ff"><label>駁回原因（核准可留空）</label>
      ${rejectPresetBtns('oa-note')}
      <textarea id="oa-note" rows="3" placeholder="駁回時請填寫原因"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="closeModal()">取消</button>
      <button class="btn" style="background:#ea4335" onclick="doOtReview(${id},'rejected')">駁回</button>
      <button class="btn" onclick="doOtReview(${id},'approved')">核准</button>
    </div>`, true);
}
async function doOtReview(id, decision) {
  const note = document.getElementById('oa-note')?.value.trim() || '';
  if (decision === 'rejected' && !note) { toast('請填寫駁回原因', 'red'); return; }
  const F = CONFIG.FID.O;
  try {
    await ragicPost(CONFIG.SHEETS.OVERTIME + '/' + id, {
      [F.status]:      decision,
      [F.reviewed_by]: ME.email,
      [F.reviewed_at]: fmtDateTime(new Date()),
      [F.reject_note]: note
    });
    closeModal(); toast(decision === 'approved' ? '已核准 ✓' : '已駁回', 'green'); viewAdminOt();
  } catch(e){ toast('審核失敗：' + e.message, 'red'); }
}

// ═══════════════════════════════════════════════════════════════════════
//  ANNOUNCEMENTS
// ═══════════════════════════════════════════════════════════════════════

async function getAllAnnouncements() {
  const all = await ragicGet(CONFIG.SHEETS.ANNOUNCE);
  const F = CONFIG.FID.A;
  return all
    .map(r => ({
      ragicId:   r._ragicId,
      title:     r[F.title]     || '',
      content:   r[F.content]   || '',
      pub_date:  r[F.pub_date]  || '',
      priority:  r[F.priority]  || '一般',
      publisher: r[F.publisher] || '',
      read_by:   r[F.read_by]   || ''
    }))
    .sort((a, b) => (b.pub_date > a.pub_date ? 1 : -1));
}

function buildAnnCard(ann, isAdmin) {
  const pri = ann.priority || '一般';
  const isRead = ann.read_by.split(',').map(s => s.trim()).includes(ME.email);
  const readBtn = isRead
    ? `<span class="read-tag">✓ 已閱覽</span>`
    : `<button class="btn-read" onclick="markAnnouncementRead(${ann.ragicId},this)">標記已閱覽</button>`;
  const adminBtns = isAdmin
    ? `<button class="btn btn-sm" style="padding:5px 12px;font-size:12px" onclick="showAnnForm(${ann.ragicId})">編輯</button>`
    : '';
  const uid = `ann-${ann.ragicId}`;
  return `
    <div class="ann-card pri-${pri}${isRead ? ' read' : ''}" id="${uid}">
      <div class="ann-hd">
        <span class="ann-badge pri-${pri}">${pri}</span>
        <div class="ann-title">${escHtml(ann.title)}</div>
        <span class="ann-date-right">${addDay(ann.pub_date)} ‧ 發布</span>
      </div>
      <div class="ann-content collapsed" id="${uid}-body">${escHtml(ann.content)}</div>
      <div class="ann-footer">
        <button class="btn-expand" id="${uid}-toggle" onclick="toggleAnnContent('${uid}')">▼ 展開全文</button>
        <div style="display:flex;gap:8px;align-items:center">${readBtn}${adminBtns}</div>
      </div>
    </div>`;
}

function toggleAnnContent(uid) {
  const body = document.getElementById(uid + '-body');
  const btn  = document.getElementById(uid + '-toggle');
  if (!body) return;
  const collapsed = body.classList.toggle('collapsed');
  btn.textContent = collapsed ? '▼ 展開全文' : '▲ 收合';
}

async function viewAnnounce() {
  setView('<div class="loading">載入中…</div>');
  try {
    const anns = await getAllAnnouncements();
    if (!anns.length) {
      setView('<div class="view"><p style="color:#999;text-align:center;margin-top:40px">目前沒有公告</p></div>');
      return;
    }
    setView(`<div class="view"><div class="ann-list">${anns.map(a => buildAnnCard(a, false)).join('')}</div></div>`);
  } catch (e) { setView(`<div class="view"><div class="err-box">${e.message}</div></div>`); }
}

async function viewAdminAnnounce() {
  setView('<div class="loading">載入中…</div>');
  try {
    const anns = await getAllAnnouncements();
    const list = anns.map(a => buildAnnCard(a, true)).join('');
    setView(`<div class="view">
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
        <button class="btn" onclick="showAnnForm()">＋ 新增公告</button>
      </div>
      <div class="ann-list">${list || '<p style="color:#999;text-align:center">尚無公告</p>'}</div>
    </div>`);
  } catch (e) { setView(`<div class="view"><div class="err-box">${e.message}</div></div>`); }
}

async function markAnnouncementRead(ragicId, btn) {
  btn.disabled = true;
  btn.textContent = '處理中…';
  try {
    const F = CONFIG.FID.A;
    const keyParam = CONFIG.RAGIC_KEY ? `&APIKey=${encodeURIComponent(CONFIG.RAGIC_KEY)}` : '';
    const res = await fetch(`${ragicUrl(CONFIG.SHEETS.ANNOUNCE)}/${ragicId}?api${keyParam}`);
    const data = await res.json();
    const rec = Object.values(data).find(r => r && r._ragicId == ragicId);
    const cur = (rec?.['已閱覽名單'] || '').trim();
    const emails = cur ? cur.split(',').map(s => s.trim()).filter(Boolean) : [];
    if (!emails.includes(ME.email)) emails.push(ME.email);
    await ragicPost(CONFIG.SHEETS.ANNOUNCE + '/' + ragicId, { [F.read_by]: emails.join(',') });
    const card = document.getElementById('ann-' + ragicId);
    if (card) {
      card.classList.add('read');
      btn.outerHTML = '<span class="read-tag">✓ 已閱覽</span>';
    }
  } catch (e) { toast('標記失敗：' + e.message, 'red'); btn.disabled = false; btn.textContent = '標記已閱覽'; }
}

function showAnnForm(ragicId) {
  const editing = ragicId != null;
  // 編輯時從 DOM 取現有資料（已渲染在卡片上）
  const card = editing ? document.getElementById('ann-' + ragicId) : null;
  const curTitle   = card ? card.querySelector('.ann-title').textContent.trim() : '';
  const curContent = card ? card.querySelector('.ann-content').textContent.trim() : '';
  const curDate    = card ? card.querySelector('.ann-meta').textContent.split(' ')[0] : fmtDate(new Date());
  const curPri     = card ? (card.classList.contains('pri-緊急') ? '緊急' : card.classList.contains('pri-重要') ? '重要' : '一般') : '一般';

  openModal(`
    <div class="modal-title">${editing ? '編輯公告' : '新增公告'}</div>
    <div class="ff"><label>標題 *</label>
      <input id="af-title" value="${escAttr(curTitle)}" placeholder="公告標題"></div>
    <div class="ff"><label>內容</label>
      <textarea id="af-content" rows="5">${escHtml(curContent)}</textarea></div>
    <div class="ff"><label>發布日期</label>
      <input type="date" id="af-date" value="${curDate}"></div>
    <div class="ff"><label>重要程度</label>
      <select id="af-pri">
        <option${curPri==='一般'?' selected':''}>一般</option>
        <option${curPri==='重要'?' selected':''}>重要</option>
        <option${curPri==='緊急'?' selected':''}>緊急</option>
      </select></div>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="closeModal()">取消</button>
      <button class="btn" onclick="saveAnnouncement(${editing ? ragicId : 'null'})">儲存</button>
    </div>`, true);
}

async function saveAnnouncement(ragicId) {
  const title   = document.getElementById('af-title').value.trim();
  const content = document.getElementById('af-content').value.trim();
  const date    = document.getElementById('af-date').value.replace(/-/g, '/');
  const pri     = document.getElementById('af-pri').value;
  if (!title) { toast('請填寫標題', 'red'); return; }

  const F = CONFIG.FID.A;
  const fields = {
    [F.title]:     title,
    [F.content]:   content,
    [F.pub_date]:  date,
    [F.priority]:  pri,
    [F.publisher]: ME.name || ME.email
  };

  try {
    const sheet = ragicId != null
      ? CONFIG.SHEETS.ANNOUNCE + '/' + ragicId
      : CONFIG.SHEETS.ANNOUNCE;
    await ragicPost(sheet, fields);
    closeModal();
    toast('公告已儲存 ✓', 'green');
    viewAdminAnnounce();
  } catch (e) { toast('儲存失敗：' + e.message, 'red'); }
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s); }

// ═══════════════════════════════════════════════════════════════════════
//  MODAL + TOAST + UTILS
// ═══════════════════════════════════════════════════════════════════════

function setView(html) { document.getElementById('view').innerHTML = html; }

function openModal(html, center) {
  document.getElementById('modal-box').innerHTML = html;
  const bg = document.getElementById('modal-bg');
  bg.classList.toggle('center', !!center);
  bg.classList.add('open');
}

function closeModal() {
  const bg = document.getElementById('modal-bg');
  bg.classList.remove('open', 'center');
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('modal-bg')) closeModal();
}

function toast(msg, type) {
  let el = document.getElementById('toast');
  if (el) el.remove();
  el = document.createElement('div');
  el.id = 'toast';
  el.textContent = msg;
  el.style.background = type === 'red' ? '#ea4335' : '#34a853';
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}
