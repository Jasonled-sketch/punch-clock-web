<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>工讀生打卡系統</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#222;min-height:100vh}
    /* ── Login ── */
    #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .login-card{background:#fff;border-radius:20px;padding:40px 32px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.1);max-width:360px;width:100%}
    .login-icon{font-size:52px;margin-bottom:16px}
    .login-title{font-size:22px;font-weight:700;margin-bottom:6px}
    .login-sub{color:#888;font-size:14px;margin-bottom:28px}
    /* ── Topbar ── */
    #topbar{background:#1a73e8;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
    #topbar .t{font-size:16px;font-weight:600}
    .btn-logout{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:13px}
    /* ── Tabs ── */
    .tab-bar{background:#fff;display:flex;border-bottom:1px solid #e0e0e0;overflow-x:auto;position:sticky;top:52px;z-index:199;scrollbar-width:none}
    .tab-bar::-webkit-scrollbar{display:none}
    .tab-btn{flex:1;min-width:56px;padding:13px 6px;border:none;background:none;cursor:pointer;font-size:13px;color:#666;border-bottom:2px solid transparent;white-space:nowrap;position:relative;transition:color .15s,border-color .15s}
    .tab-btn.active{color:#1a73e8;border-bottom-color:#1a73e8;font-weight:600}
    .tab-badge{background:#ea4335;color:#fff;font-size:10px;padding:1px 5px;border-radius:10px;position:absolute;top:6px;right:2px}
    /* ── Content ── */
    .view{padding:16px;max-width:640px;margin:0 auto}
    /* ── Card ── */
    .card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:14px}
    /* ── Status ── */
    .status-lbl{font-size:12px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
    .status-val{font-size:32px;font-weight:700}
    .status-none{color:#aaa}
    .status-work{color:#34a853}
    .status-break{color:#fbbc04}
    .status-time{font-size:13px;color:#999;margin-top:4px}
    .timer{font-size:44px;font-weight:700;letter-spacing:3px;font-variant-numeric:tabular-nums;margin-top:8px}
    /* ── Location ── */
    .loc-btn{display:flex;align-items:center;width:100%;padding:13px 16px;border:2px solid #e0e0e0;border-radius:12px;background:#fff;cursor:pointer;font-size:15px;margin-bottom:8px;gap:10px;transition:border-color .15s,background .15s}
    .loc-btn.sel{border-color:#1a73e8;background:#e8f0fe}
    .loc-map{margin-left:auto;font-size:12px;color:#1a73e8;background:#e8f0fe;padding:4px 8px;border-radius:6px;text-decoration:none}
    /* ── Buttons ── */
    .btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .btn{padding:15px;border:none;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600;transition:opacity .15s}
    .btn:disabled{opacity:.3;cursor:not-allowed}
    .btn-full{grid-column:1/-1}
    .btn-blue{background:#1a73e8;color:#fff}
    .btn-green{background:#34a853;color:#fff}
    .btn-yellow{background:#f9ab00;color:#fff}
    .btn-red{background:#ea4335;color:#fff}
    .btn-grey{background:#f1f3f4;color:#444}
    /* ── Work items ── */
    .wi-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
    .wi-input{flex:1;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
    .wi-del{background:none;border:none;color:#bbb;cursor:pointer;font-size:20px;line-height:1;padding:4px}
    .wi-add{background:none;border:1px dashed #1a73e8;color:#1a73e8;border-radius:8px;padding:9px;cursor:pointer;font-size:14px;width:100%;margin-top:4px}
    /* ── Table ── */
    .tbl-wrap{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:14px}
    table{width:100%;border-collapse:collapse}
    th{background:#f8f9fa;padding:10px 12px;text-align:left;font-size:12px;color:#666;border-bottom:1px solid #e0e0e0}
    td{padding:10px 12px;font-size:14px;border-bottom:1px solid #f0f0f0}
    tr:last-child td{border-bottom:none}
    tbody tr{cursor:pointer}
    tbody tr:hover td{background:#fafafa}
    /* ── Filter bar ── */
    .filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
    .filter-bar select{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;cursor:pointer}
    /* ── Summary card ── */
    .sum-row{display:flex;justify-content:space-around;margin-top:10px}
    .sum-item .lbl{font-size:12px;color:#888}
    .sum-item .val{font-size:22px;font-weight:700;color:#1a73e8}
    /* ── Worker cards (admin overview) ── */
    .wk-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
    .wk-card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.06);border-left:4px solid #1a73e8}
    .wk-name{font-size:17px;font-weight:700;margin-bottom:3px}
    .wk-email{font-size:11px;color:#aaa;margin-bottom:10px}
    .wk-stat{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
    .wk-stat .v{font-weight:600}
    /* ── Calendar ── */
    .cal{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.06);padding:6px}
    .cal-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #f0f0f0}
    .cal-nav{background:none;border:none;font-size:22px;cursor:pointer;padding:2px 10px;color:#555}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
    .cal-dh{text-align:center;padding:6px 2px;font-size:12px;color:#888;font-weight:700}
    .cal-dh.sun{color:#ea4335}
    .cal-dh.sat{color:#1a73e8}
    .cal-d{min-height:62px;padding:4px;border-radius:8px;background:#fafbfc;display:flex;flex-direction:column;gap:2px;transition:background .15s}
    .cal-d.weekend{background:#f3f5f8}
    .cal-d.other{background:transparent}
    .cal-d .dn{font-size:12px;font-weight:600;color:#444;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0}
    .cal-d.sun .dn{color:#ea4335}
    .cal-d.today{background:#e8f0fe;box-shadow:inset 0 0 0 2px #1a73e8}
    .cal-d.today .dn{background:#1a73e8;color:#fff;font-weight:700}
    .cal-ev{font-size:11px;padding:2px 5px;border-radius:4px;background:#fff;color:#222;border-left:3px solid #1a73e8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.06);font-weight:500;line-height:1.5}
    .cal-ev:hover{background:#eef3ff}
    /* ── Month nav ── */
    .month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .month-nav strong{font-size:16px}
    /* ── Modal ── */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:flex-end;justify-content:center;padding:0}
    .modal-bg.open{display:flex}
    .modal-bg.center{align-items:center;padding:16px}
    .modal-box{background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
    .modal-bg.center .modal-box{border-radius:16px;max-height:85vh}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
    .modal-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f5f5f5;font-size:14px}
    .modal-row:last-of-type{border:none}
    .modal-lbl{color:#999}
    .modal-actions{display:flex;gap:8px;margin-top:20px}
    .modal-actions .btn{flex:1}
    /* ── Form ── */
    .ff{margin-bottom:12px}
    .ff label{display:block;font-size:13px;color:#666;margin-bottom:4px;font-weight:500}
    .ff input,.ff select,.ff textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
    .ff textarea{min-height:80px;resize:vertical}
    /* ── Status badges ── */
    .b-pending{background:#fff3cd;color:#856404;padding:2px 8px;border-radius:10px;font-size:12px}
    .b-approved{background:#d1e7dd;color:#0a3622;padding:2px 8px;border-radius:10px;font-size:12px}
    .b-rejected{background:#f8d7da;color:#58151c;padding:2px 8px;border-radius:10px;font-size:12px}
    /* ── Avatar ── */
    .avatar{width:44px;height:44px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;flex-shrink:0;vertical-align:middle}
    .avatar-lg{width:52px;height:52px;font-size:22px}
    /* ── GPS badge ── */
    .gps-link{display:inline-block;margin-top:6px;font-size:12px;color:#1a73e8;text-decoration:none;background:#e8f0fe;padding:3px 8px;border-radius:6px}
    /* ── Announcement cards ── */
    .ann-list{display:flex;flex-direction:column;gap:10px}
    .ann-card{background:#fff;border-radius:14px;padding:16px 18px;box-shadow:0 2px 12px rgba(0,0,0,.06);border-left:4px solid #1a73e8;transition:opacity .2s}
    .ann-card.read{opacity:.6}
    .ann-card.pri-重要{border-left-color:#f59e0b}
    .ann-card.pri-緊急{border-left-color:#ef4444}
    .ann-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .ann-title{font-size:16px;font-weight:700;flex:1;line-height:1.3}
    .ann-badge{font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;font-weight:600}
    .ann-badge.pri-一般{background:#e8f0fe;color:#1a73e8}
    .ann-badge.pri-重要{background:#fef3c7;color:#b45309}
    .ann-badge.pri-緊急{background:#fee2e2;color:#dc2626}
    .ann-date-right{font-size:11px;color:#aaa;white-space:nowrap;flex-shrink:0}
    .ann-content{font-size:14px;color:#333;white-space:pre-wrap;line-height:1.6;margin-bottom:8px}
    .ann-content.collapsed{display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;white-space:pre-wrap}
    .btn-expand{background:none;border:none;color:#1a73e8;font-size:12px;cursor:pointer;padding:0;display:block}
    /* ── Leave cards ── */
    .leave-card{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:10px;border-left:4px solid #1a73e8}
    .leave-card.st-pending{border-left-color:#f59e0b}
    .leave-card.st-approved{border-left-color:#34a853}
    .leave-card.st-rejected{border-left-color:#ea4335}
    .leave-hd{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:6px}
    .leave-hd-left{display:flex;align-items:center;flex-wrap:wrap;gap:8px;min-width:0}
    .leave-hd-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .leave-name{font-size:13px;color:#666;font-weight:600}
    .leave-type{font-size:15px;font-weight:700;color:#1a1a1a}
    .leave-date-main{font-size:14px;font-weight:700;color:#1a1a1a;margin-left:1.5em}
    .leave-days{font-size:13px;color:#555;background:#f1f3f4;padding:2px 10px;border-radius:10px}
    .leave-reason{font-size:13px;color:#444;white-space:pre-wrap;word-break:break-word;margin-top:2px}
    .leave-photo{max-width:140px;max-height:140px;object-fit:cover;border-radius:8px;margin-top:8px;cursor:pointer;display:block}
    .leave-apply{font-size:11px;color:#888;text-align:right;margin-top:8px;display:flex;align-items:center;justify-content:flex-end;gap:8px}
    /* ── 薪資月報 ── */
    .rpt-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);border-left:4px solid #1a73e8;margin-bottom:12px}
    .rpt-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .rpt-name{font-size:16px;font-weight:700;color:#1a1a1a}
    .rpt-type{font-size:10px;padding:1px 6px;border-radius:8px}
    .rpt-shift{font-size:10px;padding:1px 6px;border-radius:8px;background:#fff3cd;color:#856404}
    .rpt-shift.none{background:#f1f3f4;color:#999}
    .rpt-email{font-size:11px;color:#aaa}
    .rpt-annual{flex-shrink:0;text-align:center;background:#e8f0fe;border-radius:10px;padding:6px 10px}
    .rpt-annual-lbl{font-size:10px;color:#1a73e8}
    .rpt-annual-val{font-size:15px;font-weight:700;color:#1a73e8}
    .rpt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px}
    .rpt-cell{background:#f8f9fa;border-radius:8px;padding:8px 10px}
    .rpt-lbl{font-size:11px;color:#999;margin-bottom:2px}
    .rpt-val{font-size:15px;font-weight:700;color:#1a1a1a}
    .rpt-val.warn{color:#ea4335}
    .pay-box{margin-top:12px;padding:12px 14px;background:linear-gradient(135deg,#0f9d58,#1a73e8);border-radius:10px;color:#fff}
    .pay-net{font-size:18px;font-weight:700}
    .pay-detail{font-size:12px;opacity:.92;margin-top:4px;line-height:1.6}
    .rd-sec{margin-bottom:14px}
    .rd-title{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:6px;border-bottom:1px solid #eee;padding-bottom:4px}
    .rd-row{font-size:13px;color:#444;padding:4px 0;line-height:1.5}
    .rd-empty{font-size:12px;color:#bbb;padding:2px 0}
    /* ── 補休餘額橫幅 ── */
    .ot-balance{background:linear-gradient(135deg,#9333ea,#1a73e8);color:#fff;border-radius:14px;padding:16px;font-size:15px;margin-bottom:14px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.08)}
    .ot-balance b{font-size:24px;margin:0 2px}
    /* ── 團隊生命值 ── */
    .team-life{background:linear-gradient(135deg,#0f9d58,#16b765);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
    .team-life.warn{background:linear-gradient(135deg,#f59e0b,#fbbc04)}
    .team-life.dead{background:linear-gradient(135deg,#ea4335,#c5221f)}
    .tl-hearts{font-size:24px;letter-spacing:2px;white-space:nowrap}
    .tl-info{font-size:13px;line-height:1.5;flex:1}
    .tl-info b{font-size:16px}
    .tl-info-btn{flex-shrink:0;background:rgba(255,255,255,.25);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:14px;font-weight:700}
    .tl-info-btn:hover{background:rgba(255,255,255,.4)}
    /* ── KPI bar ── */
    .rpt-kpi{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
    .kpi-light,.kpi-health{font-size:12px;font-weight:600;padding:4px 10px;border-radius:8px}
    .kpi-light.green,.kpi-health.green{background:#e6f4ea;color:#137333}
    .kpi-light.yellow,.kpi-health.yellow{background:#fef7e0;color:#b06000}
    .kpi-light.red,.kpi-health.red{background:#fce8e6;color:#c5221f}
    .rpt-warn{background:#fff3e0;color:#b06000;border:1px solid #ffcc80;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;margin-bottom:10px}
    .leave-note{font-size:12px;color:#ea4335;margin-top:4px}
    .btn-quick{flex:1;background:#e8f0fe;border:none;color:#1a73e8;padding:8px 4px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
    .btn-quick:hover{background:#d2e3fc}
    .btn-quick.active{background:#1a73e8;color:#fff}
    .urgent-badge{background:#fff0f0;color:#dc2626;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;border:1px solid #fca5a5;white-space:nowrap}
    .ann-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px}
    .read-tag{font-size:12px;color:#34a853;font-weight:600}
    .btn-read{background:#e8f0fe;border:none;color:#1a73e8;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
    .btn-read:hover{background:#d2e3fc}
    /* ── Worker card avatar row ── */
    .wk-hd{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .wk-hd-info{flex:1;min-width:0}
    /* ── Misc ── */
    .loading{text-align:center;padding:40px;color:#aaa;font-size:15px}
    .err-box{background:#fce8e6;color:#c62828;padding:12px 16px;border-radius:10px;margin-bottom:12px;font-size:14px}
    .hidden{display:none!important}
    #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.15);color:#fff;transition:opacity .3s;white-space:nowrap}
  </style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">🕐</div>
    <div class="login-title">工讀生打卡系統</div>
    <div class="login-sub">請用公司 Google 帳號登入</div>
    <div id="g-btn"></div>
    <div id="login-err" style="margin-top:14px;color:#c62828;font-size:14px"></div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app" class="hidden">
  <div id="topbar">
    <div class="t">打卡系統</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="tb-user" style="font-size:13px;opacity:.9"></span>
      <button class="btn-logout" onclick="logout()">登出</button>
    </div>
  </div>
  <div class="tab-bar" id="tab-bar"></div>
  <div id="view"></div>
</div>

<!-- ══ MODAL ══ -->
<div class="modal-bg" id="modal-bg" onclick="onOverlayClick(event)">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>

function normalizeRec(sheet, r) {
  const map = FNAME_MAP[sheet];
  if (!map) return r;
  const out = { _ragicId: r._ragicId };
  for (const [name, id] of Object.entries(map)) out[id] = r[name] ?? '';
  return out;
}

async function ragicGet(sheet, extra = {}) {
  const u = new URL(ragicUrl(sheet));
  u.searchParams.set('api', '');
  if (CONFIG.RAGIC_KEY) u.searchParams.set('APIKey', CONFIG.RAGIC_KEY);
  for (const [k, v] of Object.entries(extra)) u.searchParams.set(k, v);
  const res = await fetch(u.toString());
  if (!res.ok) throw new Error(`Ragic GET 失敗 ${res.status}`);
  const data = await res.json();
  return Object.values(data)
    .filter(r => r && r._ragicId)
    .map(r => normalizeRec(sheet, r));
}

async function ragicPost(sheet, fields) {
  const keyParam = CONFIG.RAGIC_KEY ? `&APIKey=${encodeURIComponent(CONFIG.RAGIC_KEY)}` : '';
  const url = `${ragicUrl(sheet)}?api${keyParam}`;
  const fd = new FormData();
  for (const [k, v] of Object.entries(fields)) {
    if (v !== undefined && v !== null) fd.append(String(k), String(v));
  }
  const res = await fetch(url, { method:'POST', body:fd });
  if (!res.ok) throw new Error(`Ragic POST 失敗 ${res.status}`);
  const data = await res.json();
  if (data.status !== 'SUCCESS') throw new Error(data.errMsg || JSON.stringify(data));
  return data.ragicId;
}

async function ragicUpdate(sheet, id, fields) {
  const keyParam = CONFIG.RAGIC_KEY ? `&APIKey=${encodeURIComponent(CONFIG.RAGIC_KEY)}` : '';
  const url = `${ragicUrl(sheet)}/${id}?api${keyParam}`;
  const fd = new FormData();
  for (const [k, v] of Object.entries(fields)) {

  }
  const res = await fetch(url, { method:'POST', body:fd });
  if (!res.ok) throw new Error(`Ragic UPDATE 失敗 ${res.status}`);
  const data = await res.json();
  if (data.status !== 'SUCCESS') throw new Error(data.errMsg || JSON.stringify(data));
}

function stripSec(t) { return t ? String(t).slice(0, 5) : ''; }

function makeAvatar(name, color, size, photoRaw) {
  const cls = size === 'lg' ? 'avatar avatar-lg' : 'avatar';
  const photoUrl = getPhotoUrl(photoRaw);
  if (photoUrl) {
    return `<img src="${photoUrl}" class="${cls}" style="object-fit:cover;border-radius:50%">`;
  }
  const ch = name ? name.slice(0, 1) : '?';
  return `<div class="${cls}" style="background:${color||'#1a73e8'}">${ch}</div>`;
}

function getPhotoUrl(raw) {
  if (!raw || typeof raw !== 'string') return null;
  const v = raw.trim();
  if (!v || v === '0') return null;
  if (v.startsWith('http')) return v;
  return null;
}

// Ragic 圖片 URL：/sims/file.jsp?a={account}&f={token@filename}（公開，不需 APIKey）
function resolvePhotoUrl(ragicId, rawPhoto) {
  if (!rawPhoto) return '';
  const v = String(rawPhoto).trim();
  if (!v || v === '0') return '';
  if (v.startsWith('http')) return v;
  return `https://ap10.ragic.com/sims/file.jsp?a=Fan28&f=${encodeURIComponent(v)}`;
}

function calcSeniority(startDateStr) {
  if (!startDateStr) return '—';
  const start = new Date(startDateStr.replace(/\//g, '-'));
  const now = new Date();
  const months = Math.floor((now - start) / (30.44 * 24 * 3600 * 1000));
  const y = Math.floor(months / 12), m = months % 12;
  return y > 0 ? `${y}年${m}個月` : `${m}個月`;
}

function calcAnnualLeave(startDateStr) {
  if (!startDateStr) return 0;
  const start = new Date(startDateStr.replace(/\//g, '-'));
  const years = (new Date() - start) / (365.25 * 24 * 3600 * 1000);
  if (years < 0.5) return 0;
  if (years < 1)  return 3;
  if (years < 2)  return 7;
  if (years < 3)  return 10;
  if (years < 5)  return 14;
  if (years < 10) return 15;
  return Math.min(15 + Math.floor(years - 10), 30);
}

function getWorkDays(year, month) {
  const days = new Date(year, month, 0).getDate();
  let count = 0;
  for (let d = 1; d <= days; d++) {
    const dow = new Date(year, month - 1, d).getDay();
    if (dow !== 0 && dow !== 6) count++;
  }
  return count;
}

async function captureGPS() {
  return new Promise(resolve => {
    if (!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude.toFixed(5), lng: pos.coords.longitude.toFixed(5) }),
      () => resolve(null),
      { timeout: 8000, enableHighAccuracy: true }
    );
  });
}

function parseGPS(locStr) {
  const m = locStr && locStr.match(/GPS:([-\d.]+),([-\d.]+)/);
  return m ? { lat: m[1], lng: m[2] } : null;
}

function locName(locStr) {
  return locStr ? locStr.replace(/\s*\[GPS:[^\]]*\]/, '') : '—';
}

function gpsMapLink(locStr) {
  const g = parseGPS(locStr);
  if (!g) return '';
  return `<a class="gps-link" href="https://maps.google.com/?q=${g.lat},${g.lng}" target="_blank">📍 GPS 驗證 (${g.lat},${g.lng})</a>`;
}

function fmtDate(d) {
  const dt = d instanceof Date ? d : new Date(d);
  return `${dt.getFullYear()}/${pad(dt.getMonth()+1)}/${pad(dt.getDate())}`;
}
function fmtDateTime(d) {
  const dt = d instanceof Date ? d : new Date(d);
  return `${fmtDate(dt)} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
}
// 日期字串加上星期，e.g. "2026/05/30 (六)"
function addDay(s) {
  if (!s) return s || '';
  const dt = new Date(String(s).replace(/\//g, '-').slice(0, 10));
  if (isNaN(dt)) return s;
  const days = ['日','一','二','三','四','五','六'];
  return `${String(s).slice(0, 10).replace(/-/g,'/')} (${days[dt.getDay()]})`;
}
function fmtHHMM(d) {
  const dt = d instanceof Date ? d : new Date(d);
  return `${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function parseDatetime(s) {
  if (!s) return null;
  return new Date(s.replace(/\//g,'-').replace(' ','T'));
}

// ─── 打卡提醒（頁內通知，頁面開啟時生效）─────────────────────────────────────────

let _REMIND_IV = null;
const _NOTIFIED = new Set();

function startPunchReminder() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') Notification.requestPermission();
  clearInterval(_REMIND_IV);
  _REMIND_IV = setInterval(checkPunchReminder, 60000);
  checkPunchReminder();
}

async function checkPunchReminder() {
  if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
  const sh = CONFIG.SHIFTS[MY_WORKER?.shift];
  if (!sh) return;  // 沒設班別不提醒
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const today = fmtDate(now);
  const inMin = toMin(sh.am[0]), outMin = toMin(sh.pm[1]);

  // 上班提醒：上班時間 ~ +30 分內，尚未開始上班
  if (nowMin >= inMin && nowMin <= inMin + 30 && !_NOTIFIED.has('in-' + today)) {
    _NOTIFIED.add('in-' + today);
    if (!(await getOpenRec())) {
      pushLocalNotify('⏰ 上班打卡提醒', `${MY_WORKER.shift} 班 ${sh.am[0]} 上班，記得打卡！`);
    }
  }
  // 下班提醒：下班時間 ~ +30 分內，還在上班中
  if (nowMin >= outMin && nowMin <= outMin + 30 && !_NOTIFIED.has('out-' + today)) {
    _NOTIFIED.add('out-' + today);
    if (await getOpenRec()) {
      pushLocalNotify('⏰ 下班打卡提醒', `${sh.pm[1]} 下班時間到了，記得打卡下班！`);
    }
  }
}

function pushLocalNotify(title, body) {
  try { new Notification(title, { body }); } catch (e) {}
  toast(`${title}　${body}`, 'green');
}

// 員工端：自己的全勤燈號 + 健康度 + 團隊生命值
async function loadMyKPI() {
  const box = document.getElementById('my-kpi');
  if (!box) return;
  try {
    const now = new Date();
    const year = now.getFullYear(), month = now.getMonth() + 1;
    const ym = `${year}/${pad(month)}`;
    const [myRecs, allInc, myLeaves] = await Promise.all([
      getMyRecs(year, month), getIncompleteRecs(year, month), getMyLeaves()
    ]);
    const myInc = allInc.filter(r => r.email === ME.email).length;
    const sh = CONFIG.SHIFTS[MY_WORKER?.shift];
    let lateCnt = 0, lateMin = 0, earlyCnt = 0;
    if (sh) myRecs.forEach(r => {
      if (r.start_time) { const d = toMin(r.start_time) - toMin(sh.am[0]); if (d > 0) { lateCnt++; lateMin += d; } }
      if (r.end_time && toMin(sh.pm[1]) - toMin(r.end_time) > 0) earlyCnt++;
    });
    const isFull = MY_WORKER?.emp_type === '正式員工';
    const appr = myLeaves.filter(l => l.status === 'approved' && (l.start_date || '').startsWith(ym));
    const urgentCnt = appr.filter(isUrgentLeave).length;
    const personalCnt = appr.filter(l => l.leave_type === '事假').length;
    const sickCnt = appr.filter(l => l.leave_type === '病假').length;
    const otherCnt = appr.filter(l => l.leave_type === '特休' || l.leave_type === '其他').length;
    const overduePenalty = appr.reduce((s, l) => s + leaveOverduePenalty(l), 0);
    const ab = isFull ? analyzeAbsence(MY_WORKER, myRecs, myLeaves, year, month) : { confirmed: 0, pending: [] };
    const absent = ab.confirmed;
    const kpi = calcAttendanceKPI({ absent, noClockOut: myInc, lateCnt, lateMin, earlyCnt, sickCnt, personalCnt, urgentCnt, otherCnt, overduePenalty });
    box.innerHTML = `
      <div class="rpt-kpi" style="margin-bottom:10px">
        <span class="kpi-light ${kpi.light}">${LIGHT_EMOJI[kpi.light]} 本月${kpi.lightLabel}</span>
        <span class="kpi-health ${kpi.hColor}">出勤健康度 ${kpi.health}</span>
      </div>
      ${ab.pending.length ? `<div class="rpt-warn">${ab.pending.map(p => `${addDay(p.ds).slice(5)} 缺席待補單（剩 ${String(p.hoursLeft).padStart(2,'0')}hr），超過 30hr 未補計曠職`).join('<br>')}</div>` : ''}
      ${teamLifeHtml(allInc.length)}`;
  } catch (e) { /* KPI 載入失敗不影響打卡 */ }
}

  const cls = { none:'status-none', work:'status-work', break:'status-break' };
  let h = '<div class="view"><div id="my-kpi"></div>';

  // Status card
  const locDisplay = OPEN_REC ? locName(OPEN_REC.location) : '';
  const gpsVerified = OPEN_REC && parseGPS(OPEN_REC.location);
  h += `<div class="card" style="text-align:center">
    <div style="display:flex;justify-content:flex-end">
      <button onclick="showPunchInfo()" style="background:none;border:1px solid #ddd;border-radius:8px;padding:3px 10px;font-size:12px;color:#888;cursor:pointer">？打卡說明</button>
    </div>
    <div class="status-lbl" style="margin-top:6px">目前狀態</div>
    <div class="status-val ${cls[s]}">${labels[s]}</div>
    ${OPEN_REC ? `<div class="status-time">📍 ${locDisplay}　${addDay(OPEN_REC.date)} ${OPEN_REC.start_time} 打卡</div>` : ''}
    ${gpsVerified ? `<div style="font-size:12px;color:#34a853;margin-top:4px">✅ GPS 位置已驗證</div>` : (OPEN_REC ? `<div style="font-size:12px;color:#f9ab00;margin-top:4px">⚠️ GPS 未取得（手動確認地點）</div>` : '')}
    ${s !== 'none' ? '<div class="timer" id="timer">00:00:00</div>' : ''}
  </div>`;

  // Location picker
  if (s === 'none') {
    h += `<div class="card"><div style="font-weight:600;margin-bottom:12px">選擇打卡地點</div>`;
    CONFIG.LOCATIONS.forEach((loc, i) => {
      h += `<button class="loc-btn" id="loc${i}" onclick="selLoc(${i})">
        <span>📍 ${loc.name}</span>
        <a href="${loc.url}" target="_blank" class="loc-map" onclick="event.stopPropagation()">地圖 ↗</a>
      </button>`;
    });
    h += '</div>';
  }

  // Action buttons
  h += '<div class="btn-grid">';
  if (s === 'none') {
    h += `<button class="btn btn-green btn-full" id="btn-in" onclick="doPunchIn()" disabled>上班打卡</button>`;
  }
  if (s === 'work') {
    h += `<button class="btn btn-yellow" onclick="doPause()">開始休息 ☕</button>`;
    h += `<button class="btn btn-red" onclick="showPunchOutModal()">下班打卡 🏠</button>`;
    h += `<button class="btn btn-grey btn-full" onclick="doCancel()">取消此次打卡</button>`;
  }
  if (s === 'break') {
    h += `<button class="btn btn-green btn-full" onclick="doResume()">結束休息 ▶</button>`;
  }
  h += '</div></div>';
  return h;
}

let SEL_LOC = null;
function selLoc(i) {
  SEL_LOC = CONFIG.LOCATIONS[i];
  document.querySelectorAll('.loc-btn').forEach((b, j) => b.classList.toggle('sel', j === i));
  document.getElementById('btn-in').disabled = false;
}

async function doPunchIn() {
  if (!SEL_LOC) return;
  const btn = document.getElementById('btn-in');
  btn.disabled = true; btn.textContent = '取得位置中…';
  try {
    const F = CONFIG.FID.R;
    const now = new Date();
    const name = MY_WORKER?.name || ME.name;

    // 嘗試取得 GPS 座標
    const gps = await captureGPS();
    const locStr = gps ? `${SEL_LOC.name} [GPS:${gps.lat},${gps.lng}]` : SEL_LOC.name;

    await ragicPost(CONFIG.SHEETS.RECORDS, {
      [F.email]: ME.email, [F.name]: name,
      [F.date]: fmtDate(now), [F.start_time]: fmtHHMM(now),
      [F.end_time]: '', [F.location]: locStr,
      [F.breaks_minutes]: '0', [F.paused_at]: '', [F.rec_status]: ''
    });
    const gpsMsg = gps ? `　GPS ✓` : `　GPS 未取得`;
    toast('上班打卡成功！' + fmtHHMM(now) + gpsMsg, 'green');
    await viewPunch();
  } catch (e) { toast('打卡失敗：' + e.message, 'red'); btn.disabled = false; btn.textContent = '上班打卡'; }
}

async function doPause() {
  if (!OPEN_REC) return;
  try {
    const F = CONFIG.FID.R;
    await ragicUpdate(CONFIG.SHEETS.RECORDS, OPEN_REC.ragicId, { [F.paused_at]: fmtDateTime(new Date()) });
    toast('開始休息 ☕', 'green');
    await viewPunch();
  } catch (e) { toast('操作失敗：' + e.message, 'red'); }
}

async function doResume() {
  if (!OPEN_REC?.paused_at) return;
  try {
    const F = CONFIG.FID.R;
    const pausedAt = parseDatetime(OPEN_REC.paused_at);
    const addMin = Math.round((new Date() - pausedAt) / 60000);
    await ragicUpdate(CONFIG.SHEETS.RECORDS, OPEN_REC.ragicId, {
      [F.paused_at]: '', [F.breaks_minutes]: String(OPEN_REC.breaks_minutes + addMin)
    });
    toast('結束休息 ▶', 'green');
    await viewPunch();
  } catch (e) { toast('操作失敗：' + e.message, 'red'); }
}

async function doCancel() {
  if (!OPEN_REC) return;
  if (!confirm('確定取消此次打卡？')) return;
  try {
    const F = CONFIG.FID.R;
    await ragicUpdate(CONFIG.SHEETS.RECORDS, OPEN_REC.ragicId, { [F.rec_status]: 'cancelled' });
    toast('已取消此次打卡', 'green');
    await viewPunch();
  } catch (e) { toast('操作失敗：' + e.message, 'red'); }
}

function wiRow(i, val) {
  return `<div class="wi-row" id="wi${i}">
    <input class="wi-input" id="wii${i}" placeholder="工作項目" value="${val}">
    <button class="wi-del" onclick="rmWI(${i})">✕</button>
  </div>`;
}

function addWI() {
  _wiCount++;
  document.getElementById('wi-list').insertAdjacentHTML('beforeend', wiRow(_wiCount, ''));
}

function rmWI(i) { document.getElementById('wi' + i)?.remove(); }

function getWorkContent() {
  const vals = Array.from(document.querySelectorAll('.wi-input'))
    .map(el => el.value.trim()).filter(Boolean);
  return vals.map(v => '• ' + v).join('\n');
}

async function doPunchOut() {
  const wc = getWorkContent();
  if (!wc) { toast('請填寫至少一項工作內容', 'red'); return; }
  if (!OPEN_REC) return;

  const now = new Date();
  const todayStr = fmtDate(now);
  if (todayStr !== OPEN_REC.date) {
    toast('跨日下班不允許，請申請補登', 'red'); closeModal(); return;
  }

  try {
    const F = CONFIG.FID.R;
    const startDt = parseDatetime(`${OPEN_REC.date} ${OPEN_REC.start_time}`);
    const grossMin = (now - startDt) / 60000;
    const workMin = grossMin - OPEN_REC.breaks_minutes;
    const hours = Math.round(workMin / 60 * 100) / 100;
    const rate = calcRate(OPEN_REC.date, MY_WORKER);
    const subtotal = Math.round(hours * rate);

    await ragicUpdate(CONFIG.SHEETS.RECORDS, OPEN_REC.ragicId, {
      [F.end_time]: fmtHHMM(now),
      [F.hours]: String(hours),
      [F.subtotal]: String(subtotal),
      [F.work_content]: wc
    });
    closeModal();
    toast(`下班打卡成功！${hours}h　$${subtotal}`, 'green');
    await viewPunch();
  } catch (e) { toast('下班失敗：' + e.message, 'red'); }
}

function calcRate(dateStr, worker) {
  if (!worker) return 0;
  const d = parseDatetime(dateStr + ' 12:00');
  const dow = d.getDay();
  return (dow === 0 || dow === 6) ? worker.weekend_rate : worker.weekday_rate;
}

// ─── Timer ───────────────────────────────────────────────────────────────────

function startTimer() {
  clearInterval(TIMER_IV);
  const el = document.getElementById('timer');
  if (!el || !OPEN_REC) return;
  TIMER_IV = setInterval(() => {
    const el2 = document.getElementById('timer');
    if (!el2) { clearInterval(TIMER_IV); return; }
    const startDt = parseDatetime(`${OPEN_REC.date} ${OPEN_REC.start_time}`);
    let elapsed = Math.floor((new Date() - startDt) / 1000) - OPEN_REC.breaks_minutes * 60;
    if (OPEN_REC.paused_at) {
      elapsed -= Math.floor((new Date() - parseDatetime(OPEN_REC.paused_at)) / 1000);
    }
    if (elapsed < 0) elapsed = 0;
    el2.textContent = `${pad(Math.floor(elapsed/3600))}:${pad(Math.floor(elapsed%3600/60))}:${pad(elapsed%60)}`;
  }, 1000);
}

async function getMyRecs(year, month) {
  const F = CONFIG.FID.R;
  const all = await ragicGet(CONFIG.SHEETS.RECORDS, { where:`${F.email},eq,${ME.email}` });
  return all.filter(r => {
    if (!r[F.end_time]) return false;
    if (r[F.rec_status] === 'cancelled' || r[F.rec_status] === 'deleted') return false;
    const [y, m] = (r[F.date] || '').split('/');
    return Number(y) === year && Number(m) === month;
  }).map(r => ({
    ragicId: r._ragicId, email: r[F.email], name: r[F.name],
    date: r[F.date], start_time: stripSec(r[F.start_time]), end_time: stripSec(r[F.end_time]),
    hours: r[F.hours], subtotal: r[F.subtotal], location: r[F.location],
    work_content: r[F.work_content], breaks_minutes: r[F.breaks_minutes]
  })).sort((a, b) => a.date.localeCompare(b.date));
}

async function viewCalendar() {
  setView('<div class="loading">載入中…</div>');
  try {
    const recs = await getMyRecs(CUR_YEAR, CUR_MONTH + 1);
    const byDate = {};
    recs.forEach(r => { byDate[r.date] = r; });
    const color = MY_WORKER?.color || '#1a73e8';
    setView(`<div class="view">${monthNav(false)}${buildCal(byDate, rec => `
      <div class="cal-ev" style="border-left-color:${color}" onclick='showRecDetail(${JSON.stringify(rec)})'>${rec.start_time}–${rec.end_time||'?'}</div>
    `)}</div>`);
  } catch (e) { setView(`<div class="view"><div class="err-box">${e.message}</div></div>`); }
}

function buildCal(byDate, renderRec) {
  const firstDay = new Date(CUR_YEAR, CUR_MONTH, 1).getDay();
  const days = new Date(CUR_YEAR, CUR_MONTH + 1, 0).getDate();
  const todayStr = fmtDate(new Date());
  let h = '<div class="cal"><div class="cal-grid">';
  ['日','一','二','三','四','五','六'].forEach((d, i) => {
    const c = i === 0 ? ' sun' : (i === 6 ? ' sat' : '');
    h += `<div class="cal-dh${c}">${d}</div>`;
  });
  for (let i = 0; i < firstDay; i++) h += '<div class="cal-d other"></div>';
  for (let d = 1; d <= days; d++) {
    const dow = new Date(CUR_YEAR, CUR_MONTH, d).getDay();
    const ds = `${CUR_YEAR}/${pad(CUR_MONTH+1)}/${pad(d)}`;
    const isToday = ds === todayStr;
    const recs = Array.isArray(byDate[ds]) ? byDate[ds] : (byDate[ds] ? [byDate[ds]] : []);
    const cls = [isToday ? 'today' : '', dow === 0 ? 'sun' : '', (dow === 0 || dow === 6) ? 'weekend' : ''].filter(Boolean).join(' ');
    h += `<div class="cal-d${cls ? ' ' + cls : ''}"><div class="dn">${d}</div>`;
    recs.forEach(r => { h += renderRec(r); });
    h += '</div>';
  }
  return h + '</div></div>';
}

function monthNav(isAdmin) {
  const fn = isAdmin ? 'chgAMonth' : 'chgMonth';
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  return `<div class="month-nav">
    <button class="cal-nav" onclick="${fn}(-1)">‹</button>
    <strong>${CUR_YEAR}年 ${months[CUR_MONTH]}</strong>
    <button class="cal-nav" onclick="${fn}(1)">›</button>
  </div>`;
}

function chgMonth(d) {
  CUR_MONTH += d;
  if (CUR_MONTH < 0) { CUR_MONTH = 11; CUR_YEAR--; }
  if (CUR_MONTH > 11) { CUR_MONTH = 0; CUR_YEAR++; }
  ({ calendar: viewCalendar, records: viewRecords })[CUR_TAB]?.();
}

async function getAllRecs(year, month) {
  const F = CONFIG.FID.R;
  const all = await ragicGet(CONFIG.SHEETS.RECORDS);
  return all.filter(r => {
    if (!r[F.end_time]) return false;
    if (r[F.rec_status] === 'cancelled' || r[F.rec_status] === 'deleted') return false;
    const [y, m] = (r[F.date] || '').split('/');
    return Number(y) === year && Number(m) === month;
  }).map(r => ({
    ragicId: r._ragicId, email: r[F.email], name: r[F.name],
    date: r[F.date], start_time: stripSec(r[F.start_time]), end_time: stripSec(r[F.end_time]),
    hours: r[F.hours], subtotal: r[F.subtotal], location: r[F.location],
    work_content: r[F.work_content], breaks_minutes: r[F.breaks_minutes]
  })).sort((a, b) => a.date.localeCompare(b.date));
}

// ─── 勞健保自付額（2026 / 115 年）─────────────────────────────────────────────
// 投保金額分級表（健保用，前段與勞保共用；涵蓋常見月薪範圍）
const INSURANCE_GRADES = [
  29500, 30300, 31800, 33300, 34800, 36300, 38200, 40100, 42000, 43900, 45800,
  48200, 50600, 53000, 55400, 57800, 60800, 63800, 66800, 69800, 72800,
  76500, 80200, 83900, 87600, 92100, 96600, 101100, 105600, 110100,
  115500, 120900, 126300, 131700, 137100, 142500, 147900, 150000,
  156400, 162800, 169200, 175600, 182000
];
const LABOR_CAP = 45800;   // 勞保投保上限
const LABOR_EE_RATE  = 0.125 * 0.20;   // 勞保員工自付 = 投保 × 12.5% × 20%
const HEALTH_EE_RATE = 0.0517 * 0.30;  // 健保員工自付 = 投保 × 5.17% × 30%

// 月薪 → 投保級距（取 ≥ 月薪的最小級距）
function insuranceGrade(salary) {
  for (const g of INSURANCE_GRADES) if (salary <= g) return g;
  return INSURANCE_GRADES[INSURANCE_GRADES.length - 1];
}
function laborInsuranceEE(salary) {
  return Math.round(Math.min(insuranceGrade(salary), LABOR_CAP) * LABOR_EE_RATE);
}
function healthInsuranceEE(salary, dependents) {
  return Math.round(insuranceGrade(salary) * HEALTH_EE_RATE * (1 + (Number(dependents) || 0)));
}

// ─── 勞基法薪資計算 ───────────────────────────────────────────────────────────

// 加班費倍率：平日 前2hr×1.34、3hr起×1.67；休息日(週六/日) 2-8hr×1.67、超過×2.67
function calcOtPayByHours(h, rate, isWeekend) {
  let mult;
  if (isWeekend) {
    mult = Math.min(h, 2) * 1.34 + Math.min(Math.max(0, h - 2), 6) * 1.67 + Math.max(0, h - 8) * 2.67;
  } else {
    mult = Math.min(h, 2) * 1.34 + Math.max(0, h - 2) * 1.67;
  }
  return mult * rate;
}

// 當月加班費：補休 FIFO 先扣最早的加班，剩餘加班依各自當天倍率算錢
function calcMonthOvertimePay(email, otAll, ym, hourly) {
  const mine = otAll.filter(o => o.email === email && o.status === 'approved' && (o.date || '').startsWith(ym));
  const otList = mine.filter(o => o.ot_type === '加班').sort((a, b) => a.date.localeCompare(b.date));
  let comp = mine.filter(o => o.ot_type === '補休').reduce((s, o) => s + (parseFloat(o.hours) || 0), 0);
  let pay = 0, paidHours = 0;
  for (const ot of otList) {
    let h = parseFloat(ot.hours) || 0;
    if (comp > 0) { const d = Math.min(comp, h); h -= d; comp -= d; }  // 補休先扣
    if (h > 0) {
      const dow = new Date((ot.date || '').replace(/\//g, '-')).getDay();
      pay += calcOtPayByHours(h, hourly, dow === 0 || dow === 6);
      paidHours += h;
    }
  }
  return { pay: Math.round(pay), hours: Math.round(paidHours * 100) / 100 };
}

// 請假扣薪：特休/公假不扣、病假半薪、事假/臨時假/其他全扣
function calcLeaveDeduct(apprLeaves, hourly) {
  let d = 0;
  apprLeaves.forEach(l => {
    const h = parseFloat(l.hours) || 0;
    if (l.leave_type === '特休') return;
    if (l.leave_type === '病假') d += h * hourly * 0.5;
    else d += h * hourly;
  });
  return Math.round(d);
}

// 單筆請假扣薪（給明細用）
function oneLeaveDeduct(l, hourly) {
  const h = parseFloat(l.hours) || 0;
  if (l.leave_type === '特休') return 0;
  if (l.leave_type === '病假') return Math.round(h * hourly * 0.5);
  return Math.round(h * hourly);
}

// 加班費明細（逐筆 FIFO，記錄補休抵扣與計薪）
function overtimeDetail(email, otAll, ym, hourly) {
  const mine = otAll.filter(o => o.email === email && o.status === 'approved' && (o.date || '').startsWith(ym));
  const otList = mine.filter(o => o.ot_type === '加班').sort((a, b) => a.date.localeCompare(b.date));
  let comp = mine.filter(o => o.ot_type === '補休').reduce((s, o) => s + (parseFloat(o.hours) || 0), 0);
  const compTotal = comp;
  const rows = [];
  let totalPay = 0;
  for (const ot of otList) {
    const orig = parseFloat(ot.hours) || 0;
    let h = orig, used = 0;
    if (comp > 0) { used = Math.min(comp, h); h -= used; comp -= used; }
    const dow = new Date((ot.date || '').replace(/\//g, '-')).getDay();
    const pay = h > 0 ? Math.round(calcOtPayByHours(h, hourly, dow === 0 || dow === 6)) : 0;
    totalPay += pay;
    rows.push({ date: ot.date, orig, used, paid: h, pay, weekend: dow === 0 || dow === 6 });
  }
  return { rows, compTotal, totalPay };
}

// ─── 出勤 KPI（即時算，不另存表）────────────────────────────────────────────────
const LIGHT_EMOJI = { green: '🟢', yellow: '🟡', red: '🔴' };

// 曠職分析：逐日掃應出勤工作日，缺席(無打卡無請假)且過 72hr 沒補單 → 確定曠職；未過 → 待補單(警告)
function analyzeAbsence(worker, recs, leaves, year, month) {
  const now = new Date();
  const dim = new Date(year, month, 0).getDate();
  const ym = `${year}/${pad(month)}`;
  const attendSet = new Set(recs.filter(r => r.email === worker.email).map(r => r.date));
  const leaveSet = new Set(
    leaves.filter(l => l.email === worker.email && l.status === 'approved' && (l.start_date || '').startsWith(ym))
          .map(l => l.start_date));
  const startDate = worker.start_date ? new Date(worker.start_date.replace(/\//g, '-')) : null;
  const sh = CONFIG.SHIFTS[worker.shift];
  const [inH, inM] = (sh ? sh.am[0] : '09:00').split(':').map(Number);
  let confirmed = 0;
  const pending = [];
  for (let d = 1; d <= dim; d++) {
    const dow = new Date(year, month - 1, d).getDay();
    if (dow === 0 || dow === 6) continue;                              // 週末非應出勤
    const dt = new Date(year, month - 1, d, inH, inM);                 // 該日上班時間起算
    if (dt > now) continue;                                            // 未來
    if (startDate && new Date(year, month - 1, d) < startDate) continue; // 到職前
    const ds = `${ym}/${pad(d)}`;
    if (attendSet.has(ds) || leaveSet.has(ds)) continue;               // 有打卡或有請假
    const elapsed = (now - dt) / 3600000;
    if (elapsed > 30) confirmed++;                                     // 過 30hr 未補單 → 曠職
    else pending.push({ ds, hoursLeft: Math.max(0, Math.round(30 - elapsed)) });  // 緩衝期 → 待補單+倒數
  }
  return { confirmed, pending };
}

// 個人全勤燈號 + 出勤健康度（加分制：基礎 75，疏失才扣、沒請假給獎勵，避免勞資爭議）
function calcAttendanceKPI(p) {
  const { absent = 0, noClockOut = 0, lateCnt = 0, lateMin = 0, earlyCnt = 0,
          sickCnt = 0, personalCnt = 0, urgentCnt = 0, otherCnt = 0, overduePenalty = 0 } = p;
  // 全勤資格（公司結合勞基法）：曠職、漏打卡≥3、遲到累積≥15分、有事假 → 失格；病假10天內不影響
  let light, lightLabel;
  if (absent >= 1 || noClockOut >= 3 || lateMin >= 15 || personalCnt >= 1) {
    light = 'red'; lightLabel = '非全勤';
  } else if (noClockOut >= 1 || lateMin > 0) {
    light = 'yellow'; lightLabel = '留意';
  } else {
    light = 'green'; lightLabel = '全勤';
  }
  // 健康度：基礎 75；無請假給獎勵（最高 +25 → 100）；疏失扣分
  let health = 75;
  if (urgentCnt === 0)   health += 10;  // 本月無臨時假
  if (personalCnt === 0) health += 5;   // 本月無事假
  if (sickCnt === 0)     health += 5;   // 本月無病假
  if (otherCnt === 0)    health += 5;   // 本月無特休/其他假
  health -= absent * 30 + noClockOut * 5 + overduePenalty * 5 + lateCnt * 2 + earlyCnt * 2;
  health = Math.max(0, Math.min(100, health));
  const hColor = health >= 90 ? 'green' : health >= 80 ? 'yellow' : 'red';
  return { light, lightLabel, health, hColor };
}

// 團隊生命值：每月滿 3 顆愛心，每筆漏打卡 −1，全員打卡(3顆)才發團隊獎金；匿名不點名

  const cls = hearts === 0 ? 'dead' : hearts < 3 ? 'warn' : '';
  return `<div class="team-life ${cls}">
    <div class="tl-hearts">${heartStr}</div>
    <div class="tl-info">團隊生命值　本月團隊漏打卡 <b>${totalMiss}</b> 次　${status}</div>

}

      // ── 勞基法薪資計算 ──
      const hourly = isFull ? Math.round(w.monthly_salary / 240) : w.weekday_rate;
      const ot = calcMonthOvertimePay(w.email, otAll, ym, hourly);
      // 遲到/早退：月累計 ≤15 分免責，>15 分扣全部
      const latePen  = lateMin  > 15 ? lateMin  : 0;
      const earlyPen = earlyMin > 15 ? earlyMin : 0;
      const lateDeduct = Math.round((latePen + earlyPen) / 60 * hourly);
      const leaveDeduct = calcLeaveDeduct(appr, hourly);
      const absentDeduct = isFull ? Math.round(absent * (w.monthly_salary / 30)) : 0;
      const base = isFull ? w.monthly_salary : totP;
      const laborIns  = isFull ? laborInsuranceEE(w.monthly_salary) : 0;
      const healthIns = isFull ? healthInsuranceEE(w.monthly_salary, w.dependents) : 0;
      const net = Math.round(base + ot.pay - absentDeduct - lateDeduct - leaveDeduct - laborIns - healthIns);
      // 特休：應有 / 已用(當年度特休請假時數→天) / 剩餘
      const annualTotal = isFull ? calcAnnualLeave(w.start_date) : 0;
      const shHours = sh ? sh.hours : 8;
      const usedAnnual = isFull ? Math.round(
        leaves.filter(l => l.email === w.email && l.leave_type === '特休' && l.status === 'approved' && (l.start_date || '').startsWith(String(CUR_YEAR)))
          .reduce((s, l) => s + (parseFloat(l.hours) || 0), 0) / shHours * 100) / 100 : 0;
      const annualRemain = isFull ? Math.round((annualTotal - usedAnnual) * 100) / 100 : 0;
      const noClockOut = incomplete.filter(r => r.email === w.email).length;  // 漏打下班次數
      const personalCnt = appr.filter(l => l.leave_type === '事假').length;
      const sickCnt = appr.filter(l => l.leave_type === '病假').length;
      const otherCnt = appr.filter(l => l.leave_type === '特休' || l.leave_type === '其他').length;
      const overduePenalty = appr.reduce((s, l) => s + leaveOverduePenalty(l), 0);
      const kpi = calcAttendanceKPI({ absent: isFull ? absent : 0, noClockOut, lateCnt, lateMin, earlyCnt, sickCnt, personalCnt, urgentCnt, otherCnt, overduePenalty });

      const cell = (lbl, val, warn) => `<div class="rpt-cell"><div class="rpt-lbl">${lbl}</div><div class="rpt-val${warn?' warn':''}">${val}</div></div>`;
      const shiftTag = w.shift ? `<span class="rpt-shift">${w.shift} 班</span>` : `<span class="rpt-shift none">未設班別</span>`;

      h += `<div class="rpt-card" style="border-left-color:${w.color}">
        <div class="rpt-hd" style="cursor:pointer" onclick="showReportDetail('${w.email}')" title="點看完整明細">
          ${makeAvatar(w.name, w.color, '', w.photo)}
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:6px">
              <span class="rpt-name">${w.name}</span>
              <span class="rpt-type" style="background:${isFull?'#e8f0fe':'#e6f4ea'};color:${isFull?'#1a73e8':'#34a853'}">${isFull?'正式':'工讀'}</span>
              ${shiftTag}
            </div>
            <div class="rpt-email">${w.email}</div>
          </div>
          ${isFull ? `<div class="rpt-annual"><div class="rpt-annual-lbl">特休尚餘</div><div class="rpt-annual-val">${annualRemain}/${annualTotal} 天</div></div>` : ''}
        </div>
        <div class="rpt-kpi">
          <span class="kpi-light ${kpi.light}">${LIGHT_EMOJI[kpi.light]} ${kpi.lightLabel}</span>
          <span class="kpi-health ${kpi.hColor}">出勤健康度 ${kpi.health}</span>
        </div>
        ${pendingAbsent ? `<div class="rpt-warn">${ab.pending.map(p => `${addDay(p.ds).slice(5)} 缺席待補單（剩 ${String(p.hoursLeft).padStart(2,'0')}hr），超過 30hr 未補計曠職`).join('<br>')}</div>` : ''}
        <div class="rpt-grid">
          ${cell(isFull ? '月薪' : '本薪', `$${base.toLocaleString()}`)}
          ${cell('總時數', `${totH.toFixed(1)} h`)}
          ${cell('實出勤', `${attendDays} 天`)}
          ${isFull ? cell('曠職', `${absent} 天`, absent>0) : ''}
          ${cell('漏打卡', `${noClockOut} 次`, noClockOut>0)}
          ${cell('遲到', `${lateCnt} 次 / ${lateMin} 分`, latePen>0)}
          ${cell('早退', `${earlyCnt} 次 / ${earlyMin} 分`, earlyPen>0)}
          ${cell('請假', `${leaveHours} 小時`)}
          ${cell('臨時假', `${urgentCnt} 次`, urgentCnt>0)}
          ${isFull ? cell('補休餘額', `${calcOtBalance(otAll.filter(o => o.email === w.email))} 小時`) : ''}
          ${cell('加班費', `$${ot.pay.toLocaleString()}${ot.hours?` (${ot.hours}h)`:''}`, ot.pay>0)}
          ${pendingCnt ? cell('待審請假', `${pendingCnt} 件`, true) : ''}
        </div>
        <div style="text-align:center;font-size:11px;color:#1a73e8;margin-top:8px">👆 點頭像看完整明細</div>
        <div class="pay-box">
          <div class="pay-net">應發薪資　$${net.toLocaleString()}</div>
          <div class="pay-detail">
            ${isFull?'月薪':'本薪'} $${base.toLocaleString()}${ot.pay?`　＋加班 $${ot.pay.toLocaleString()}`:''}${absentDeduct?`　－曠職 $${absentDeduct.toLocaleString()}`:''}${lateDeduct?`　－遲退 $${lateDeduct.toLocaleString()}`:''}${leaveDeduct?`　－請假 $${leaveDeduct.toLocaleString()}`:''}${laborIns?`　－勞保 $${laborIns.toLocaleString()}`:''}${healthIns?`　－健保 $${healthIns.toLocaleString()}`:''}
          </div>
        </div>
      </div>`;
    });
    setView(h + '</div>');
  } catch (e) { setView(`<div class="view"><div class="err-box">${e.message}</div></div>`); }
}

// 點員工頭像 → 完整明細彈窗（跟員工核對用）
function showReportDetail(email) {
  if (!_RPT) return;
  const w = (WORKERS || []).find(x => x.email === email);
  if (!w) return;
  const { recs, leaves, otAll, incomplete, ym, year, month, workDays } = _RPT;
  const isFull = w.emp_type === '正式員工';
  const sh = CONFIG.SHIFTS[w.shift];
  const shHours = sh ? sh.hours : 8;
  const hourly = isFull ? Math.round(w.monthly_salary / 240) : w.weekday_rate;
  const wr = recs.filter(r => r.email === email);

  // 遲到 / 早退逐筆
  const lateRows = [], earlyRows = [];
  let lateMin = 0, earlyMin = 0;
  if (sh) {
    wr.forEach(r => {
      if (r.start_time) { const d = toMin(r.start_time) - toMin(sh.am[0]); if (d > 0) { lateMin += d; lateRows.push(`${addDay(r.date)}　${r.start_time} 上班　遲到 ${d} 分`); } }
      if (r.end_time)   { const d = toMin(sh.pm[1]) - toMin(r.end_time);   if (d > 0) { earlyMin += d; earlyRows.push(`${addDay(r.date)}　${r.end_time} 下班　早退 ${d} 分`); } }
    });
  }
  const latePen = lateMin > 15 ? lateMin : 0, earlyPen = earlyMin > 15 ? earlyMin : 0;
  const lateDeduct = Math.round((latePen + earlyPen) / 60 * hourly);

  // 加班費明細
  const od = overtimeDetail(email, otAll, ym, hourly);
  const otRows = od.rows.map(r =>
    r.paid <= 0
      ? `${addDay(r.date)}　加班 ${r.orig}h → 補休全抵 ${r.used}h（不計薪）`
      : `${addDay(r.date)}　加班 ${r.orig}h${r.used ? `（補休抵 ${r.used}h）` : ''} → 計薪 ${r.paid}h${r.weekend ? '(休息日)' : ''}　$${r.pay}`
  );

  // 補休明細（當月已核准）
  const compRows = otAll.filter(o => o.email === email && o.ot_type === '補休' && o.status === 'approved' && (o.date || '').startsWith(ym))
    .map(o => `${addDay(o.date)}${(o.start_time && o.end_time) ? ` ${o.start_time}–${o.end_time}` : ''}　${o.hours}h`);

  // 漏打下班明細
  const noOutRows = (incomplete || []).filter(r => r.email === email)
    .map(r => `${addDay(r.date)}　${r.start_time} 上班，未打下班卡`);

  // 請假明細（當月已核准）
  const appr = leaves.filter(l => l.email === email && l.status === 'approved' && (l.start_date || '').startsWith(ym));
  const leaveRows = appr.map(l => {
    const ded = oneLeaveDeduct(l, hourly);
    const urgent = isUrgentLeave(l) ? ' ⚡臨時' : '';
    const tr = (l.start_time && l.end_time) ? ` ${l.start_time}–${l.end_time}` : '';
    return `${addDay(l.start_date)}${tr}　${l.leave_type}${urgent}　${l.hours}h　扣 $${ded}`;
  });

  // 特休
  const annualTotal = isFull ? calcAnnualLeave(w.start_date) : 0;
  const usedAnnual = isFull ? Math.round(
    leaves.filter(l => l.email === email && l.leave_type === '特休' && l.status === 'approved' && (l.start_date || '').startsWith(String(year)))
      .reduce((s, l) => s + (parseFloat(l.hours) || 0), 0) / shHours * 100) / 100 : 0;

  // 薪資彙整
  const totP = wr.reduce((s, r) => s + (Number(r.subtotal) || 0), 0);
  const attendDays = new Set(wr.map(r => r.date)).size;
  const ab = isFull ? analyzeAbsence(w, recs, leaves, year, month) : { confirmed: 0, pending: [] };
  const absent = ab.confirmed;
  const absentDeduct = isFull ? Math.round(absent * (w.monthly_salary / 30)) : 0;
  const leaveDeduct = calcLeaveDeduct(appr, hourly);
  const base = isFull ? w.monthly_salary : totP;
  const laborIns  = isFull ? laborInsuranceEE(w.monthly_salary) : 0;
  const healthIns = isFull ? healthInsuranceEE(w.monthly_salary, w.dependents) : 0;
  const net = Math.round(base + od.totalPay - absentDeduct - lateDeduct - leaveDeduct - laborIns - healthIns);

  const section = (title, rows, empty) =>
    `<div class="rd-sec"><div class="rd-title">${title}</div>` +
    (rows.length ? rows.map(r => `<div class="rd-row">${r}</div>`).join('') : `<div class="rd-empty">${empty}</div>`) +
    `</div>`;

  openModal(`
    <div class="modal-title">${escHtml(w.name)} ・ ${ym} 明細</div>
    <div style="font-size:12px;color:#999;margin-bottom:12px">${isFull ? '正職' : '工讀'}${w.shift ? ` ・ ${w.shift} 班` : ' ・ 未設班別'} ・ 實出勤 ${attendDays} 天 ・ 時薪基準 $${hourly}</div>
    ${section('🕐 遲到（月累計 >15 分才扣薪）', lateRows, '無遲到')}
    ${section('🕐 早退（月累計 >15 分才扣薪）', earlyRows, '無早退')}
    ${section('💪 加班費（補休先扣最早的加班）', otRows, '無加班')}
    ${od.compTotal ? `<div class="rd-row" style="color:#9333ea;font-weight:600">本月補休共 ${od.compTotal}h，已優先抵扣最早的加班</div>` : ''}
    ${section('🔄 補休', compRows, '無補休')}
    ${section('🌴 請假', leaveRows, '無請假')}
    ${section('⚠️ 漏打下班', noOutRows, '無')}
    ${isFull && ab.pending.length ? section('🟠 缺席待補單（30hr 內補請假否則計曠職）', ab.pending.map(p => `${addDay(p.ds)}　剩 ${p.hoursLeft} 小時`), '') : ''}
    ${isFull ? `<div class="rd-sec"><div class="rd-title">📅 特休</div><div class="rd-row">應有 <b>${annualTotal}</b> 天　已用 <b>${usedAnnual}</b> 天　剩餘 <b>${Math.round((annualTotal - usedAnnual) * 100) / 100}</b> 天</div></div>` : ''}
    ${isFull ? `<div class="rd-sec"><div class="rd-title">🏥 勞健保自付（投保級距 $${insuranceGrade(w.monthly_salary).toLocaleString()}）</div><div class="rd-row">勞保 $${laborIns}　健保 $${healthIns}${w.dependents ? `（含 ${w.dependents} 眷口）` : '（本人）'}</div></div>` : ''}
    <div class="pay-box" style="margin-top:14px">
      <div class="pay-net">應發薪資　$${net.toLocaleString()}</div>
      <div class="pay-detail">${isFull ? '月薪' : '本薪'} $${base.toLocaleString()}${od.totalPay ? `　＋加班 $${od.totalPay.toLocaleString()}` : ''}${absentDeduct ? `　－曠職 $${absentDeduct.toLocaleString()}` : ''}${lateDeduct ? `　－遲退 $${lateDeduct.toLocaleString()}` : ''}${leaveDeduct ? `　－請假 $${leaveDeduct.toLocaleString()}` : ''}${laborIns ? `　－勞保 $${laborIns.toLocaleString()}` : ''}${healthIns ? `　－健保 $${healthIns.toLocaleString()}` : ''}</div>
    </div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">關閉</button></div>
  `, true);
}

async function doApprove() {
  const req = _MD.req;
  try {
    if (!WORKERS.length) WORKERS = await getAllWorkers();
    const worker = WORKERS.find(w => w.email === req.email);
    let hours = 0, subtotal = 0;
    if (worker) {
      const start = parseDatetime(`${req.date} ${req.start_time}`);
      const end = parseDatetime(`${req.date} ${req.end_time}`);
      const grossMin = (end - start) / 60000;
      hours = Math.round(grossMin / 60 * 100) / 100;
      subtotal = Math.round(hours * calcRate(req.date, worker));
    }
    const F = CONFIG.FID.R;
    await ragicPost(CONFIG.SHEETS.RECORDS, {
      [F.email]: req.email, [F.name]: req.name,
      [F.date]: req.date, [F.start_time]: req.start_time, [F.end_time]: req.end_time,
      [F.location]: req.location, [F.work_content]: req.work_content,
      [F.hours]: String(hours), [F.subtotal]: String(subtotal),
      [F.breaks_minutes]: '0', [F.paused_at]: '', [F.rec_status]: ''
    });
    const FQ = CONFIG.FID.Q;
    await ragicUpdate(CONFIG.SHEETS.REQUESTS, req.ragicId, {

const LEAVE_TYPES = ['特休','病假','事假','臨時假','其他'];
const LEAVE_STATUS = { pending:'待審核', approved:'已核准', rejected:'已駁回' };

function toMin(t) { const [h,m] = String(t||'').split(':').map(Number); return (h||0)*60 + (m||0); }

// 時間文字輸入自動補冒號：0830 → 08:30
function fmtTimeInput(el) {
  let v = el.value.replace(/[^0-9]/g, '').slice(0, 4);
  if (v.length >= 3) v = v.slice(0, 2) + ':' + v.slice(2);
  el.value = v;
}

// 計算時數：扣除午休 12:30–14:00 的重疊
function calcLeaveHours(start, end) {
  if (!start || !end) return 0;
  let mins = toMin(end) - toMin(start);
  if (mins <= 0) return 0;
  const [ls, le] = CONFIG.LUNCH.map(toMin);
  mins -= Math.max(0, Math.min(toMin(end), le) - Math.max(toMin(start), ls));
  return Math.round(mins / 60 * 100) / 100;
}

// 駁回原因快捷
const REJECT_PRESETS = ['時數異常請重新確認', '未與主管交接知會', '未附上證明文件'];
function rejectPresetBtns(targetId) {
  return `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">` +
    REJECT_PRESETS.map(t =>
      `<button type="button" class="btn-quick" style="flex:none;padding:5px 10px;font-size:12px" onclick="document.getElementById('${targetId}').value='${t}'">${t}</button>`
    ).join('') + `</div>`;
}

// 臨時假：請假起始時間 與 申請時間 相差不足 72 小時
function isUrgentLeave(lv) {
  if (!lv.start_date || !lv.apply_time) return false;
  const leaveDt = new Date(`${lv.start_date} ${lv.start_time || '00:00'}`);
  const applyDt = new Date(lv.apply_time);
  if (isNaN(leaveDt) || isNaN(applyDt)) return false;
  return (leaveDt - applyDt) / 3600000 < 72;
}

// 補單逾期：請假事由發生後，超過 12 小時才補送假單
function isOverdueLeave(lv) {
  if (!lv.start_date || !lv.apply_time) return false;
  const leaveDt = new Date(`${lv.start_date} ${lv.start_time || '00:00'}`);
  const applyDt = new Date(lv.apply_time);
  if (isNaN(leaveDt) || isNaN(applyDt)) return false;
  return (applyDt - leaveDt) / 3600000 > 12;
}

// 補單逾期累進扣分次數：12hr 內準時(0)，每超過 12hr 多扣一次
function leaveOverduePenalty(lv) {
  if (!lv.start_date || !lv.apply_time) return 0;
  const leaveDt = new Date(`${lv.start_date} ${lv.start_time || '00:00'}`);
  const applyDt = new Date(lv.apply_time);
  if (isNaN(leaveDt) || isNaN(applyDt)) return 0;
  const delay = (applyDt - leaveDt) / 3600000;
  return Math.max(0, Math.ceil((delay - 12) / 12));  // 13~24hr→1次、25~36hr→2次…
}

function parseLeaveRec(r) {
  const F = CONFIG.FID.L;
  return {
    ragicId:     r._ragicId,
    email:       r[F.email]       || '',
    name:        r[F.name]        || '',
    leave_type:  r[F.leave_type]  || '',
    start_date:  (r[F.start_date] || '').slice(0,10).replace(/-/g,'/'),
    end_date:    (r[F.end_date]   || '').slice(0,10).replace(/-/g,'/'),
    days:        r[F.days]        || '',
    hours:       r[F.hours]       || '',
    start_time:  stripSec(r[F.start_time]) || '',
    end_time:    stripSec(r[F.end_time])   || '',
    reason:      r[F.reason]      || '',
    apply_time:  r[F.apply_time]  || '',
    status:      r[F.status]      || 'pending',
    reviewed_by: r[F.reviewed_by] || '',
    reviewed_at: r[F.reviewed_at] || '',
    reject_note: r[F.reject_note] || '',
    photo:       resolvePhotoUrl(r._ragicId, r[F.photo])
  };
}

async function uploadLeavePhoto(ragicId, file) {
  if (!CONFIG.FID.L.photo) return;  // 尚未設定照片欄位 ID
  const keyParam = CONFIG.RAGIC_KEY ? `&APIKey=${encodeURIComponent(CONFIG.RAGIC_KEY)}` : '';
  const url = `${ragicUrl(CONFIG.SHEETS.LEAVES)}/${ragicId}?api${keyParam}`;
  const fd = new FormData();
  fd.append(String(CONFIG.FID.L.photo), file);
  const res = await fetch(url, { method:'POST', body:fd });
  if (!res.ok) throw new Error('照片上傳失敗 ' + res.status);
}

function buildLeaveCard(lv, isAdmin) {
  const stCls = { pending:'st-pending', approved:'st-approved', rejected:'st-rejected' }[lv.status] || '';
  const stLabel = LEAVE_STATUS[lv.status] || lv.status;
  const stBadge = `<span class="b-${lv.status}">${stLabel}</span>`;
  const nameTag = isAdmin ? `<span class="leave-name">${escHtml(lv.name)}</span>` : '';
  const rejectNote = lv.reject_note ? `<div class="leave-note">駁回原因：${escHtml(lv.reject_note)}</div>` : '';
  const adminBtn = isAdmin && lv.status === 'pending'
    ? `<button class="btn btn-sm" style="padding:5px 12px;font-size:12px" onclick="showLeaveApproval(${lv.ragicId})">審核</button>`
    : '';
  const dayNum  = parseFloat(lv.days) || 0;
  const hourNum = parseFloat(lv.hours) || 0;
  const amount  = dayNum >= 1
    ? `共 ${dayNum % 1 === 0 ? dayNum : dayNum.toFixed(1)} 天`
    : `${hourNum} 小時`;
  const timeRange = (lv.start_time && lv.end_time) ? `${lv.start_time}–${lv.end_time}` : '';
  const urgent = isUrgentLeave(lv) ? `<span class="urgent-badge">⚡ 臨時假</span>` : '';
  const ap = lv.apply_time || '';
  const applyTxt = ap ? `${addDay(ap)} ${ap.slice(11,16)}` : '—';
  const ownerEdit = isAdmin ? '' :
    lv.status === 'pending'
      ? `<button class="btn btn-sm" style="padding:5px 12px;font-size:12px;background:#e8f0fe;color:#1a73e8;border:none;border-radius:8px;cursor:pointer" onclick="editMyLeave(${lv.ragicId})">編輯</button>`
      : lv.status === 'rejected'
      ? `<button class="btn btn-sm" style="padding:5px 12px;font-size:12px;background:#e8f0fe;color:#1a73e8;border:none;border-radius:8px;cursor:pointer" onclick="editMyLeave(${lv.ragicId})">重新申請</button>
         <button class="btn btn-sm" style="padding:5px 12px;font-size:12px;background:#fce8e6;color:#ea4335;border:none;border-radius:8px;cursor:pointer" onclick="cancelMyLeave(${lv.ragicId})">取消</button>`
      : '';
  return `
    <div class="leave-card ${stCls}">
      <div class="leave-hd">
        <div class="leave-hd-left">
          ${nameTag}
          <span class="leave-type">${escHtml(lv.leave_type)}</span>
          <span class="leave-date-main">${addDay(lv.start_date)}${timeRange ? ' '+timeRange : ''}</span>
        </div>
        <div class="leave-hd-right">
          <span class="leave-days">${amount}</span>
          ${stBadge}
          ${adminBtn}
          ${ownerEdit}
        </div>
      </div>
      <div class="leave-reason">${escHtml(lv.reason)}</div>
      ${lv.photo ? `<img class="leave-photo" src="${lv.photo}" onclick="window.open('${lv.photo}','_blank')">` : ''}
      ${rejectNote}
      <div class="leave-apply">${urgent}申請：${applyTxt}</div>
    </div>`;
}
