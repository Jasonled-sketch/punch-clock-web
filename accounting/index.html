<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e17">
<title>USLED 記帳 · 拍照入帳</title>
<style>
:root{
  --bg:#0a0e17; --bg2:#111725; --card:#161d2e; --card2:#1b2334;
  --line:#26304a; --tx:#e7ecf5; --tx2:#93a0bd; --tx3:#5f6c8a;
  --brand:#2dd4bf; --brand2:#38bdf8; --in:#34d399; --out:#fb7185;
  --warn:#fbbf24; --danger:#f43f5e; --ok:#34d399;
  --glow:0 0 0 1px rgba(45,212,191,.25), 0 8px 30px -8px rgba(45,212,191,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,"Noto Sans TC","PingFang TC",system-ui,sans-serif;
  background:radial-gradient(1200px 800px at 20% -10%,#132033 0%,#070a12 55%);color:var(--tx);min-height:100vh}
.wrap{max-width:520px;margin:0 auto;padding:18px 16px 60px}
.hd{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--brand),var(--brand2));
  display:grid;place-items:center;font-weight:800;color:#04121a;font-size:19px;box-shadow:var(--glow)}
.hd h1{font-size:18px;margin:0;letter-spacing:.3px}
.hd .sub{color:var(--tx2);font-size:12px;margin-top:2px}
.ver{margin-left:auto;font-size:11px;color:var(--brand);border:1px solid rgba(45,212,191,.3);
  padding:4px 10px;border-radius:20px;background:rgba(45,212,191,.07);white-space:nowrap}

.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;padding:10px 4px;border-radius:12px;border:1px solid var(--line);background:var(--card);
  color:var(--tx2);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.tab.on{background:rgba(45,212,191,.13);color:var(--brand);border-color:rgba(45,212,191,.35)}

.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
.sec{margin:16px 2px 9px;font-size:12px;color:var(--tx3);font-weight:700;letter-spacing:.5px}

/* camera / scan area */
.cam{position:relative;border-radius:18px;overflow:hidden;margin-top:4px;background:#0d1422;
  display:grid;place-items:center;border:1px solid var(--line);min-height:220px}
.cam video{width:100%;display:block;max-height:340px;object-fit:cover;background:#000}
.cam .overlay{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none}
.frameq{width:200px;height:120px;border-radius:12px;position:relative}
.frameq::before,.frameq::after{content:"";position:absolute;width:30px;height:30px;border:3px solid var(--brand)}
.frameq::before{top:0;left:0;border-right:0;border-bottom:0;border-radius:8px 0 0 0}
.frameq::after{bottom:0;right:0;border-left:0;border-top:0;border-radius:0 0 8px 0}
.scanline{position:absolute;left:8px;right:8px;height:2px;background:linear-gradient(90deg,transparent,var(--brand),transparent);
  top:10px;animation:scan 2.2s ease-in-out infinite}
@keyframes scan{0%,100%{top:12px}50%{top:106px}}
.camhint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:12px;color:var(--brand);text-shadow:0 1px 4px #000}
.camhint .mini{color:#cbd5e1;font-size:11px;margin-top:2px}
.camoff{padding:34px 18px;text-align:center;color:var(--tx3);font-size:13px;line-height:1.8}

/* slot indicators */
.slots{display:flex;gap:10px;margin-top:12px}
.slot{flex:1;display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);
  border-radius:13px;padding:10px 12px;font-size:12.5px;color:var(--tx3)}
.slot .led{width:10px;height:10px;border-radius:50%;background:#2a3550;flex:0 0 auto}
.slot.got{color:var(--tx);border-color:rgba(52,211,153,.4)}
.slot.got .led{background:var(--ok);box-shadow:0 0 8px rgba(52,211,153,.7)}

.btnrow{display:flex;gap:10px;margin-top:14px}
.btn{flex:1;padding:13px;border-radius:13px;border:0;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#04121a}
.btn.ghost{background:var(--card);color:var(--tx);border:1px solid var(--line)}
.btn.warn{background:rgba(251,191,36,.14);color:var(--warn);border:1px solid rgba(251,191,36,.35)}
.btn:disabled{opacity:.45;cursor:not-allowed}

textarea{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:12px;color:var(--tx);
  font-family:ui-monospace,Consolas,monospace;font-size:12px;padding:10px;min-height:64px;resize:vertical}
textarea:focus{outline:none;border-color:rgba(45,212,191,.5)}
label.lb{display:block;font-size:12px;color:var(--tx2);margin:10px 0 5px}

/* recognized card */
.pill{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:700}
.pill.ok{background:rgba(52,211,153,.14);color:var(--ok)}
.pill.warn{background:rgba(251,191,36,.16);color:var(--warn)}
.pill.bad{background:rgba(244,63,94,.14);color:var(--danger)}
.pill.gray{background:#222c42;color:var(--tx2)}
.recog .head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.recog .head .st{font-size:12px;color:var(--brand);font-weight:700}
.kv{display:flex;justify-content:space-between;gap:10px;padding:9px 2px;border-bottom:1px dashed var(--line);font-size:13px}
.kv:last-child{border-bottom:0}
.kv .k{color:var(--tx2);flex:0 0 auto}
.kv .v{font-weight:600;text-align:right;word-break:break-all}
.kv .v.big{color:var(--in);font-size:16px}
.src{font-size:9.5px;color:var(--tx3);margin-left:5px}
.items{margin-top:4px}
.item{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;padding:6px 2px;color:var(--tx)}
.item .q{color:var(--tx3);flex:0 0 auto}
.alert{display:flex;gap:11px;align-items:flex-start;border-radius:14px;padding:12px 13px;margin-top:12px;
  background:linear-gradient(120deg,rgba(251,191,36,.13),rgba(251,191,36,.03));border:1px solid rgba(251,191,36,.3)}
.alert.err{background:linear-gradient(120deg,rgba(244,63,94,.14),rgba(244,63,94,.04));border-color:rgba(244,63,94,.32)}
.alert .ai{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto;
  background:rgba(251,191,36,.16);color:var(--warn);font-weight:800;font-size:12px}
.alert.err .ai{background:rgba(244,63,94,.18);color:var(--danger)}
.alert .txt{font-size:12px;line-height:1.55;color:var(--tx)}
.alert .txt small{color:var(--tx2);display:block;margin-top:2px}

/* in/out toggle */
.iotoggle{display:flex;gap:8px}
.iotoggle button{flex:1;padding:9px;border-radius:11px;font-family:inherit;font-size:13px;font-weight:700;
  background:var(--bg2);color:var(--tx3);border:1px solid var(--line);cursor:pointer}
.iotoggle button.on-in{background:rgba(52,211,153,.14);color:var(--in);border-color:rgba(52,211,153,.4)}
.iotoggle button.on-out{background:rgba(251,113,133,.14);color:var(--out);border-color:rgba(251,113,133,.4)}

.authbar{margin-bottom:12px}
.authchip{width:100%;padding:9px 12px;border-radius:12px;border:1px solid var(--line);background:var(--card);
  color:var(--tx2);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;text-align:left}
.authchip.ok{color:var(--in);border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.07)}
.okbox{display:flex;gap:11px;align-items:flex-start;border-radius:14px;padding:12px 13px;margin-top:12px;
  background:linear-gradient(120deg,rgba(52,211,153,.14),rgba(52,211,153,.03));border:1px solid rgba(52,211,153,.35)}
.okbox .ai{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto;
  background:rgba(52,211,153,.16);color:var(--ok);font-weight:800}
.okbox .txt{font-size:12.5px;line-height:1.6}
.okbox a{color:var(--brand)}
select.cat{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--tx);
  font-family:inherit;font-size:13px;padding:9px 10px;margin-top:6px}
select.cat:focus{outline:none;border-color:rgba(45,212,191,.5)}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.kpi{background:linear-gradient(160deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:16px;padding:13px 14px;text-align:left}
.kpi .lb{font-size:11.5px;color:var(--tx2)}
.kpi .vl{font-size:20px;font-weight:800;margin-top:6px}
.chart{display:flex;align-items:flex-end;gap:10px;height:110px;padding:8px 2px 0}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;justify-content:flex-end;height:100%}
.chart .bars{display:flex;gap:3px;align-items:flex-end;height:100%;width:100%;justify-content:center}
.chart .bars i{width:9px;border-radius:4px 4px 0 0;display:block;min-height:2px}
.chart .bi{background:linear-gradient(var(--in),rgba(52,211,153,.3))}
.chart .bo{background:linear-gradient(var(--out),rgba(251,113,133,.3))}
.chart .col span{font-size:10px;color:var(--tx3)}
.legend{display:flex;gap:16px;font-size:11px;color:var(--tx2);margin-top:8px;justify-content:center}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
.rrow{display:flex;align-items:center;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line);font-size:12.5px}
.rrow:last-child{border-bottom:0}
.rrow .n{flex:1;min-width:0;text-align:left}
.rrow .n .a{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rrow .n .b{font-size:10.5px;color:var(--tx3);margin-top:2px}
.rrow .amt{font-weight:800;white-space:nowrap}
/* 日結 stepper 與表單 */
.stepper{display:flex;align-items:center;margin:6px 0 14px}
.step{flex:1;text-align:center;position:relative}
.step .n{width:26px;height:26px;border-radius:50%;background:var(--card);border:1px solid var(--line);
  display:grid;place-items:center;margin:0 auto 5px;font-size:12px;font-weight:700;color:var(--tx3)}
.step.done .n{background:var(--brand);color:#04121a;border-color:var(--brand)}
.step.now .n{background:rgba(45,212,191,.15);color:var(--brand);border-color:var(--brand)}
.step .lb{font-size:10px;color:var(--tx3)}
.step.done .lb,.step.now .lb{color:var(--tx)}
.step::after{content:"";position:absolute;top:13px;left:60%;right:-40%;height:2px;background:var(--line)}
.step.done::after{background:var(--brand)}
.step:last-child::after{display:none}
.balance{display:flex;justify-content:space-between;align-items:center;padding:10px 2px;font-size:13.5px;border-bottom:1px solid var(--line)}
.balance:last-child{border-bottom:0}
.balance.diff{font-weight:800}
.balance .v{font-weight:700}
input.dcin{width:130px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--tx);
  font-family:inherit;font-size:14px;padding:8px 10px;text-align:right}
input.dcin:focus{outline:none;border-color:rgba(45,212,191,.5)}
input.dcin.wide{width:100%;text-align:left}
.toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);opacity:0;
  background:#1b2334;color:var(--tx);border:1px solid var(--line);border-radius:13px;padding:11px 18px;
  font-size:13px;transition:.25s;pointer-events:none;z-index:99;box-shadow:0 10px 30px -10px #000;max-width:88vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.foot{text-align:center;color:var(--tx3);font-size:11px;margin-top:26px;line-height:1.8}
[hidden]{display:none !important}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="logo">U</div>
    <div>
      <h1>拍照入帳</h1>
      <div class="sub">電子發票雙 QR 解析 · AI 提案卡片</div>
    </div>
    <div class="ver" id="verTag">v0.0.0</div>
  </div>

  <div class="authbar" id="authBar">
    <button class="authchip" id="authChip">🔐 未登入 · 點我 Google 登入</button>
  </div>

  <div class="tabs">
    <button class="tab on" data-mode="live">📷 掃描</button>
    <button class="tab" data-mode="photo">🖼️ 拍照</button>
    <button class="tab" data-mode="paste">⌨️ 貼碼</button>
    <button class="tab" data-mode="dash">📊 總覽</button>
    <button class="tab" data-mode="dc">⚖️ 日結</button>
  </div>

  <!-- 即時掃描 -->
  <div data-pane="live">
    <div class="cam">
      <video id="video" playsinline muted hidden></video>
      <div class="camoff" id="camOff">按下方「開啟相機」開始掃描<br>對準發票左右兩段 QR，會自動拼接</div>
      <div class="overlay" id="camOverlay" hidden>
        <div class="frameq"><div class="scanline"></div></div>
        <div class="camhint">對準電子發票證明聯<div class="mini">左右兩段 QR 自動拼接 · 免打字</div></div>
      </div>
    </div>
    <div class="btnrow">
      <button class="btn primary" id="btnCam">開啟相機</button>
      <button class="btn ghost" id="btnCamStop" hidden>停止</button>
    </div>
  </div>

  <!-- 拍照/選圖 -->
  <div data-pane="photo" hidden>
    <div class="card" style="text-align:center;padding:26px 16px">
      <div style="font-size:34px">🧾</div>
      <div style="font-size:13px;color:var(--tx2);margin:10px 0 16px;line-height:1.7">
        手機會直接開相機，電腦則選擇發票照片。<br>一張照片同時拍到左右兩個 QR 最好。</div>
      <div class="btnrow" style="margin-top:0">
        <button class="btn primary" id="btnShoot">📸 拍照 / 選圖</button>
      </div>
      <div class="btnrow" style="margin-top:10px">
        <button class="btn ghost" id="btnAlbum">📁 相簿批次匯入（可多選）</button>
      </div>
      <input type="file" id="fileInput" accept="image/*" capture="environment" hidden>
      <input type="file" id="albumInput" accept="image/*" multiple hidden>
    </div>
  </div>

  <!-- 貼碼測試 -->
  <div data-pane="paste" hidden>
    <div class="card">
      <label class="lb" style="margin-top:0">左 QR 原文（77 碼固定欄位＋明細）</label>
      <textarea id="pasteLeft" placeholder="AB123456781150716…"></textarea>
      <label class="lb">右 QR 原文（以 ** 起始，可留空）</label>
      <textarea id="pasteRight" placeholder="**:電源供應器:1:640…"></textarea>
      <div class="btnrow">
        <button class="btn warn" id="btnSample">填入範例</button>
        <button class="btn primary" id="btnParse">解析</button>
      </div>
    </div>
  </div>

  <!-- 統計總覽 -->
  <div data-pane="dash" hidden>
    <div id="dashBody" class="card" style="text-align:center;color:var(--tx3);padding:30px 16px">載入中…</div>
  </div>

  <!-- 日結對帳 -->
  <div data-pane="dc" hidden>
    <div id="dcBody" class="card" style="text-align:center;color:var(--tx3);padding:30px 16px">載入中…</div>
  </div>

  <!-- QR 槽位狀態 -->
  <div class="slots" id="slotsBar">
    <div class="slot" id="slotL"><span class="led"></span><span>左 QR（固定欄位）</span></div>
    <div class="slot" id="slotR"><span class="led"></span><span>右 QR（明細承接）</span></div>
  </div>

  <!-- 解析結果：AI 提案卡片 -->
  <div id="result"></div>

  <div class="foot">USLED 譽昇光電 · 記帳系統 步驟 2 原型<br>QR 純解碼零成本 · 尚未接 Ragic 寫入</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>

const APP_VERSION = '0.6.0';
document.getElementById('verTag').textContent = 'v' + APP_VERSION;

// ── 歸類科目三層體系（同支出紀錄表：截圖選項＋971筆歷史記錄合併，2026-07-20）──

// 依品項/賣方關鍵字自動建議（可手動改，只是省點選時間）
const SUGGEST_RULES = [

/* ═══════════════ 台灣電子發票 QR 解析器（瀏覽器版） ═══════════════
   規格：財政部 v1.9。三大雷點全處理：
   1. 銷售額/總計額為 8 碼十六進位 → parseInt(hex,16)
   2. 完整明細橫跨左右兩段 QR；右段固定 "**" 起始，去掉後接在左段之後
   3. 中文編碼參數 0=Big5 / 1=UTF-8 / 2=Base64 / 3=UTF-8(境外)
   輸入一律用「每 byte 一字元」的 latin1 字串承載，品名再依編碼參數還原。 */

function bytesToLatin1(bytes){
  let s = '';
  for (let i = 0; i < bytes.length; i += 4096)
    s += String.fromCharCode.apply(null, bytes.slice(i, i + 4096));
  return s;
}
function latin1ToBytes(str){
  const b = new Uint8Array(str.length);
  for (let i = 0; i < str.length; i++) b[i] = str.charCodeAt(i) & 0xff;
  return b;
}
function tryDecode(bytes, enc){
  try { return new TextDecoder(enc, { fatal: true }).decode(bytes); } catch (_) { return null; }
}
// 掃碼來的字串是「每 byte 一字元」；貼上的字串已是解好的文字（含 >0xFF 字元）不可再過 byte 解碼
function isByteString(s){
  for (let i = 0; i < s.length; i++) if (s.charCodeAt(i) > 0xff) return false;
  return true;
}

function rocToISO(roc){
  if (!/^\d{7}$/.test(roc)) return null;
  const y = parseInt(roc.slice(0, 3), 10) + 1911;
  return `${y}-${roc.slice(3, 5)}-${roc.slice(5, 7)}`;
}

function decodeItemName(raw, encodingParam){
  try {
    let v = null, needsBig5 = false;
    const rawIsBytes = isByteString(raw) && /[\x80-\xff]/.test(raw);
    if (encodingParam === 1 || encodingParam === 3) {
      v = rawIsBytes ? (tryDecode(latin1ToBytes(raw), 'utf-8') ?? raw) : raw;
    } else if (encodingParam === 2) {
      v = tryDecode(latin1ToBytes(atob(raw)), 'utf-8') ?? raw;
    } else if (encodingParam === 0) {
      if (rawIsBytes) {
        const d = tryDecode(latin1ToBytes(raw), 'big5');
        if (d != null) v = d; else { v = raw; needsBig5 = true; }
      } else v = raw;
    } else {
      v = raw;
    }
    // 部分 POS 品名走 URL 編碼（%E9%9B%BB…）→ 再解一層
    if (/%[0-9A-Fa-f]{2}/.test(v)) { try { v = decodeURIComponent(v); } catch (_) {} }
    return { value: v, needsBig5Decode: needsBig5 };
  } catch (_) {
    return { value: raw, needsBig5Decode: encodingParam === 0 };
  }
}

function parseEInvoiceQR(leftRaw, rightRaw){
  if (typeof leftRaw !== 'string' || leftRaw.length < 77)
    return { ok: false, error: 'LEFT_QR_TOO_SHORT' };

  let rightTail = '';
  if (typeof rightRaw === 'string' && rightRaw.length > 0) {
    if (!rightRaw.startsWith('**')) return { ok: false, error: 'RIGHT_QR_BAD_PREFIX' };
    rightTail = rightRaw.slice(2);
  }
  const combined = leftRaw + rightTail;

  const fixed = combined.slice(0, 77);
  const invoiceNumber = fixed.slice(0, 10);
  const dateRoc       = fixed.slice(10, 17);
  const randomCode    = fixed.slice(17, 21);
  const salesHex      = fixed.slice(21, 29);
  const totalHex      = fixed.slice(29, 37);
  const buyerId       = fixed.slice(37, 45);
  const sellerId      = fixed.slice(45, 53);
  const encryptVerify = fixed.slice(53, 77);

  const salesAmount = parseInt(salesHex, 16);   // ☠️ hex → 十進位
  const totalAmount = parseInt(totalHex, 16);   // ☠️ hex → 十進位

  const rest = combined.slice(77);
  const items = [];
  let encodingParam = null, encodingName = null, detailConfidence = 'high';
  let declaredTotal = null;

  if (rest.length > 0) {
    const seg = rest.split(':');
    // 規格順序：'' , 自訂區10碼 , 完整品目總筆數 , 本張品目筆數 , 中文編碼參數 , 品名 , 數量 , 單價 , …
    // ⚠️ 總筆數是 2 或 3 時也符合 /^[0-3]$/，不能用「第一個 0–3 欄位」猜編碼參數 → 先照規格定位
    let encIdx = -1;
    if (seg.length >= 5 && /^\d+$/.test(seg[2]) && /^\d+$/.test(seg[3]) && /^[0-3]$/.test(seg[4])) {
      encIdx = 4;
      declaredTotal = parseInt(seg[2], 10);
    } else {
      encIdx = seg.findIndex((s, i) => i > 0 && /^[0-3]$/.test(s)); // 非標準自訂區的退路
    }
    if (encIdx >= 0) {
      encodingParam = parseInt(seg[encIdx], 10);
      encodingName = { 0: 'Big5', 1: 'UTF-8', 2: 'Base64', 3: 'UTF-8(境外電商)' }[encodingParam];
      const detail = seg.slice(encIdx + 1).filter(s => s.length > 0);
      for (let i = 0; i + 2 < detail.length; i += 3) {
        const name = decodeItemName(detail[i], encodingParam);
        if (name == null) continue;
        items.push({ name: name.value, qty: detail[i + 1], price: detail[i + 2],
                     needsBig5Decode: name.needsBig5Decode });
      }
      if (items.some(it => it.needsBig5Decode)) detailConfidence = 'low_big5_undecoded';
      else if (declaredTotal != null && items.length < declaredTotal)
        detailConfidence = rightRaw ? 'count_mismatch' : 'missing_right_qr';
    } else {
      detailConfidence = 'no_encoding_param';
    }
  }

  return {
    ok: true,
    source: rightRaw ? 'dual-qr' : 'left-qr-only',
    invoiceNumber, date: rocToISO(dateRoc), dateRoc, randomCode,
    sellerId, buyerId: buyerId === '00000000' ? null : buyerId,
    salesAmount, totalAmount, tax: totalAmount - salesAmount,
    encryptVerify, items, declaredTotal, encodingParam, encodingName, detailConfidence,
  };
}

function dedupeKey(p){ return `${p.invoiceNumber}_${p.sellerId}`; }

/* ═══════════════ QR 槽位（左/右）與狀態 ═══════════════ */
const state = { left: null, right: null, io: 'out', photoBlob: null, photoName: '' };

function classifyQR(latin1){
  if (latin1.startsWith('**')) return 'right';
  if (latin1.length >= 77 && /^[A-Z]{2}\d{8}\d{7}/.test(latin1)) return 'left';
  return 'unknown';
}

function acceptQR(latin1){
  const kind = classifyQR(latin1);
  if (kind === 'unknown') return false;
  if (state[kind] === latin1) return false;   // 同一顆重複掃到
  state[kind] = latin1;
  updateSlots();
  if (state.left) renderResult(parseEInvoiceQR(state.left, state.right));
  else toast('已掃到右段 QR，請再對準左段（含發票號碼那顆）');
  return true;
}

function resetScan(){
  state.left = null; state.right = null;
  state.photoBlob = null; state.photoName = '';
  updateSlots();
  document.getElementById('result').innerHTML = '';
}

function updateSlots(){
  document.getElementById('slotL').classList.toggle('got', !!state.left);
  document.getElementById('slotR').classList.toggle('got', !!state.right);
}

/* ═══════════════ 即時掃描 ═══════════════ */
const video = document.getElementById('video');
let stream = null, rafId = null, lastScanAt = 0, scanFlip = 0;
const workCanvas = document.createElement('canvas');
const workCtx = workCanvas.getContext('2d', { willReadFrequently: true });

document.getElementById('btnCam').addEventListener('click', startCamera);
document.getElementById('btnCamStop').addEventListener('click', stopCamera);

async function startCamera(){
  if (typeof jsQR !== 'function') return toast('掃碼引擎載入失敗，請確認網路後重整');
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 } }, audio: false });
  } catch (e) {
    return toast('無法開啟相機：' + (e.name === 'NotAllowedError' ? '請允許相機權限' : e.message));
  }
  video.srcObject = stream;
  await video.play();
  video.hidden = false;
  document.getElementById('camOff').hidden = true;
  document.getElementById('camOverlay').hidden = false;
  document.getElementById('btnCam').hidden = true;
  document.getElementById('btnCamStop').hidden = false;
  rafId = requestAnimationFrame(scanLoop);
}

function stopCamera(){
  if (rafId) cancelAnimationFrame(rafId), rafId = null;
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  video.hidden = true; video.srcObject = null;
  document.getElementById('camOff').hidden = false;
  document.getElementById('camOverlay').hidden = true;
  document.getElementById('btnCam').hidden = false;
  document.getElementById('btnCamStop').hidden = true;
}

function scanLoop(ts){
  rafId = requestAnimationFrame(scanLoop);
  if (ts - lastScanAt < 160 || video.readyState < 2) return;
  lastScanAt = ts;
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw) return;
  const scale = Math.min(1, 800 / vw);
  const w = Math.round(vw * scale), h = Math.round(vh * scale);
  workCanvas.width = w; workCanvas.height = h;
  workCtx.drawImage(video, 0, 0, w, h);
  // 輪流掃：整張 → 左半 → 右半，讓兩顆 QR 都有機會被抓到
  const regions = [[0, 0, w, h], [0, 0, Math.ceil(w / 2), h], [Math.floor(w / 2), 0, Math.ceil(w / 2), h]];
  const [rx, ry, rw, rh] = regions[scanFlip++ % 3];
  const img = workCtx.getImageData(rx, ry, rw, rh);
  const code = jsQR(img.data, rw, rh, { inversionAttempts: 'dontInvert' });
  if (code && code.binaryData && code.binaryData.length){
    if (acceptQR(bytesToLatin1(Array.from(code.binaryData)))){
      // 抓到 QR 的當下把整個畫面存成憑證照片（workCanvas 每 tick 都是完整畫面）
      workCanvas.toBlob(b => { if (b) { state.photoBlob = b; state.photoName = 'live.jpg'; } }, 'image/jpeg', 0.85);
      if (navigator.vibrate) navigator.vibrate(60);
      if (state.left && (state.right || scanFlip > 60)) { /* 兩段齊了就停 */ }
      if (state.left && state.right) stopCamera();
    }
  }
}

async function scanImageFile(file){
  const bmp = await createImageBitmap(file);
  let hit = false;
  // 多尺度 × 多區域：整張、左半、右半（半張再放大一級補小 QR）
  for (const maxW of [1200, 1800]) {
    const scale = Math.min(1, maxW / bmp.width);
    const w = Math.round(bmp.width * scale), h = Math.round(bmp.height * scale);
    workCanvas.width = w; workCanvas.height = h;
    workCtx.drawImage(bmp, 0, 0, w, h);
    const regions = [[0, 0, w, h], [0, 0, Math.ceil(w / 2), h], [Math.floor(w / 2), 0, Math.ceil(w / 2), h]];
    for (const [rx, ry, rw, rh] of regions) {
      const img = workCtx.getImageData(rx, ry, rw, rh);
      const code = jsQR(img.data, rw, rh, { inversionAttempts: 'attemptBoth' });
      if (code && code.binaryData && code.binaryData.length)
        hit = acceptQR(bytesToLatin1(Array.from(code.binaryData))) || hit;
      if (state.left && state.right) return true;
    }
    if (state.left) break; // 左段到手，右段掃不到也先出卡片
  }
  return hit || !!state.left || !!state.right;
}

async function blobToScaledBase64(blob, maxDim){
  const bmp = await createImageBitmap(blob);   // createImageBitmap 會自動套 EXIF 方向
  const scale = Math.min(1, maxDim / Math.max(bmp.width, bmp.height));
  const w = Math.round(bmp.width * scale), h = Math.round(bmp.height * scale);
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  c.getContext('2d').drawImage(bmp, 0, 0, w, h);
  return c.toDataURL('image/jpeg', 0.85).split(',')[1];
}
// 下半部（金額區）原解析度裁切再縮 → 手寫金額有效解析度加倍
async function blobToBottomCropBase64(blob, maxDim){
  const bmp = await createImageBitmap(blob);
  const top = Math.round(bmp.height * 0.55), ch = bmp.height - top;
  const scale = Math.min(1, maxDim / Math.max(bmp.width, ch));
  const w = Math.round(bmp.width * scale), h = Math.round(ch * scale);
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  c.getContext('2d').drawImage(bmp, 0, top, bmp.width, ch, 0, 0, w, h);
  return c.toDataURL('image/jpeg', 0.85).split(',')[1];
}

async function aiRecognize(){
  const route = getApiRoute();
  if (!route) { toast('請先 Google 登入才能使用 AI 辨識'); showGoogleSignIn(); return; }
  if (!state.photoBlob) return toast('沒有照片可辨識，請先拍照');
  const btn = document.getElementById('btnAiOcr');
  if (btn) { btn.disabled = true; btn.textContent = '🤖 辨識中…請稍候'; }
  try {
    const b64 = await blobToScaledBase64(state.photoBlob, 2576);
    const b64bottom = await blobToBottomCropBase64(state.photoBlob, 2576);
    const r = await fetch(WORKER_URL + '/ocr', {
      method: 'POST',
      headers: { ...route.headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: b64, image2: b64bottom, media_type: 'image/jpeg' }),
    });
    if (r.status === 401) throw new Error('登入過期，請重新登入');
    const j = await r.json().catch(() => null);
    if (!r.ok || !j || j.status !== 'SUCCESS') throw new Error((j && j.reason) || ('HTTP ' + r.status));
    const d = j.data;
    // AI 判進出項：買方=我們 → 出項(支出)；否則視為我們開的發票 → 進項(收入)，賣方補公司統編
    const sellerId = d.sellerId || (d.buyerId && d.buyerId !== OUR_TAX_ID ? OUR_TAX_ID : '');
    const y = parseInt(String(d.date).slice(0, 4), 10);
    const p = {
      ok: true, source: 'ai',
      invoiceNumber: d.invoiceNumber || '', date: d.date || '',
      dateRoc: isFinite(y) ? String(y - 1911) : '—',
      sellerId: sellerId || 'NA',
      buyerId: d.buyerId || null,
      buyerName: d.buyerName || '',
      salesAmount: d.salesAmount, totalAmount: d.totalAmount, tax: d.taxAmount,
      items: (d.items || []).map(it => ({ name: it.name, qty: it.qty, price: it.price })),
      declaredTotal: null, encodingParam: null, encodingName: null,
      detailConfidence: 'ai', uncertain: d.uncertain || [], invoiceType: d.invoiceType || '',
    };
    renderResult(p);
    toast('🤖 AI 辨識完成，請核對欄位（可直接修改）再核准');
  } catch (e) {
    toast('❌ AI 辨識失敗：' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '🤖 AI 辨識'; }
  }
}

/* ═══════════════ 相簿批次匯入 ═══════════════ */
const batchState = { items: [], activeIdx: null };

document.getElementById('btnAlbum').addEventListener('click', () =>
  document.getElementById('albumInput').click());
document.getElementById('albumInput').addEventListener('change', async e => {
  const files = [...(e.target.files || [])];
  e.target.value = '';
  if (!files.length) return;
  if (typeof jsQR !== 'function') return toast('掃碼引擎載入失敗，請確認網路後重整');
  const route = getApiRoute();
  if (!route) { toast('請先 Google 登入才能批次匯入'); showGoogleSignIn(); return; }
  resetScan();
  batchState.items = files.map(f => ({ file: f, name: f.name || '照片', status: 'pending', p: null, serial: '', err: '' }));
  batchState.activeIdx = null;
  renderBatch('準備中…');
  // ① 先撈既有冪等鍵（一次 GET，之後全本地比對——已入帳的不再記錄）
  let existing = new Set();
  try { existing = await fetchExistingKeys(route); }
  catch (err) { toast('讀取既有紀錄失敗：' + err.message); renderBatch(); return; }
  // ② 逐張掃 QR＋查重（同一批裡拍到兩次的也擋）
  const seenInBatch = new Set();
  for (let i = 0; i < batchState.items.length; i++) {
    const it = batchState.items[i];
    renderBatch(`掃描中 ${i + 1}/${batchState.items.length}`);
    try {
      const p = await scanBlobQR(it.file);
      if (p && p.ok) {
        it.p = p;
        const k = dedupeKey(p);
        if (existing.has(k)) it.status = 'dup';
        else if (seenInBatch.has(k)) { it.status = 'dup'; it.err = '同批重複'; }
        else { it.status = 'new'; seenInBatch.add(k); }
      } else it.status = 'noqr';
    } catch (err) { it.status = 'fail'; it.err = err.message; }
  }
  renderBatch();
});

async function fetchExistingKeys(route){
  const r = await fetch(WORKER_URL + '/?sheet=acct&limit=1000', { headers: route.headers });
  if (r.status === 401) throw new Error('登入過期，請重新登入');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const j = await r.json();
  const s = new Set();
  Object.values(j).forEach(x => {
    if (x && typeof x === 'object') { const k = recVal(x, '冪等鍵', F.dedupe); if (k) s.add(k); }
  });
  return s;
}

// 單檔靜默掃 QR（不動全域 state），左段找到就解析
async function scanBlobQR(file){
  const bmp = await createImageBitmap(file);
  let left = null, right = null;
  for (const maxW of [1200, 1800]) {
    const scale = Math.min(1, maxW / bmp.width);
    const w = Math.round(bmp.width * scale), h = Math.round(bmp.height * scale);
    workCanvas.width = w; workCanvas.height = h;
    workCtx.drawImage(bmp, 0, 0, w, h);
    const regions = [[0, 0, w, h], [0, 0, Math.ceil(w / 2), h], [Math.floor(w / 2), 0, Math.ceil(w / 2), h]];
    for (const [rx, ry, rw, rh] of regions) {
      const img = workCtx.getImageData(rx, ry, rw, rh);
      const code = jsQR(img.data, rw, rh, { inversionAttempts: 'attemptBoth' });
      if (code && code.binaryData && code.binaryData.length) {
        const s = bytesToLatin1(Array.from(code.binaryData));
        const kind = classifyQR(s);
        if (kind === 'left' && !left) left = s;
        if (kind === 'right' && !right) right = s;
      }
      if (left && right) break;
    }
    if (left) break;
  }
  return left ? parseEInvoiceQR(left, right) : null;
}

function renderBatch(progress){
  const box = document.getElementById('result');
  const items = batchState.items;
  const counts = { new: 0, dup: 0, noqr: 0, fail: 0, done: 0, pending: 0 };
  items.forEach(it => counts[it.status]++);
  const rows = items.map((it, i) => {
    const pill =
      it.status === 'pending' ? '<span class="pill gray">…</span>' :
      it.status === 'new' ? '<span class="pill ok">新</span>' :
      it.status === 'dup' ? '<span class="pill gray">已入帳</span>' :
      it.status === 'done' ? `<span class="pill ok">✓ ${esc(it.serial)}</span>` :
      it.status === 'noqr' ? `<button class="pill warn" style="border:0;cursor:pointer;font-family:inherit" data-ai="${i}">🤖 AI 辨識</button>` :
      '<span class="pill bad">失敗</span>';
    const label = it.p
      ? `${esc(it.p.invoiceNumber)} · ${esc(it.p.date || '')} · ${fmt$(it.p.totalAmount)}`

    return `<div class="rrow"><div class="n"><div class="a">${label}</div>
      ${it.err ? `<div class="b">${esc(it.err)}</div>` : ''}</div>${pill}</div>`;
  }).join('');
  box.innerHTML = `<div class="sec">📁 相簿批次匯入（${items.length} 張）${progress ? '・' + esc(progress) : ''}</div>
    <div class="card" style="padding:4px 14px">${rows}</div>
    ${!progress && counts.new ? `<div class="btnrow"><button class="btn primary" id="btnBatchWrite">✓ 一鍵入帳 ${counts.new} 張新發票</button></div>` : ''}
    ${!progress && counts.noqr ? `<div style="font-size:11.5px;color:var(--tx3);margin-top:8px;text-align:center">沒有 QR 的 ${counts.noqr} 張：點該列「🤖 AI 辨識」逐張處理（約 NT$2/張）</div>` : ''}
    ${!progress && counts.dup ? `<div style="font-size:11.5px;color:var(--tx3);margin-top:4px;text-align:center">「已入帳」的 ${counts.dup} 張已自動跳過，不會重複記錄</div>` : ''}`;
  if (!progress) {
    const bw = document.getElementById('btnBatchWrite');
    if (bw) bw.addEventListener('click', batchWrite);
    box.querySelectorAll('[data-ai]').forEach(b =>
      b.addEventListener('click', () => batchAi(parseInt(b.dataset.ai, 10))));
  }
}

async function batchWrite(){
  const route = getApiRoute();
  if (!route) return toast('請先登入');
  const btn = document.getElementById('btnBatchWrite');
  btn.disabled = true;
  let ok = 0, fail = 0;
  for (const it of batchState.items) {   // 逐張序列寫入（避開 Ragic 限流）
    if (it.status !== 'new') continue;
    try {
      const p = it.p;
      const io = (OUR_TAX_ID && p.sellerId === OUR_TAX_ID) ? 'in' : 'out';
      const fd = new FormData();
      fd.append(F.io, io === 'in' ? '進項' : '出項');
      if (p.date) fd.append(F.date, p.date.replace(/-/g, '/'));
      fd.append(F.dedupe, dedupeKey(p));
      fd.append(F.invNo, p.invoiceNumber);
      fd.append(F.seller, p.sellerId);
      if (p.buyerId) fd.append(F.buyer, p.buyerId);
      fd.append(F.items, p.items.map(x => `${x.name}×${x.qty}@${x.price}`).join('；'));
      fd.append(F.total, String(p.totalAmount));
      fd.append(F.tax, String(p.tax));
      fd.append(F.status, '已入帳');
      fd.append(F.source, 'QR');
      const cat = io === 'in' ? '營業收入' : (suggestCategory(p) || []).filter(Boolean).join(' > ');
      if (cat) fd.append(F.category, cat);
      fd.append(F.photo, it.file, it.file.name || 'invoice.jpg');
      const r = await fetch(WORKER_URL + '/?sheet=acct', { method: 'POST', headers: route.headers, body: fd });
      const j = await r.json().catch(() => null);
      if (r.ok && j && j.status === 'SUCCESS') {
        it.status = 'done'; it.serial = (j.data && j.data[F.serial]) || ''; ok++;
      } else throw new Error('HTTP ' + r.status + '／' + ((j && (j.reason || j.status)) || '未知'));
    } catch (e) { it.status = 'fail'; it.err = '寫入失敗：' + e.message; fail++; }
    renderBatch(`入帳中… 完成 ${ok + fail}`);
  }
  renderBatch();
  toast(`✓ 批次入帳完成 ${ok} 張` + (fail ? `，失敗 ${fail} 張` : ''));
  if (navigator.vibrate) navigator.vibrate([40, 60, 40]);
}

function batchAi(i){
  const it = batchState.items[i];
  batchState.activeIdx = i;
  state.photoBlob = it.file;

  aiRecognize();
}

function fillSelect(sel, opts, chosen, placeholder){
  sel.innerHTML = '<option value="">' + placeholder + '</option>' +
    opts.map(o => `<option value="${esc(o)}"${o === chosen ? ' selected' : ''}>${esc(o)}</option>`).join('');

function initCatSelectors(sugg){
  const L1 = document.getElementById('catL1'), L2 = document.getElementById('catL2'), L3 = document.getElementById('catL3');
  if (!L1) return;
  const pill = document.getElementById('catSuggPill');
  if (sugg && pill) pill.innerHTML = ' <span class="pill ok">AI 建議</span>';
  fillSelect(L1, Object.keys(TAXO), sugg ? sugg[0] : '', '— 大類別 —');
  const syncL2 = chosen2 => {
    const subs = TAXO[L1.value] || {};
    fillSelect(L2, Object.keys(subs), chosen2 || '', '— 分類別 —');
  };
  const syncL3 = chosen3 => {
    const subs = (TAXO[L1.value] || {})[L2.value] || [];
    fillSelect(L3, subs, chosen3 || '', '— 次類別（可不選）—');
  };
  syncL2(sugg ? sugg[1] : ''); syncL3(sugg ? sugg[2] : '');

  L2.addEventListener('change', () => syncL3());

}

/* ═══════════════ Google 登入 + 60 天通行證（沿用 ledshow 模式） ═══════════════ */
let currentUser = null;
try { currentUser = JSON.parse(localStorage.getItem('acct_user') || 'null'); } catch (_) {}

function updateAuthUI(){
  const chip = document.getElementById('authChip');
  const sess = getSavedSession();
  if (currentUser) {
    chip.classList.add('ok');
    chip.textContent = '✅ ' + currentUser.email + (sess ? ' · 60天通行證有效' : ' · 待換發通行證');
  } else {
    chip.classList.remove('ok');
    chip.textContent = '🔐 未登入 · 點我 Google 登入';
  }
}
document.getElementById('authChip').addEventListener('click', () => {
  if (!currentUser) showGoogleSignIn();
  else if (confirm('要登出 ' + currentUser.email + ' 嗎？')) {
    currentUser = null;
    localStorage.removeItem('acct_user');
    localStorage.removeItem('acct_session');
    updateAuthUI();
  }
});

function initGoogleSignIn(){
  function tryInit(){
    if (typeof google === 'undefined' || !google.accounts) { setTimeout(tryInit, 500); return; }
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleGoogleSignIn,
      auto_select: true,          // 登過的帳號自動發新 token（pitfall #10）
      itp_support: true,
      cancel_on_tap_outside: false,
    });
    // 有登過但通行證缺/快到期 → 背景補
    if (currentUser && !getSavedSession()) google.accounts.id.prompt();
  }
  tryInit();
}
function showGoogleSignIn(){
  if (typeof google === 'undefined' || !google.accounts) return toast('Google 載入中，稍後再試');
  google.accounts.id.prompt(n => {
    if (n.isNotDisplayed && (n.isNotDisplayed() || n.isSkippedMoment())) {
      const btn = document.createElement('div');
      document.body.appendChild(btn);
      google.accounts.id.renderButton(btn, { theme: 'filled_blue', size: 'large' });
      btn.style.cssText = 'position:fixed;top:60px;right:20px;z-index:9999;background:#fff;padding:10px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.3)';
      setTimeout(() => btn.remove(), 30000);
    }
  });
}
function handleGoogleSignIn(response){
  try {
    const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    currentUser = {
      email: (payload.email || '').toLowerCase(),
      name: payload.name || '',
      idToken: response.credential,
      tokenExp: (parseInt(payload.exp, 10) || 0) * 1000,
    };
    localStorage.setItem('acct_user', JSON.stringify(currentUser));
    updateAuthUI();
    toast('👋 ' + (currentUser.name || currentUser.email) + ' 已登入');
    exchangeSession();
  } catch (e) { toast('登入解析失敗：' + e.message); }
}

function getSavedSession(){
  try {
    const s = JSON.parse(localStorage.getItem('acct_session') || 'null');
    if (s && s.session && s.exp > Date.now() && currentUser && s.email === currentUser.email) return s;
  } catch (_) {}
  return null;
}
let _sessExchanging = false;
function exchangeSession(){
  if (_sessExchanging || !currentUser || !currentUser.idToken) return;
  if (currentUser.tokenExp && currentUser.tokenExp < Date.now()) return;
  _sessExchanging = true;
  fetch(WORKER_URL + '/auth/session', { method: 'POST', headers: { 'X-Google-Token': currentUser.idToken } })
    .then(r => r.json())
    .then(j => {
      if (j && j.status === 'SUCCESS' && j.session) {
        localStorage.setItem('acct_session', JSON.stringify({ session: j.session, exp: j.exp, email: (j.email || currentUser.email).toLowerCase() }));
        updateAuthUI();
      } else toast('⚠ 通行證換發失敗：' + ((j && (j.reason || j.status)) || '未知'));
    })
    .catch(e => toast('⚠ 通行證換發失敗（網路）'))
    .then(() => { _sessExchanging = false; });
}
function getApiRoute(){
  const s = getSavedSession();
  if (s) {
    if (s.exp - Date.now() < 7 * 864e5) exchangeSession();  // 快到期背景換新
    return { headers: { 'X-Session-Token': s.session } };
  }
  if (currentUser && currentUser.idToken && (!currentUser.tokenExp || currentUser.tokenExp > Date.now()))
    return { headers: { 'X-Google-Token': currentUser.idToken } };
  return null;
}
updateAuthUI();
initGoogleSignIn();

/* ═══════════════ 核准入帳：查重 → 寫入 Ragic ═══════════════ */
async function approveEntry(p, btn){
  const route = getApiRoute();
  if (!route) { toast('請先 Google 登入才能寫入 Ragic'); showGoogleSignIn(); return; }
  btn.disabled = true;
  // AI 模式：先把使用者修正過的欄位讀回來，再算冪等鍵
  if (p.source === 'ai') {
    const gv = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
    p.invoiceNumber = gv('aiInv') || p.invoiceNumber;
    p.date = gv('aiDate') || p.date;
    p.sellerId = gv('aiSeller') || (state.io === 'in' ? OUR_TAX_ID : 'NA');
    p.buyerId = gv('aiBuyer') || null;
    p.buyerName = gv('aiVendor') || p.buyerName;
    p.totalAmount = num(gv('aiTotal')) || p.totalAmount;
    p.tax = num(gv('aiTax'));
    p.salesAmount = p.totalAmount - p.tax;
    if (!p.invoiceNumber) { toast('請填發票號碼（防重複入帳要用）'); btn.disabled = false; return; }
    if (!p.totalAmount) { toast('請確認總計金額'); btn.disabled = false; return; }
  }
  const key = dedupeKey(p);
  try {
    // ⓪ 防呆：Worker 沒有 acct 路由時 ?sheet=acct 會 fallback 到報價表 sheet 17 → 絕不能寫
    if (!window._acctRouteOK) {
      const h = await fetch(WORKER_URL + '/').then(r => r.json()).catch(() => null);
      if (!h || !h.ragic_url_acct_configured)
        throw new Error('Worker 尚未部署記帳路由（sheet=acct），暫停寫入以免誤寫報價表');
      window._acctRouteOK = true;
    }
    // ① 冪等查重：同發票號碼＋賣方統編不重複入帳（pitfall #11）
    btn.textContent = '查重中…';
    const q = await fetch(WORKER_URL + '/?sheet=acct&where=' + encodeURIComponent('1003132,eq,' + key) + '&limit=5',
      { headers: route.headers });
    if (q.status === 401) throw Object.assign(new Error('登入過期，請重新登入'), { auth: true });
    if (q.status === 403) throw new Error('此帳號未在 Worker 白名單');
    const qj = await q.json().catch(() => ({}));
    let dup = null;   // naming=fid 在此表不生效 → 中文名/fid 兩種 key 都容錯（pitfall #14）
    Object.values(qj).forEach(r => {
      if (r && typeof r === 'object' && (r['1003132'] === key || r['冪等鍵'] === key)) dup = r;
    });
    if (dup) {
      renderApproved(p, dup['流水號'] || dup['1003129'] || '', true);
      return;
    }
    // ② 寫入（欄位一律用 ID；數值純數字；日期 YYYY/MM/DD）
    btn.textContent = '寫入中…';
    const fd = new FormData();
    fd.append(F.io, state.io === 'in' ? '進項' : '出項');
    if (p.date) fd.append(F.date, p.date.replace(/-/g, '/'));
    fd.append(F.dedupe, key);
    fd.append(F.invNo, p.invoiceNumber);
    fd.append(F.seller, p.sellerId);
    if (p.buyerId) fd.append(F.buyer, p.buyerId);
    fd.append(F.items, p.items.map(it => `${it.name}×${it.qty}@${it.price}`).join('；'));
    fd.append(F.total, String(p.totalAmount));
    fd.append(F.tax, String(p.tax));
    fd.append(F.status, '已入帳');
    fd.append(F.source, p.source === 'ai' ? 'AI' : 'QR');
    if (p.buyerName) fd.append(F.vendor, p.buyerName);
    // 歸類科目：進項＝營業收入；出項＝三層選單組合（同支出紀錄表體系）
    if (state.io === 'in') fd.append(F.category, '營業收入');
    else {
      const cat = ['catL1', 'catL2', 'catL3'].map(id => (document.getElementById(id) || {}).value || '')
        .filter(Boolean).join(' > ');
      if (cat) fd.append(F.category, cat);
    }
    // 憑證照片：掃描畫面或原圖（Worker formData 原樣轉傳，已實測可過）
    if (state.photoBlob) fd.append(F.photo, state.photoBlob, state.photoName || 'invoice.jpg');
    const r = await fetch(WORKER_URL + '/?sheet=acct', { method: 'POST', headers: route.headers, body: fd });
    const j = await r.json().catch(() => null);
    if (r.ok && j && j.status === 'SUCCESS') {
      renderApproved(p, (j.data && j.data[F.serial]) || '', false);
    } else {
      throw new Error('HTTP ' + r.status + '／' + ((j && (j.reason || j.status)) || '未知回應'));
    }
  } catch (e) {
    toast('❌ 入帳失敗：' + e.message);
    if (e.auth) showGoogleSignIn();
    btn.disabled = false;
    btn.textContent = '✓ 核准入帳';
  }
}

function renderApproved(p, serial, wasDup){
  const card = document.querySelector('#result .recog');
  const zone = card.querySelector('.alert');
  if (zone) zone.outerHTML = `
    <div class="okbox"><div class="ai">✓</div>
      <div class="txt"><b>${wasDup ? '這張發票之前已入帳，未重複寫入' : '已寫入 Ragic 進出項單據'}</b>${serial ? '<br>流水號 ' + esc(serial) : ''}
        <br><a href="${RAGIC_SHEET_URL}" target="_blank" rel="noopener">在 Ragic 開啟進出項單據 →</a></div></div>`;
  const row = card.querySelector('.btnrow');
  if (batchState.activeIdx != null) {
    // 批次模式：把這張標記完成，回批次清單繼續
    const it = batchState.items[batchState.activeIdx];
    it.status = wasDup ? 'dup' : 'done';
    it.serial = serial || '';
    it.p = p;
    batchState.activeIdx = null;
    if (row) row.innerHTML = '<button class="btn primary" id="btnBackBatch">↩ 回批次清單</button>';
    document.getElementById('btnBackBatch').addEventListener('click', () => {
      document.getElementById('result').innerHTML = '';
      renderBatch();
    });
  } else {
    if (row) row.innerHTML = '<button class="btn primary" id="btnNext">📸 掃下一張</button>';
    document.getElementById('btnNext').addEventListener('click', resetScan);
  }
  if (navigator.vibrate) navigator.vibrate([40, 60, 40]);
}

/* ═══════════════ 統計總覽 ═══════════════ */
function recVal(r, name, fid){ return r[name] != null && r[name] !== '' ? r[name] : (r[fid] || ''); }
async function loadDashboard(){
  const body = document.getElementById('dashBody');
  const route = getApiRoute();
  if (!route) {
    body.innerHTML = '<div style="padding:10px">🔐 請先點上方登入，才能讀取帳務資料</div>';
    return;
  }
  body.innerHTML = '<div style="padding:10px">⏳ 讀取中…</div>';
  try {
    const r = await fetch(WORKER_URL + '/?sheet=acct&limit=1000', { headers: route.headers });
    if (r.status === 401) throw new Error('登入過期，請重新登入');
    if (r.status === 403) throw new Error('帳號未在白名單');
    const j = await r.json();
    const recs = [];
    Object.values(j).forEach(x => {
      if (!x || typeof x !== 'object') return;
      const amt = parseFloat(recVal(x, '金額(含稅)', '1003140')) || 0;
      const date = String(recVal(x, '日期', '1003131'));         // YYYY/MM/DD
      if (!date && !amt) return;
      recs.push({
        serial: recVal(x, '流水號', '1003129'),
        io: recVal(x, '進/出項別', '1003130'),
        date, amt,
        items: recVal(x, '品項明細', '1003139'),
        vendor: recVal(x, '廠商/客戶名', '1003143'),
        cat: recVal(x, '歸類科目', '1003134'),
      });
    });
    // 近 6 個月月度彙總
    const now = new Date();
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push({ key: d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0'), lb: (d.getMonth() + 1) + '月', inSum: 0, outSum: 0 });
    }
    const thisKey = months[5].key;
    let mIn = 0, mOut = 0, mCnt = 0;
    recs.forEach(rc => {
      const mk = rc.date.slice(0, 7);
      const m = months.find(mm => mm.key === mk);
      const isIn = rc.io === '進項';
      if (m) { if (isIn) m.inSum += rc.amt; else m.outSum += rc.amt; }
      if (mk === thisKey) { mCnt++; if (isIn) mIn += rc.amt; else mOut += rc.amt; }
    });
    const peak = Math.max(1, ...months.map(m => Math.max(m.inSum, m.outSum)));
    const bars = months.map(m => `
      <div class="col"><div class="bars">
        <i class="bi" style="height:${Math.round(m.inSum / peak * 100)}%"></i>
        <i class="bo" style="height:${Math.round(m.outSum / peak * 100)}%"></i>
      </div><span>${m.lb}</span></div>`).join('');
    const recent = recs.sort((a, b) => String(b.serial).localeCompare(String(a.serial))).slice(0, 10);
    const rows = recent.map(rc => `
      <div class="rrow">
        <span class="pill ${rc.io === '進項' ? 'ok' : 'bad'}">${esc(rc.io || '?')}</span>
        <div class="n"><div class="a">${esc((rc.vendor || rc.items || '—').slice(0, 24))}</div>
          <div class="b">${esc(rc.date)} · ${esc(rc.cat || '未歸類')} · #${esc(rc.serial)}</div></div>
        <span class="amt" style="color:${rc.io === '進項' ? 'var(--in)' : 'var(--out)'}">${rc.io === '進項' ? '+' : '−'}${fmt$(rc.amt)}</span>
      </div>`).join('') || '<div style="color:var(--tx3);padding:8px">還沒有紀錄</div>';
    body.style = 'padding:0;background:none;border:0';
    body.innerHTML = `
      <div class="kpis">
        <div class="kpi"><div class="lb">本月進項</div><div class="vl" style="color:var(--in)">${fmt$(mIn)}</div></div>
        <div class="kpi"><div class="lb">本月出項</div><div class="vl" style="color:var(--out)">${fmt$(mOut)}</div></div>
        <div class="kpi"><div class="lb">本月淨額</div><div class="vl">${fmt$(mIn - mOut)}</div></div>
        <div class="kpi"><div class="lb">本月筆數</div><div class="vl">${mCnt} 筆</div></div>
      </div>
      <div class="sec">近 6 月 進 / 出 項</div>
      <div class="card"><div class="chart">${bars}</div>
        <div class="legend"><b><span class="dot" style="background:var(--in)"></span>進項</b>
          <b><span class="dot" style="background:var(--out)"></span>出項</b></div></div>
      <div class="sec">最近 10 筆</div>
      <div class="card" style="padding:4px 14px">${rows}</div>
      <div style="text-align:center;margin-top:12px">
        <a href="${RAGIC_SHEET_URL}" target="_blank" rel="noopener" style="color:var(--brand);font-size:12.5px">在 Ragic 開啟完整表格 →</a>
      </div>`;
  } catch (e) {
    body.innerHTML = '<div style="padding:10px;color:var(--danger)">讀取失敗：' + esc(e.message) + '</div>';
  }
}

/* ═══════════════ 日結對帳（Odoo 四階段：開帳→營業中→關帳點鈔→過帳） ═══════════════ */
const RAGIC_DC_URL = 'https://ap10.ragic.com/Fan28/ragicpersonal-finance/8';
const DC = { serial: '1003145', date: '1003146', shift: '1003147', status: '1003148',
  opening: '1003149', cashIn: '1003150', cashOut: '1003151', counted: '1003152',
  diffCat: '1003153', counter: '1003154', note: '1003155' };
const DIFF_TOLERANCE = 100;   // 差額容許值：超過必須寫備註
function todayStr(){ const d = new Date(); return d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + String(d.getDate()).padStart(2, '0'); }
function num(v){ const n = parseFloat(v); return isFinite(n) ? n : 0; }

async function dcFetchAll(route){
  const r = await fetch(WORKER_URL + '/?sheet=dc&limit=1000', { headers: route.headers });
  if (r.status === 401) throw new Error('登入過期，請重新登入');
  if (r.status === 403) throw new Error('帳號未在白名單');
  const j = await r.json();
  const recs = [];
  Object.entries(j).forEach(([k, x]) => {
    if (!x || typeof x !== 'object' || x._ragicId == null) return;
    recs.push({
      rid: x._ragicId,
      serial: recVal(x, '流水號', DC.serial),
      date: String(recVal(x, '日期', DC.date)),
      shift: recVal(x, '班別', DC.shift),
      status: recVal(x, '狀態', DC.status),
      opening: num(recVal(x, '期初餘額', DC.opening)),
      cashIn: num(recVal(x, '本場現金收入', DC.cashIn)),
      cashOut: num(recVal(x, '本場現金支出', DC.cashOut)),
      counted: num(recVal(x, '實點金額', DC.counted)),
      diffCat: recVal(x, '差額歸類', DC.diffCat),
      counter: recVal(x, '點鈔人', DC.counter),
      note: recVal(x, '備註', DC.note),
    });
  });
  recs.sort((a, b) => b.rid - a.rid);
  return recs;
}

async function loadDayClose(){
  const body = document.getElementById('dcBody');
  const route = getApiRoute();
  if (!route) { body.innerHTML = '<div style="padding:10px">🔐 請先點上方登入</div>'; return; }
  body.innerHTML = '<div style="padding:10px">⏳ 讀取中…</div>';
  try {
    const recs = await dcFetchAll(route);
    const active = recs.find(r => r.status && r.status !== '已過帳');
    if (active) renderDcActive(body, active, recs, route);
    else renderDcOpenForm(body, recs);
  } catch (e) {
    body.innerHTML = '<div style="padding:10px;color:var(--danger)">讀取失敗：' + esc(e.message) + '</div>';
  }
}

function dcHistoryHtml(recs){
  const done = recs.filter(r => r.status === '已過帳').slice(0, 5);
  if (!done.length) return '';
  return '<div class="sec">歷史場次</div><div class="card" style="padding:4px 14px">' +
    done.map(r => {
      const diff = r.counted - (r.opening + r.cashIn - r.cashOut);
      return `<div class="rrow"><span class="pill ${diff === 0 ? 'ok' : 'warn'}">${diff === 0 ? '平' : (diff > 0 ? '+' : '−') + Math.abs(diff)}</span>
        <div class="n"><div class="a">${esc(r.date)} ${esc(r.shift)}</div>
          <div class="b">實點 ${fmt$(r.counted)} · ${esc(r.counter || '')}</div></div></div>`;
    }).join('') + '</div>';
}

/* 開帳表單 */
function renderDcOpenForm(body, recs){
  const lastDone = recs.find(r => r.status === '已過帳');
  const defOpening = lastDone ? lastDone.counted : 0;
  body.style = 'padding:0;background:none;border:0;text-align:left';
  body.innerHTML = `
    <div class="stepper">
      <div class="step now"><div class="n">1</div><div class="lb">開帳點鈔</div></div>
      <div class="step"><div class="n">2</div><div class="lb">營業中</div></div>
      <div class="step"><div class="n">3</div><div class="lb">關帳點鈔</div></div>
      <div class="step"><div class="n">4</div><div class="lb">過帳</div></div>
    </div>
    <div class="card">
      <div class="balance"><span>日期</span><span class="v">${todayStr()}</span></div>
      <div class="balance"><span>班別</span>
        <select class="cat" style="width:130px;margin:0" id="dcShift">
          <option>全日</option><option>早班</option><option>晚班</option></select></div>
      <div class="balance"><span>期初餘額 <small style="color:var(--tx3)">(上一場實點 ${fmt$(defOpening)})</small></span>
        <input class="dcin" type="number" id="dcOpening" value="${defOpening}"></div>
      <div class="balance"><span>點鈔人</span>
        <input class="dcin" type="text" id="dcCounter" style="text-align:left" value="${esc(currentUser && currentUser.name || '')}"></div>
      <div class="btnrow"><button class="btn primary" id="dcOpenBtn">🔓 開帳，開始營業</button></div>
    </div>
    ${dcHistoryHtml(recs)}`;
  document.getElementById('dcOpenBtn').addEventListener('click', async ev => {
    const btn = ev.currentTarget; btn.disabled = true; btn.textContent = '建立中…';
    try {
      const route = getApiRoute();
      if (!route) throw new Error('請先登入');
      const fd = new FormData();
      fd.append(DC.date, todayStr());
      fd.append(DC.shift, document.getElementById('dcShift').value);
      fd.append(DC.status, '營業中');
      fd.append(DC.opening, String(num(document.getElementById('dcOpening').value)));
      fd.append(DC.counter, document.getElementById('dcCounter').value.trim());
      const r = await fetch(WORKER_URL + '/?sheet=dc', { method: 'POST', headers: route.headers, body: fd });
      const j = await r.json().catch(() => null);
      if (!r.ok || !j || j.status !== 'SUCCESS') throw new Error('HTTP ' + r.status);
      toast('🔓 已開帳，今天加油！');
      loadDayClose();
    } catch (e) { toast('❌ 開帳失敗：' + e.message); btn.disabled = false; btn.textContent = '🔓 開帳，開始營業'; }
  });
}

/* 營業中／關帳畫面 */
async function renderDcActive(body, s, recs, route){
  // 建議值：當日進出項單據合計（可手動改——非現金交易自行剔除）
  let dayIn = 0, dayOut = 0;
  try {
    const r = await fetch(WORKER_URL + '/?sheet=acct&limit=1000', { headers: route.headers });
    const j = await r.json();
    Object.values(j).forEach(x => {
      if (!x || typeof x !== 'object') return;
      if (String(recVal(x, '日期', F.date)) !== s.date) return;
      const amt = num(recVal(x, '金額(含稅)', F.total));
      if (recVal(x, '進/出項別', F.io) === '進項') dayIn += amt; else dayOut += amt;
    });
  } catch (_) {}
  body.style = 'padding:0;background:none;border:0;text-align:left';
  body.innerHTML = `
    <div class="stepper">
      <div class="step done"><div class="n">✓</div><div class="lb">開帳點鈔</div></div>
      <div class="step done"><div class="n">✓</div><div class="lb">營業中</div></div>
      <div class="step now"><div class="n">3</div><div class="lb">關帳點鈔</div></div>
      <div class="step"><div class="n">4</div><div class="lb">過帳</div></div>
    </div>
    <div class="card">
      <div class="balance"><span>${esc(s.date)} ${esc(s.shift)} <small style="color:var(--tx3)">${esc(s.counter || '')}</small></span>
        <span class="pill warn">營業中</span></div>
      <div class="balance"><span>期初餘額</span><span class="v">${fmt$(s.opening)}</span></div>
      <div class="balance"><span>＋ 本場現金收入 <small style="color:var(--tx3)">(當日進項 ${fmt$(dayIn)})</small></span>
        <input class="dcin" type="number" id="dcCashIn" value="${s.cashIn || dayIn}"></div>
      <div class="balance"><span>− 本場現金支出 <small style="color:var(--tx3)">(當日出項 ${fmt$(dayOut)})</small></span>
        <input class="dcin" type="number" id="dcCashOut" value="${s.cashOut || dayOut}"></div>
      <div class="balance"><span>＝ 理論期末餘額</span><span class="v" id="dcTheory">—</span></div>
      <div class="balance"><span>收銀台實點金額</span>
        <input class="dcin" type="number" id="dcCounted" placeholder="點鈔輸入"></div>
      <div class="balance diff"><span>差額</span><span class="v" id="dcDiff">—</span></div>
      <div id="dcDiffZone" hidden>
        <div class="alert err"><div class="ai">!</div>
          <div class="txt">差額超過容許值 $${DIFF_TOLERANCE}，需歸「現金短溢」並寫原因才能過帳
            <small>過帳時會自動在進出項單據補一筆現金短溢，帳才對得平</small></div></div>
        <input class="dcin wide" type="text" id="dcNote" placeholder="差額原因備註（必填）" style="margin-top:10px">
      </div>
      <div class="btnrow"><button class="btn primary" id="dcCloseBtn">⚖️ 完成關帳並過帳</button></div>
    </div>
    ${dcHistoryHtml(recs)}`;

  const calc = () => {
    const theory = s.opening + num(dcCashIn.value) - num(dcCashOut.value);
    document.getElementById('dcTheory').textContent = fmt$(theory);
    const countedRaw = document.getElementById('dcCounted').value;
    if (countedRaw === '') { document.getElementById('dcDiff').textContent = '—'; return null; }
    const diff = num(countedRaw) - theory;
    const el = document.getElementById('dcDiff');
    el.textContent = (diff > 0 ? '+' : '') + fmt$(diff).replace('$', '$');
    el.style.color = diff === 0 ? 'var(--ok)' : 'var(--danger)';
    document.getElementById('dcDiffZone').hidden = Math.abs(diff) <= DIFF_TOLERANCE;
    return diff;
  };
  const dcCashIn = document.getElementById('dcCashIn'), dcCashOut = document.getElementById('dcCashOut');
  ['dcCashIn', 'dcCashOut', 'dcCounted'].forEach(id =>
    document.getElementById(id).addEventListener('input', calc));
  calc();

  document.getElementById('dcCloseBtn').addEventListener('click', async ev => {
    const btn = ev.currentTarget;
    const countedRaw = document.getElementById('dcCounted').value;
    if (countedRaw === '') return toast('請先輸入收銀台實點金額');
    const diff = calc();
    if (Math.abs(diff) > DIFF_TOLERANCE && !document.getElementById('dcNote').value.trim())
      return toast('差額超過 $' + DIFF_TOLERANCE + '，請填差額原因備註');
    btn.disabled = true; btn.textContent = '過帳中…';
    try {
      const route2 = getApiRoute();
      if (!route2) throw new Error('請先登入');
      const fd = new FormData();
      fd.append(DC.cashIn, String(num(dcCashIn.value)));
      fd.append(DC.cashOut, String(num(dcCashOut.value)));
      fd.append(DC.counted, String(num(countedRaw)));
      fd.append(DC.status, '已過帳');
      fd.append(DC.diffCat, diff === 0 ? '無' : '現金短溢');
      const noteEl = document.getElementById('dcNote');
      if (noteEl && noteEl.value.trim()) fd.append(DC.note, noteEl.value.trim());
      const r = await fetch(WORKER_URL + '/?sheet=dc&ragicId=' + s.rid, { method: 'POST', headers: route2.headers, body: fd });
      const j = await r.json().catch(() => null);
      if (!r.ok || !j || j.status !== 'SUCCESS') throw new Error('HTTP ' + r.status);
      // 差額 ≠ 0 → 自動補一筆現金短溢進出項（差額必有會計歸宿）
      if (diff !== 0) {
        const fa = new FormData();
        fa.append(F.io, diff > 0 ? '進項' : '出項');
        fa.append(F.date, s.date);
        fa.append(F.dedupe, 'DC_' + s.date.replace(/\//g, '') + '_' + s.shift + '_' + s.rid);
        fa.append(F.category, '現金短溢');
        fa.append(F.items, '日結差額 ' + s.date + ' ' + s.shift + (noteEl && noteEl.value.trim() ? '：' + noteEl.value.trim() : ''));
        fa.append(F.total, String(Math.abs(diff)));
        fa.append(F.tax, '0');
        fa.append(F.status, '已入帳');
        fa.append(F.source, '手動');
        await fetch(WORKER_URL + '/?sheet=acct', { method: 'POST', headers: route2.headers, body: fa }).catch(() => {});
      }
      toast(diff === 0 ? '⚖️ 過帳完成，帳平！' : '⚖️ 過帳完成，差額 ' + fmt$(Math.abs(diff)) + ' 已入現金短溢');
      loadDayClose();
    } catch (e) { toast('❌ 過帳失敗：' + e.message); btn.disabled = false; btn.textContent = '⚖️ 完成關帳並過帳'; }
  });
}

/* ═══════════════ toast ═══════════════ */
let toastTimer = null;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}
</script>
</body>
</html>
