<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f0a500">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>USLED 任務牆 · 譽昇光電</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ===================================================================
   USLED 四大任務牆  —  單檔 HTML（手機優先）
   架構：LOCAL 模式(localStorage) / CLOUD 模式(Ragic via Worker)
   切換：把 CONFIG.MODE 改成 'CLOUD' 即可（需先填好 Ragic 欄位 ID）
   =================================================================== */
:root{
  --bg:#0a0c12; --surface:#151823; --surface2:#1e2230; --border:#2a2f3f;
  --text:#e8eaf0; --muted:#8b90a3; --accent:#f0a500;
  --q1:#ef4444; --q2:#f59e0b; --q3:#22c55e; --q4:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;font-size:15px;line-height:1.5}
body{min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;font-size:15px}
img{display:block}
.hidden{display:none!important}

/* ---------- 登入頁 ---------- */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{width:100%;max-width:420px}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo .brand{font-size:30px;font-weight:900;color:var(--accent)}
.login-logo .sub{color:var(--muted);font-size:13px;margin-top:4px}
.user-list{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.user-row{display:flex;align-items:center;gap:14px;padding:16px;width:100%;background:none;color:var(--text);text-align:left;border-bottom:1px solid var(--border);transition:background .15s}
.user-row:last-child{border-bottom:none}
.user-row:active{background:var(--surface2)}
.avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px;color:#000;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-info .nm{font-weight:600}
.user-info .em{color:var(--muted);font-size:12px}
.role-tag{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--surface2);color:var(--muted)}
.role-tag.boss{background:rgba(240,165,0,.18);color:var(--accent)}

/* ---------- 頂部 bar ---------- */
#topbar{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
#topbar .brand{font-weight:900;color:var(--accent);font-size:17px}
#topbar .right{display:flex;align-items:center;gap:8px}
.me-chip{display:flex;align-items:center;gap:7px;background:var(--surface2);border-radius:20px;padding:5px 10px 5px 5px}
.me-chip .avatar{width:28px;height:28px;font-size:13px}
.me-chip .nm{font-size:13px}
.btn-logout{background:none;color:var(--muted);font-size:13px;padding:6px 8px;border-radius:8px}
.btn-logout:active{background:var(--surface2)}
.growth-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:600;white-space:nowrap}
.growth-btn:active{background:var(--bg)}
/* Google 日曆今日行程 */
.gcal-wrap{max-width:760px;margin:0 auto;padding:8px 12px 0}
.gcal-bar{display:flex;align-items:center;gap:8px;overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;white-space:nowrap;-webkit-overflow-scrolling:touch}
.gcal-bar.empty,.gcal-bar.err{color:var(--muted);justify-content:center}
.gcal-label{color:var(--accent);font-weight:700;flex-shrink:0}
.gcal-ev{flex-shrink:0;background:var(--surface2);border-radius:8px;padding:4px 9px}
.gcal-ev b{color:var(--accent);margin-right:3px}
.gcal-connect{width:100%;background:rgba(240,165,0,.12);border:1px dashed var(--accent);color:var(--accent);border-radius:10px;padding:9px;font-size:13px;font-weight:600}
.gcal-connect:active{opacity:.85}

/* ---------- 看板 ---------- */
#board{padding:12px;max-width:760px;margin:0 auto}
.quadrant{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:12px;border-top-width:4px}
.q-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.q-title{font-weight:800;font-size:15px}
.q-title .sub{font-weight:400;font-size:11px;color:var(--muted);margin-left:6px}
.q-count{font-size:12px;color:var(--muted)}
.q-add{background:var(--surface2);color:var(--accent);width:30px;height:30px;border-radius:8px;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center}
.q-add:active{background:var(--accent);color:#000}
.task-list{display:flex;flex-direction:column;gap:8px}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:18px 0}

/* ---------- 任務卡 ---------- */
.task{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px;border-left:3px solid var(--border)}
.task.done{opacity:.55}
.task .t-title{font-weight:600;font-size:15px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
.task.done .t-title{text-decoration:line-through}
.task .t-meta{display:flex;flex-wrap:wrap;gap:6px 10px;margin-top:7px;font-size:12px;color:var(--muted);align-items:center}
.task .t-assignee{display:inline-flex;align-items:center;gap:5px}
.mini-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000}
.status-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.st-open{background:var(--surface);color:var(--muted)}
.st-submitted{background:rgba(245,158,11,.2);color:var(--q2)}
.st-done{background:rgba(34,197,94,.2);color:var(--q3)}
.due-soon{color:var(--q1)!important;font-weight:600}
.t-thumb{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.t-thumb img{width:54px;height:54px;border-radius:8px;object-fit:cover;border:1px solid var(--border)}
.t-actions{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.t-actions button{font-size:13px;padding:7px 12px;border-radius:8px;font-weight:600;flex:1;min-width:72px}
.btn-primary{background:var(--accent);color:#000}
.btn-soft{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-good{background:rgba(34,197,94,.2);color:var(--q3);border:1px solid rgba(34,197,94,.4)}
.btn-warn{background:rgba(239,68,68,.15);color:var(--q1);border:1px solid rgba(239,68,68,.4)}

/* ---------- Modal ---------- */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:560px){.modal-mask{align-items:center;padding:20px}}
.modal{background:var(--surface);width:100%;max-width:480px;border-radius:18px 18px 0 0;max-height:92vh;overflow-y:auto;padding:18px}
@media(min-width:560px){.modal{border-radius:18px}}
.modal h3{font-size:18px;margin-bottom:14px}
.field{margin-bottom:13px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:11px;font-size:15px}
.field textarea{min-height:64px;resize:vertical}
.quad-pick{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.quad-opt{padding:10px;border-radius:9px;border:2px solid var(--border);background:var(--surface2);text-align:center;font-size:13px;color:var(--text)}
.quad-opt.sel{border-color:var(--accent);background:rgba(240,165,0,.12)}
.modal-actions{display:flex;gap:9px;margin-top:18px}
.modal-actions button{flex:1;padding:13px;border-radius:10px;font-weight:700;font-size:15px}
.img-input-row{display:flex;gap:8px;align-items:center}
.img-preview-list{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.img-preview-list .wrap{position:relative}
.img-preview-list img{width:62px;height:62px;border-radius:8px;object-fit:cover;border:1px solid var(--border)}
.img-preview-list .del{position:absolute;top:-6px;right:-6px;background:var(--q1);color:#fff;width:20px;height:20px;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center}

/* 圖片放大 */
#imageView{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
#imageView img{max-width:100%;max-height:100%;border-radius:10px}

/* Toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--accent);color:var(--accent);padding:11px 20px;border-radius:30px;z-index:300;font-size:14px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.4)}

/* 模式標示 */
.mode-flag{position:fixed;bottom:8px;left:8px;font-size:10px;color:var(--muted);z-index:40;background:var(--surface);padding:3px 7px;border-radius:6px;opacity:.6}
/* 截止快捷選單 */
.due-quick{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.due-quick button{flex:1;min-width:70px;padding:9px 6px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px}
.due-quick button.sel{border-color:var(--accent);background:rgba(240,165,0,.16);color:var(--accent);font-weight:600}
/* 任務卡 flex（縮圖靠右、橫排、小張） */
.task-body{display:flex;gap:10px;align-items:flex-start}
.task-main{flex:1;min-width:0}
.task-thumbs{display:flex;flex-direction:row;flex-wrap:wrap;gap:4px;flex-shrink:0;max-width:128px;justify-content:flex-end}
.task-thumbs img,.task-thumbs video{width:38px;height:38px;border-radius:6px;object-fit:cover;border:1px solid var(--border);background:#000}
.t-countdown{color:var(--q1)!important;font-weight:700}
/* 逾期提醒視窗（閃爍） */
.overdue-box{border:2px solid var(--q1)!important;animation:flashRed 1.1s ease-in-out infinite}
@keyframes flashRed{0%,100%{box-shadow:0 0 4px var(--q1)}50%{box-shadow:0 0 30px 5px var(--q1)}}
.overdue-title{font-size:21px;font-weight:800;color:var(--q1);margin-bottom:6px;text-align:center}
.overdue-item{background:var(--surface2);border-radius:9px;padding:11px;margin-bottom:8px;border-left:3px solid var(--q1)}
/* 任務卡可點擊進詳情 */
.task{cursor:pointer}
.task:active{transform:scale(0.99)}
/* 象限分頁 */
.quad-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px}
.quad-tab{padding:8px 3px;border-radius:10px;border:2px solid var(--border);background:var(--surface);text-align:center;color:var(--text);transition:all .12s}
.quad-tab .qt-title{font-size:11px;font-weight:700;line-height:1.2}
.quad-tab .qt-sub{font-size:16px;font-weight:800;margin-top:1px}
.quad-tab.active{color:#fff!important}
.quad-panel{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:12px}
.qp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.qp-title{font-weight:800;font-size:16px}
.qp-sub{font-weight:400;font-size:12px;color:var(--muted);margin-left:8px}
.t-assignee-name{font-size:13px;color:var(--text)}
.t-expand-hint{font-size:11px;color:var(--accent);margin-left:auto}
/* 左滑快捷 */
.swipe-row{position:relative;overflow:hidden;border-radius:10px}
.swipe-actions{position:absolute;top:0;right:0;height:100%;display:flex;z-index:0}
.swipe-btn{border:none;color:#fff;font-weight:700;font-size:14px;width:75px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.swipe-btn.accept{background:#3b82f6}
.swipe-btn.submit{background:#22c55e}
.swipe-btn.edit{background:#6b7280}
.swipe-row .task{transition:transform .22s cubic-bezier(.2,.8,.3,1);position:relative;z-index:1;will-change:transform}
/* 備註（條列） */
.t-note{margin-top:7px;font-size:12px;color:var(--muted);white-space:pre-wrap;border-left:2px solid var(--border);padding-left:8px;line-height:1.6}
/* 標題列 + 展開鈕 */
.t-title-row{display:flex;align-items:flex-start;gap:6px}
.t-title-row .t-title{flex:1}
.t-expand{background:var(--surface);border:1px solid var(--border);color:var(--accent);min-width:30px;height:26px;border-radius:6px;font-size:14px;flex-shrink:0;line-height:1;font-weight:700}
.t-expand:active{background:var(--accent);color:#000}
/* 詳情視窗 */
.detail-section{margin-bottom:14px}
.detail-label{font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
.move-quad-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.move-quad-btn{padding:10px;border-radius:9px;border:2px solid;background:var(--surface2);font-size:13px;font-weight:700}
.my-task-row{background:var(--surface2);border-radius:9px;padding:11px;margin-bottom:7px;cursor:pointer}
.my-task-row:active{background:var(--border)}
/* 獎勵三點數輸入 */
.reward-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.reward-item{display:flex;flex-direction:column;gap:4px}
.reward-lbl{font-size:12px;font-weight:700;text-align:center}
.reward-item input{text-align:center}
/* 個人中心點數卡 */
.pts-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.pts-card{border-radius:12px;padding:14px 6px;text-align:center;border:2px solid}
.pts-card .pv{font-size:26px;font-weight:800;line-height:1}
.pts-card .pl{font-size:12px;margin-top:5px;color:var(--text);opacity:.85}
.game-preview{background:var(--surface2);border:1px dashed var(--border);border-radius:12px;padding:18px;text-align:center;margin-top:16px;cursor:pointer}
/* ---------- 遊戲化：角色養成 ---------- */
.gp-card{margin-top:16px;border-radius:14px;padding:14px;cursor:pointer;position:relative;overflow:hidden;background:var(--surface2);border:1px solid var(--border)}
.gp-card .gp-glow{position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;filter:blur(30px);opacity:.35}
.gp-top{display:flex;align-items:center;gap:13px;position:relative;z-index:1}
.gp-ava{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;background:var(--surface);border:2px solid}
.gp-meta{flex:1;min-width:0}
.gp-rank{font-weight:800;font-size:16px;display:flex;align-items:center;gap:7px}
.gp-lvl{font-size:11px;font-weight:700;padding:1px 8px;border-radius:20px;color:#000}
.gp-power{font-size:12px;color:var(--muted);margin-top:2px}
.gp-arrow{color:var(--muted);font-size:20px;align-self:center}
.gp-bar{height:8px;border-radius:8px;background:var(--surface);margin-top:11px;overflow:hidden;position:relative;z-index:1}
.gp-bar>i{display:block;height:100%;border-radius:8px;transition:width .5s ease}
.gp-xptxt{font-size:11px;color:var(--muted);margin-top:5px;display:flex;justify-content:space-between;position:relative;z-index:1}
/* 角色養成中心 modal */
.gc-hero{text-align:center;padding:18px 10px 6px;border-radius:14px;position:relative;overflow:hidden;margin-bottom:16px}
.gc-hero .gc-glow{position:absolute;inset:0;opacity:.18}
.gc-ava{width:90px;height:90px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:50px;background:var(--surface);border:3px solid;position:relative;z-index:1}
.gc-rank{font-weight:900;font-size:22px;margin-top:12px;position:relative;z-index:1}
.gc-sub{font-size:13px;color:var(--muted);margin-top:3px;position:relative;z-index:1}
.gc-statrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0 4px;position:relative;z-index:1}
.gc-stat{background:var(--surface);border-radius:10px;padding:9px 4px}
.gc-stat b{font-size:18px;display:block}
.gc-stat span{font-size:11px;color:var(--muted)}
.gc-bar{height:10px;border-radius:8px;background:var(--surface);margin-top:14px;overflow:hidden;position:relative;z-index:1}
.gc-bar>i{display:block;height:100%;border-radius:8px}
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:10px}
.ach{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:11px 5px;text-align:center;position:relative}
.ach.locked{opacity:.4;filter:grayscale(1)}
.ach .ai{font-size:26px}
.ach .an{font-size:11px;font-weight:700;margin-top:4px}
.ach .ad{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3}
.ach .got{position:absolute;top:5px;right:6px;font-size:11px;color:var(--q3)}
.ach-bar{height:4px;border-radius:3px;background:var(--surface);margin:6px 3px 0;overflow:hidden}
.ach-bar>i{display:block;height:100%;background:var(--accent);opacity:.7}
.ach-prog{font-size:9px;color:var(--muted);margin-top:2px}
/* 成長曲線 */
.chart-wrap{margin-top:6px}
.chart-svg{width:100%;height:auto;display:block;background:var(--surface2);border:1px solid var(--border);border-radius:10px}
.chart-ax{fill:var(--muted);font-size:9px}
.chart-sum{font-size:12px;color:var(--muted);text-align:center;margin-top:8px}
.chart-empty{background:var(--surface2);border:1px dashed var(--border);border-radius:10px;padding:22px 12px;text-align:center;color:var(--muted);font-size:13px;margin-top:6px}
/* 升級儀式 */
.lvup-mask{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.72);animation:lvfade .3s ease;cursor:pointer}
.lvup-flash{position:absolute;inset:0;animation:lvflash .7s ease-out;pointer-events:none}
.lvup-card{position:relative;text-align:center;animation:lvpop .55s cubic-bezier(.2,1.5,.4,1)}
.lvup-ava{width:112px;height:112px;border-radius:50%;border:3px solid;display:flex;align-items:center;justify-content:center;margin:0 auto;background:var(--surface)}
.lvup-title{font-size:26px;font-weight:900;color:#fff;margin-top:14px;letter-spacing:2px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.lvup-lv{font-size:20px;font-weight:800;margin-top:4px}
.lvup-hint{font-size:12px;color:#cbd5e1;margin-top:12px;opacity:.85}
@keyframes lvfade{from{opacity:0}to{opacity:1}}
@keyframes lvflash{0%{opacity:0}28%{opacity:.85}100%{opacity:0}}
@keyframes lvpop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
/* ---------- v3 商店 / 寵物 ---------- */
.coin-pill{background:rgba(240,165,0,.15);color:var(--accent);border:1px solid var(--accent);border-radius:20px;padding:3px 11px;font-size:13px;font-weight:700;white-space:nowrap}
.coin-pill.big{font-size:14px;padding:6px 14px}
.gc-actionrow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:16px 0 4px}
.shop-open-btn{flex:1;background:linear-gradient(90deg,var(--accent),#f5b301);color:#1a1205;font-weight:800;border-radius:10px;padding:10px;font-size:14px}
.shop-open-btn:active{opacity:.85}
.gc-title-tag{font-size:12px;font-weight:600;color:var(--accent);margin-left:8px}
.pet-card{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px}
.pet-card.empty{justify-content:center;color:var(--muted);font-size:13px;border-style:dashed;cursor:pointer;text-align:center}
.pet-emoji{width:52px;text-align:center;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
.pet-info{flex:1;min-width:0}
.pet-name{font-weight:700;font-size:14px}
.pet-stage{font-size:11px;color:var(--accent);margin-left:7px;font-weight:600}
.pet-bar{height:7px;border-radius:7px;background:var(--surface);overflow:hidden;margin:6px 0 4px}
.pet-bar>i{display:block;height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);border-radius:7px;transition:width .4s}
.pet-exp{font-size:10px;color:var(--muted)}
.feed-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}

<div class="mode-flag" id="modeFlag"></div>

<script>
/* ===================================================================
   CONFIG —— 要改的設定都在這
   =================================================================== */
const CONFIG = {
  MODE: 'CLOUD',          // 'LOCAL'=資料存本機瀏覽器（測 UX 用）/ 'CLOUD'=存 Ragic（正式上線）
  STORAGE_KEY: 'usled_tasks_v1',
  IMGBB_KEY: '005bab566ba9d238607bc472d15deed6',   // 公司 usled.tw 圖床 key（任務照片）

  // 員工名單（跟線上打卡系統對應；之後改 Google 登入時用 email 比對）
  USERS: [
    { id:'u-chen',   name:'陳俊男', nick:'男', title:'經理', role:'supervisor', color:'#4fc3f7', email:'covernself@gmail.com' },
    { id:'u-chuang', name:'莊鈺萱', nick:'萱', title:'主管', role:'supervisor', color:'#ce93d8', email:'t8562ne@gmail.com' },
    { id:'u-yu',     name:'陳譽昇', nick:'昇', title:'助理', role:'employee',   color:'#f48fb1', email:'us104931@gmail.com' },
  ],

  // 四象限（艾森豪矩陣）
  QUADRANTS: [
    { id:'q1', title:'重要又緊急',   sub:'需要立刻處理', color:'#ef4444' },
    { id:'q2', title:'重要不緊急',   sub:'要有進度執行', color:'#f59e0b' },
    { id:'q3', title:'不重要但緊急', sub:'瑣事盡快處理', color:'#22c55e' },
    { id:'q4', title:'不重要不緊急', sub:'利用空閒執行', color:'#3b82f6' },
  ],

  // ===== Ragic 雲端設定（CLOUD 模式用）=====
  RAGIC: {
    WORKER: 'https://punch-clock-proxy.yspe-led.workers.dev',
    PATH: '/check-in-system/11',
    GOOGLE_CLIENT_ID: '948080912487-922lldt7pmi8qp26nfcij206apkd5f1v.apps.googleusercontent.com',
    // 欄位 ID（日期欄已確認，其餘連續推算，寫入測試後驗證）
    FIELDS: {
      title:1003055, quadrant:1003056, status:1003057, assignee:1003058, creator:1003059,
      due:1003060, points:1003061, earnedPoints:1003062, note:1003063, images:1003064,
      submittedAt:1003065, approvedAt:1003066, createdAt:1003067,
      contribution:1003070, favor:1003071
    },
    QUAD2RAGIC: { q1:'重要又緊急', q2:'重要不緊急', q3:'不重要但緊急', q4:'不重要不緊急' },
    STATUS2RAGIC: { open:'待處理', submitted:'待審核', done:'已完成' },
  },
};

/* ===================================================================
   STATE
   =================================================================== */
const STATE = { user:null, tasks:[], activeQuad:'q1' };

function userById(id){ return CONFIG.USERS.find(u=>u.id===id); }
function isSupervisor(u){ return u && (u.role==='admin'||u.role==='supervisor'); }

/* ===================================================================
   資料層（db）—— LOCAL 用 localStorage；CLOUD 預留 Ragic
   =================================================================== */
async function dbLoadTasks(){
  if(CONFIG.MODE==='CLOUD'){ return await ragicLoadTasks(); }
  const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
  if(!raw){ const seed = seedTasks(); localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(seed)); return seed; }
  try{ return JSON.parse(raw); }catch(e){ return []; }
}
function dbSaveTasks(tasks){
  if(CONFIG.MODE==='CLOUD') return;
  localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(tasks));
}
/* 單筆新增/更新：LOCAL 整批存 localStorage；CLOUD 寫 Ragic 並回填 ragicId */
async function dbUpsert(task){
  if(CONFIG.MODE==='CLOUD'){
    const res = await ragicSaveTask(task);
    if(res && res.ragicId && !task.ragicId){ task.ragicId = res.ragicId; task.id = 'r'+res.ragicId; }
    return res;
  }
  dbSaveTasks(STATE.tasks);
}
/* 刪除：CLOUD 走 Ragic DELETE */
async function dbDelete(task){
  if(CONFIG.MODE==='CLOUD'){
    if(task.ragicId){ try{ await ragicFetch('/'+task.ragicId+'?api', { method:'DELETE' }); }catch(e){} }
    return;
  }
  dbSaveTasks(STATE.tasks);
}

/* === CLOUD 模式：Ragic 對應 + 讀寫（透過 punch-clock-proxy）=== */
function quadFromRagic(v){ for(const k in CONFIG.RAGIC.QUAD2RAGIC) if(CONFIG.RAGIC.QUAD2RAGIC[k]===v) return k; return 'q4'; }
function statusFromRagic(v){ for(const k in CONFIG.RAGIC.STATUS2RAGIC) if(CONFIG.RAGIC.STATUS2RAGIC[k]===v) return k; return 'open'; }
function isoToRagic(iso){ if(!iso) return ''; const d=new Date(iso); const p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes()); }
function ragicToIso(s){ if(!s) return null; const d=new Date(String(s).replace(/\//g,'-').replace(' ','T')); return isNaN(d)?null:d.toISOString(); }
function emailToUserId(email){ const u=CONFIG.USERS.find(x=>x.email===email); return u?u.id:(email||''); }
function parseImages(s){ if(!s) return []; return String(s).split('\n').filter(x=>x.trim()).map(u=>({type:/\.(mp4|mov|webm)/i.test(u)?'video':'image', src:u.trim()})); }

async function ragicFetch(suffix, opts){
  const url = CONFIG.RAGIC.WORKER + CONFIG.RAGIC.PATH + suffix;
  const headers = Object.assign({ 'X-Google-Token': STATE.googleToken||'' }, (opts&&opts.headers)||{});
  return await fetch(url, Object.assign({}, opts, { headers }));
}

async function ragicLoadTasks(){
  const r = await ragicFetch('?api', { method:'GET' });
  const json = await r.json();
  const tasks = [];
  Object.keys(json).forEach(k=>{
    const rec = json[k]; if(!rec || typeof rec!=='object' || !rec._ragicId) return;
    tasks.push({
      id:'r'+rec._ragicId, ragicId: rec._ragicId,
      title: rec['任務主題']||'', quadrant: quadFromRagic(rec['象限']), status: statusFromRagic(rec['狀態']),
      assigneeId: emailToUserId(rec['指派給']), createdById: emailToUserId(rec['建立人']),
      dueAt: ragicToIso(rec['截止時間']), points: parseInt(rec['點數'])||0,
      earnedPoints: rec['實得點數']? parseInt(rec['實得點數']) : null,
      contribution: parseInt(rec['貢獻值'])||0, favor: parseInt(rec['人情點'])||0,
      note: rec['備註步驟']||'', images: parseImages(rec['圖片網址']),
      submittedAt: ragicToIso(rec['提交時間']), approvedAt: ragicToIso(rec['核准時間']), createdAt: ragicToIso(rec['建立時間'])
    });
  });
  return tasks;
}

async function ragicSaveTask(t){
  const F = CONFIG.RAGIC.FIELDS, fd = new FormData();
  fd.append(F.title, t.title||'');
  fd.append(F.quadrant, CONFIG.RAGIC.QUAD2RAGIC[t.quadrant]||'');
  fd.append(F.status, CONFIG.RAGIC.STATUS2RAGIC[t.status]||'待處理');
  fd.append(F.assignee, (userById(t.assigneeId)||{}).email || t.assigneeId || '');
  fd.append(F.creator, (userById(t.createdById)||{}).email || '');
  if(t.dueAt) fd.append(F.due, isoToRagic(t.dueAt));
  fd.append(F.points, String(t.points||0));
  if(t.earnedPoints!=null) fd.append(F.earnedPoints, String(t.earnedPoints));
  fd.append(F.contribution, String(t.contribution||0));
  fd.append(F.favor, String(t.favor||0));
  fd.append(F.note, t.note||'');
  fd.append(F.images, (t.images||[]).map(m=>typeof m==='string'?m:m.src).filter(s=>/^https?:/.test(s)).join('\n'));
  if(t.submittedAt) fd.append(F.submittedAt, isoToRagic(t.submittedAt));
  if(t.approvedAt) fd.append(F.approvedAt, isoToRagic(t.approvedAt));
  if(t.createdAt) fd.append(F.createdAt, isoToRagic(t.createdAt));
  const suffix = t.ragicId ? ('/'+t.ragicId+'?api') : '?api';
  const r = await ragicFetch(suffix, { method:'POST', body:fd });
  return await r.json();
}

/* 示範任務（LED 公司情境，第一次開自動帶幾筆，讓你看到四象限長怎樣） */
function seedTasks(){
  const now = Date.now();
  const iso = (h)=> new Date(now + h*3600000).toISOString();
  return [
    { id:'t1', title:'GR-1003 客戶樣品色溫超標 0.3，需重新打樣', quadrant:'q1', status:'open', assigneeId:'u-huang', dueAt:iso(6),  points:50, images:[], createdById:'u-chen', createdAt:iso(-24) },
    { id:'t2', title:'產線 LD-3 散熱片溫度異常，現場確認', quadrant:'q1', status:'open', assigneeId:'u-huang', dueAt:iso(3),  points:80, images:[], createdById:'u-chen', createdAt:iso(-3) },
    { id:'t3', title:'Q3 RGB+W 五合一新品打樣里程碑', quadrant:'q2', status:'open', assigneeId:'u-huang', dueAt:iso(720), points:200, images:[], createdById:'u-jason', createdAt:iso(-168) },

/* ===================================================================
   左滑快捷（淘寶式）：左滑露出 接單/提交；點卡片進詳情
   =================================================================== */
let swipeCtx=null, lastSwipeEnd=0;
function initSwipe(){
  const board=document.getElementById('board');
  if(!board || board.__swipeInit) return; board.__swipeInit=true;
  board.addEventListener('touchstart', swipeStart, {passive:true});
  board.addEventListener('touchmove', swipeMove, {passive:false});
  board.addEventListener('touchend', swipeEnd);
  board.addEventListener('mousedown', swipeStart);
  board.addEventListener('mousemove', swipeMove);
  board.addEventListener('mouseup', swipeEnd);
}
function _pt(e){ return e.touches&&e.touches[0] ? e.touches[0] : (e.changedTouches&&e.changedTouches[0] ? e.changedTouches[0] : e); }
function swipeStart(e){
  const task=e.target.closest('.task'); if(!task) return;
  if(e.target.closest('.swipe-actions')) return;
  if(!task.parentElement.querySelector('.swipe-actions')) return; // 無快捷的卡片不滑
  const p=_pt(e);
  const startTx = task.classList.contains('swiped') ? -150 : 0;
  swipeCtx={ task, startX:p.clientX, startY:p.clientY, startTx, dx:startTx, moved:false };
  document.querySelectorAll('.task.swiped').forEach(t=>{ if(t!==task){ t.style.transform=''; t.classList.remove('swiped'); } });
}
function swipeMove(e){
  if(!swipeCtx) return;
  const p=_pt(e); const dx=p.clientX-swipeCtx.startX, dy=p.clientY-swipeCtx.startY;
  if(!swipeCtx.moved && Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>8) swipeCtx.moved=true;
  if(swipeCtx.moved){
    if(e.cancelable) e.preventDefault();
    swipeCtx.dx = Math.max(-150, Math.min(0, swipeCtx.startTx+dx));
    swipeCtx.task.style.transform='translateX('+swipeCtx.dx+'px)';
  }
}
function swipeEnd(){
  if(!swipeCtx) return;
  if(swipeCtx.moved){
    lastSwipeEnd=Date.now();
    if(swipeCtx.dx < -60){ swipeCtx.task.style.transform='translateX(-150px)'; swipeCtx.task.classList.add('swiped'); }
    else { swipeCtx.task.style.transform=''; swipeCtx.task.classList.remove('swiped'); }
  }
  swipeCtx=null;
}
function taskCardClick(e, id){
  if(Date.now()-lastSwipeEnd < 300) return;   // 剛滑完，不觸發詳情
  const task=e.currentTarget;
  if(task.classList.contains('swiped')){ task.style.transform=''; task.classList.remove('swiped'); return; }
  showTaskDetail(id);
}
function acceptTask(id){
  const t=STATE.tasks.find(x=>x.id===id); if(!t) return;
  t.assigneeId=STATE.user.id; renderBoard(); dbUpsert(t); toast('已接單，開始處理！');
}

function renderTaskCard(t){
  const a = userById(t.assigneeId);
  const sup = isSupervisor(STATE.user);
  const mine = STATE.user.id === t.assigneeId;
  const tl = (t.status!=='done') ? timeLeft(t.dueAt) : null;
  const stMap = {open:['待處理','st-open'], submitted:['待審核','st-submitted'], done:['已完成','st-done']};
  const st = stMap[t.status]||stMap.open;
  const media = (t.images||[]).slice(0,3);
  const thumbs = media.length? `<div class="task-thumbs">${media.map((m,i)=>{ const src=typeof m==='string'?m:m.src; const isVid=typeof m==='object'&&m.type==='video'; return isVid?`<video src="${src}" muted onclick="event.stopPropagation();showMedia('${t.id}',${i})"></video>`:`<img src="${src}" onclick="event.stopPropagation();showMedia('${t.id}',${i})">`; }).join('')}</div>`:'';
  // 左滑快捷鈕（淘寶式）
  let swipe='';
  if(t.status!=='done'){
    if(sup){
      swipe += `<button class="swipe-btn edit" onclick="event.stopPropagation();openTaskModal('${t.id}')">編輯</button>`;
      if(t.status==='submitted') swipe += `<button class="swipe-btn submit" onclick="event.stopPropagation();approveTask('${t.id}')">核准</button>`;
    } else {
      if(!mine) swipe += `<button class="swipe-btn accept" onclick="event.stopPropagation();acceptTask('${t.id}')">接單</button>`;
      if(t.status==='open') swipe += `<button class="swipe-btn submit" onclick="event.stopPropagation();submitTask('${t.id}')">提交</button>`;
    }
  }
  return `<div class="swipe-row">
    ${swipe?`<div class="swipe-actions">${swipe}</div>`:''}
    <div class="task ${t.status==='done'?'done':''}" data-tid="${t.id}" onclick="taskCardClick(event,'${t.id}')" style="border-left-color:${t.status==='done'?'#22c55e':CONFIG.QUADRANTS.find(q=>q.id===t.quadrant).color}">
      <div class="task-body">
        <div class="task-main">
          <div class="t-title">${esc(t.title)}</div>
          <div class="t-meta">
            <span class="status-badge ${st[1]}">${st[0]}</span>
            ${a?`<span class="mini-avatar" style="background:${a.color}" title="${a.name}">${a.name.slice(-1)}</span>`:''}
            ${tl?`<span class="${tl.urgent?'t-countdown':''}">⏰ ${tl.text}</span>`:''}
            ${swipe?'<span class="t-expand-hint">◀ 滑動</span>':'<span class="t-expand-hint">詳情 ▾</span>'}
          </div>
        </div>
        ${thumbs}
      </div>
    </div>
  </div>`;
}

function toggleCat(which){
  if(which==='important') modalImportant=!modalImportant; else modalUrgent=!modalUrgent;
  const ci=document.getElementById('catImp'), cu=document.getElementById('catUrg');
  if(ci) ci.classList.toggle('on', modalImportant);
  if(cu) cu.classList.toggle('on', modalUrgent);
  renderDueQuick();
  if(which==='urgent' && modalUrgent) setDueQuick('1h');
}
function computeQuad(){ return modalImportant ? (modalUrgent?'q1':'q2') : (modalUrgent?'q3':'q4'); }
function renderDueQuick(){
  const box=document.getElementById('dueQuick'); if(!box)return;
  const opts = modalUrgent
    ? [['1h','1小時內'],['2h','2小時內'],['today','下班前'],['tmr','明天完成']]
    : [['day2','後天完成'],['week','當週完成'],['nextweek','下週完成'],['none','不限時間']];
  box.innerHTML = opts.map(o=>`<button type="button" data-k="${o[0]}" onclick="setDueQuick('${o[0]}')">${o[1]}</button>`).join('');
}
function setDueQuick(spec){
  const now = new Date();
  const at18 = (base)=>{ const x=new Date(base); x.setHours(18,0,0,0); return x; };
  let d=null;
  if(spec==='1h') d = new Date(now.getTime()+3600000);
  else if(spec==='2h') d = new Date(now.getTime()+2*3600000);
  else if(spec==='today'){ d = at18(now); if(d<=now){ const t=new Date(now); t.setDate(t.getDate()+1); d=at18(t); } }
  else if(spec==='tmr'){ const t=new Date(now); t.setDate(t.getDate()+1); d=at18(t); }
  else if(spec==='day2'){ const t=new Date(now); t.setDate(t.getDate()+2); d=at18(t); }
  else if(spec==='week'){ const t=new Date(now); const add=(7-t.getDay())%7; t.setDate(t.getDate()+add); d=at18(t); }
  else if(spec==='nextweek'){ const t=new Date(now); const add=(7-t.getDay())%7+7; t.setDate(t.getDate()+add); d=at18(t); }
  else if(spec==='none'){ d=null; }
  const inp = document.getElementById('f_due'); if(inp) inp.value = d? toLocalInput(d.toISOString()):'';
  document.querySelectorAll('#dueQuick button').forEach(b=>b.classList.toggle('sel', b.dataset.k===spec));
}
function onPickMedia(e){
  const file = e.target.files[0]; if(!file) return;
  if(modalImages.length>=3){ toast('最多 3 個'); e.target.value=''; return; }
  const isVideo = file.type.startsWith('video/');
  if(isVideo && CONFIG.MODE==='CLOUD'){ toast('影片暫不支援雲端，請改拍照'); e.target.value=''; return; }
  const reader = new FileReader();
  reader.onload = ()=>{
    if(isVideo){ modalImages.push({type:'video',src:reader.result}); renderModalImages(); return; }
    compressImage(reader.result, 1200, async (small)=>{
      if(CONFIG.MODE==='CLOUD'){
        toast('上傳照片中…');
        try{ const url = await uploadToImgbb(small); modalImages.push({type:'image',src:url}); renderModalImages(); toast('照片已上傳 ✓'); }
        catch(err){ toast('上傳失敗：'+err.message); }
      } else { modalImages.push({type:'image',src:small}); renderModalImages(); }
    });
  };
  reader.readAsDataURL(file);
  e.target.value='';
}
async function uploadToImgbb(dataUrl){
  const base64 = dataUrl.split(',')[1];
  const fd = new FormData(); fd.append('image', base64);
  const r = await fetch('https://api.imgbb.com/1/upload?key='+CONFIG.IMGBB_KEY, { method:'POST', body:fd });
  const j = await r.json();
  if(!j || !j.success) throw new Error((j&&j.error&&j.error.message)||'ImgBB 失敗');
  return j.data.url;
}
function renderModalImages(){
  const box=document.getElementById('imgPreview'); if(!box)return;
  box.innerHTML = modalImages.map((m,i)=>{ const src=typeof m==='string'?m:m.src; const isVid=typeof m==='object'&&m.type==='video'; return `<div class="wrap">${isVid?`<video src="${src}" muted></video>`:`<img src="${src}">`}<div class="del" onclick="modalImages.splice(${i},1);renderModalImages()">×</div></div>`; }).join('');

function showTaskDetail(id){
  const t=STATE.tasks.find(x=>x.id===id); if(!t)return;
  const a=userById(t.assigneeId);
  const q=CONFIG.QUADRANTS.find(x=>x.id===t.quadrant);
  const sup=isSupervisor(STATE.user);
  const mine=STATE.user.id===t.assigneeId;
  const tl=t.status!=='done'?timeLeft(t.dueAt):null;
  const ep=effectivePoints(t);
  const media=(t.images||[]);
  const stMap={open:'待處理',submitted:'待主管審核',done:'已完成'};
  let actions='';
  if(t.status==='open'&&mine) actions+=`<button class="btn-primary" onclick="submitTask('${t.id}');closeDetail()">✓ 我完成了</button>`;
  if(t.status==='submitted'&&sup) actions+=`<button class="btn-good" onclick="approveTask('${t.id}');closeDetail()">核准</button><button class="btn-warn" onclick="rejectTask('${t.id}');closeDetail()">退回</button>`;

/* ===================================================================
   遊戲化：角色養成（全部從三點數即時衍生，零新增儲存、自動跨裝置）
   經驗值 = T點 + 貢獻值；戰力 = T點 + 貢獻值×2 + 人情點
   =================================================================== */
const RANKS = [
  { min:1,  name:'見習生',   icon:'🐣', color:'#9ca3af' },
  { min:5,  name:'正式員工', icon:'🧑‍💼', color:'#60a5fa' },
  { min:10, name:'資深老手', icon:'💪', color:'#22c55e' },
  { min:20, name:'任務達人', icon:'🔥', color:'#f59e0b' },
  { min:35, name:'部門菁英', icon:'🌟', color:'#a855f7' },
  { min:50, name:'譽昇傳奇', icon:'👑', color:'#f0a500' },
];
function levelInfo(xp){
  let lvl=1, acc=0, need=30;
  while(xp >= acc+need && lvl<99){ acc+=need; lvl++; need=30+(lvl-1)*20; }
  return { level:lvl, into:xp-acc, span:need, total:xp };
}
function rankOf(level){ let r=RANKS[0]; for(const x of RANKS){ if(level>=x.min) r=x; } return r; }
function gameStats(sumPts,sumCon,sumFav){
  const xp = sumPts + sumCon;
  const li = levelInfo(xp);
  const rank = rankOf(li.level);
  const power = sumPts + sumCon*2 + sumFav;
  return { ...li, rank, power };
}
function achievements(done,sumPts,sumCon,sumFav){
  const cnt=done.length;
  const q1=done.filter(t=>t.quadrant==='q1').length;
  const quads=new Set(done.map(t=>t.quadrant)).size;
  const onTime=done.filter(t=>t.dueAt && (t.earnedPoints==null || t.earnedPoints>=(t.points||0))).length;
  const g=gameStats(sumPts,sumCon,sumFav);
  const byMonth={}; done.forEach(t=>{const d=t.approvedAt||t.submittedAt||t.createdAt; if(d){const k=d.slice(0,7); byMonth[k]=(byMonth[k]||0)+1;}});
  const maxMonth=Object.values(byMonth).reduce((m,v)=>Math.max(m,v),0);
  const A=(name,desc,icon,cur,max)=>({name,desc,icon,cur:Math.min(cur,max),max,got:cur>=max});
  return [
    A('初試啼聲','完成 1 個任務','🌱',cnt,1),
    A('十項全能','完成 10 個任務','🎯',cnt,10),
    A('任務狂人','完成 50 個任務','🏆',cnt,50),
    A('百點達標','累積 100 T 點','💯',sumPts,100),
    A('千點俱樂部','累積 1000 T 點','👑',sumPts,1000),
    A('急先鋒','完成 5 個重要又緊急','⚡',q1,5),
    A('面面俱到','四象限都完成過','🧭',quads,4),
    A('神速使者','準時零打折 5 次','🚀',onTime,5),
    A('月度勤奮','單月完成 15 件','📅',maxMonth,15),
    A('貢獻之星','貢獻值達 50','💎',sumCon,50),
    A('人情練達','人情點達 20','🤝',sumFav,20),
    A('升階達人','角色等級達 Lv.10','📈',g.level,10),
    A('全能戰士','戰力達 500','🛡️',g.power,500),
  ];
}

/* 成長曲線：累積點數 vs 時間（inline SVG，純衍生） */
function growthChartSvg(done){
  const pts=done.map(t=>({d:t.approvedAt||t.submittedAt||t.createdAt, p:(t.earnedPoints!=null?t.earnedPoints:(t.points||0))}))
    .filter(x=>x.d).map(x=>({t:new Date(x.d).getTime(),p:x.p})).filter(x=>!isNaN(x.t)).sort((a,b)=>a.t-b.t);
  if(pts.length<2) return `<div class="chart-empty">完成 2 個以上任務，這裡就會長出你的成長曲線 📈</div>`;
  let cum=0; const series=pts.map(x=>({t:x.t,c:(cum+=x.p)}));
  const t0=series[0].t, t1=series[series.length-1].t, span=Math.max(1,t1-t0), maxC=series[series.length-1].c||1;
  const W=320,H=150,pL=8,pR=10,pT=14,pB=20;
  const X=t=>(pL+(t-t0)/span*(W-pL-pR)), Y=c=>(H-pB-(c/maxC)*(H-pT-pB));
  const line=series.map((s,i)=>(i?'L':'M')+X(s.t).toFixed(1)+' '+Y(s.c).toFixed(1)).join(' ');
  const area=line+` L ${X(t1).toFixed(1)} ${H-pB} L ${X(t0).toFixed(1)} ${H-pB} Z`;
  const fmt=ts=>{const d=new Date(ts);return (d.getMonth()+1)+'/'+d.getDate();};
  const d30=Date.now()-30*86400000, recent=pts.filter(p=>p.t>=d30);
  const rCnt=recent.length, rPts=recent.reduce((s,p)=>s+p.p,0);
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" class="chart-svg" preserveAspectRatio="none">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity=".35"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#cg)"/>
    <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${series.map(s=>`<circle cx="${X(s.t).toFixed(1)}" cy="${Y(s.c).toFixed(1)}" r="2.3" fill="var(--accent)"/>`).join('')}
    <text x="${pL}" y="${H-6}" class="chart-ax">${fmt(t0)}</text>
    <text x="${W-pR}" y="${H-6}" class="chart-ax" text-anchor="end">${fmt(t1)}</text>
    <text x="${W-pR}" y="${pT}" class="chart-ax" text-anchor="end">累積 ${maxC} 點</text>
  </svg><div class="chart-sum">近 30 天完成 <b>${rCnt}</b> 件 · 賺 <b>${rPts}</b> 點</div></div>`;
}

function buildQuizOrder(){
  const sh=a=>{ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;} return a; };
  const wrong=(GS.quizWrong||[]).filter(i=>i<QUIZ.length), wset=new Set(wrong), sset=new Set(GS.quizSeen||[]);
  const all=QUIZ.map((_,i)=>i);
  const unseen=all.filter(i=>!sset.has(i)&&!wset.has(i));
  const rest=all.filter(i=>sset.has(i)&&!wset.has(i));
  return [...sh(wrong.slice()), ...sh(unseen), ...sh(rest)];
}

}

function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function timeLeft(iso){
  if(!iso) return null;
  const diff = new Date(iso).getTime() - Date.now();
  if(diff < 0){ const h=Math.ceil(-diff/3600000); return {text: h<24?('逾期 '+h+' 小時'):('逾期 '+Math.ceil(h/24)+' 天'), urgent:true}; }
  const h = diff/3600000;
  if(h < 1) return {text:'剩 '+Math.max(1,Math.ceil(diff/60000))+' 分', urgent:true};
  if(h < 24) return {text:'剩 '+Math.floor(h)+' 小時', urgent:true};
  const d=Math.floor(h/24); if(d<7) return {text:d+' 天後', urgent:false};
  const dt=new Date(iso); return {text:(dt.getMonth()+1)+'/'+dt.getDate(), urgent:false};
}
/* 逾期點數打折：每逾期 2 小時 ×0.9 累計，直到 0 */
function effectivePoints(t){
  if(!t.points || !t.dueAt) return t.points||0;
  const overH = (Date.now() - new Date(t.dueAt).getTime())/3600000;
  if(overH <= 0) return t.points;
  const steps = Math.ceil(overH/2);
  return Math.max(0, Math.round(t.points * Math.pow(0.9, steps)));
}
function pointsHtml(t){
  if(!t.points) return '';
  if(t.status==='done') return `<span>＋${t.earnedPoints!=null?t.earnedPoints:t.points} 點</span>`;
  const ep=effectivePoints(t);
  if(ep<t.points) return `<span style="color:var(--q1);font-weight:600">＋${ep} 點 <span style="text-decoration:line-through;opacity:.5;font-weight:400">${t.points}</span></span>`;
  return `<span>＋${t.points} 點</span>`;
}
function fmtDue(iso){ const d=new Date(iso),now=new Date(); const diff=d-now; const day=Math.round(diff/86400000);
  if(diff<0) return '已逾期'; if(day===0){ const h=Math.round(diff/3600000); return h<=1?'1 小時內':h+' 小時內'; } if(day===1)return '明天'; if(day<7)return day+' 天後'; return (d.getMonth()+1)+'/'+d.getDate(); }
function toLocalInput(iso){ const d=new Date(iso); const p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes()); }

   長按拖曳：把任務拖到其他象限改分類（主管限定）
   =================================================================== */
let dragCtx = null;
function initDrag(){
  const board = document.getElementById('board');
  if(!board || board.__dragInit) return; board.__dragInit=true;
  board.addEventListener('mousedown', dragStart);
  board.addEventListener('touchstart', dragStart, {passive:false});
  document.addEventListener('mousemove', dragMove, {passive:false});
  document.addEventListener('touchmove', dragMove, {passive:false});
  document.addEventListener('mouseup', dragEnd);
  document.addEventListener('touchend', dragEnd);
}
function dragStart(e){
  if(!isSupervisor(STATE.user)) return;
  const taskEl = e.target.closest('.task'); if(!taskEl) return;
  if(e.target.closest('button') || e.target.closest('.task-thumbs')) return;
  const pt = e.touches? e.touches[0] : e;
  dragCtx = { tid:taskEl.dataset.tid, taskEl, startX:pt.clientX, startY:pt.clientY, timer:null, active:false, ghost:null };
  dragCtx.timer = setTimeout(dragActivate, 380);
}
function dragActivate(){
  if(!dragCtx) return;
  dragCtx.active = true;
  if(navigator.vibrate) navigator.vibrate(30);
  const el = dragCtx.taskEl;
  const g = el.cloneNode(true);
  g.style.cssText = 'position:fixed;z-index:500;width:'+el.offsetWidth+'px;opacity:.92;pointer-events:none;transform:scale(1.04);box-shadow:0 10px 32px rgba(0,0,0,.7);border:2px solid var(--accent)';
  document.body.appendChild(g); dragCtx.ghost = g;
  el.style.opacity = '.3';
  toast('拖到其他象限改分類');
}
function dragMove(e){
  if(!dragCtx) return;
  const pt = e.touches? e.touches[0] : e;
  if(!dragCtx.active){
    if(Math.abs(pt.clientX-dragCtx.startX)>12 || Math.abs(pt.clientY-dragCtx.startY)>12) clearTimeout(dragCtx.timer);
    return;
  }
  e.preventDefault();
  dragCtx.ghost.style.left = (pt.clientX - dragCtx.ghost.offsetWidth/2)+'px';
  dragCtx.ghost.style.top = (pt.clientY - 24)+'px';
  document.querySelectorAll('.quadrant').forEach(q=>q.style.outline='');
  const under = quadrantAt(pt.clientX, pt.clientY);
  if(under) under.style.outline='3px solid var(--accent)';
}
function quadrantAt(x,y){
  const els = document.elementsFromPoint(x,y);
  for(const el of els){ const q = el.closest && el.closest('.quadrant'); if(q) return q; }
  return null;
}
function dragEnd(e){
  if(!dragCtx) return;
  clearTimeout(dragCtx.timer);
  if(dragCtx.active){
    const pt = e.changedTouches? e.changedTouches[0] : e;
    const q = quadrantAt(pt.clientX, pt.clientY);
    if(q && q.dataset.qid){
      const t = STATE.tasks.find(x=>x.id===dragCtx.tid);
      if(t && t.quadrant!==q.dataset.qid){ t.quadrant=q.dataset.qid; dbUpsert(t); toast('已移到「'+CONFIG.QUADRANTS.find(x=>x.id===q.dataset.qid).title+'」'); }
    }
    if(dragCtx.ghost) dragCtx.ghost.remove();
    document.querySelectorAll('.quadrant').forEach(q=>q.style.outline='');
    renderBoard();
  }
  dragCtx = null;
}

async function loadGcalToday(){
  if(!STATE.gcalToken) return;
  const s=new Date(); s.setHours(0,0,0,0); const e=new Date(); e.setHours(23,59,59,999);
  const url='https://www.googleapis.com/calendar/v3/calendars/primary/events?singleEvents=true&orderBy=startTime&timeMin='+encodeURIComponent(s.toISOString())+'&timeMax='+encodeURIComponent(e.toISOString());
  try{
    const r=await fetch(url,{headers:{Authorization:'Bearer '+STATE.gcalToken}});
    if(r.status===401){ STATE.gcalToken=null; connectGcal(false); return; }
    if(!r.ok){ STATE.gcalErr=r.status; STATE.gcalEvents=null; renderGcalBanner(); return; }
    const j=await r.json();
    STATE.gcalEvents=(j.items||[]).map(x=>({title:x.summary||'(無標題)', start:x.start&&(x.start.dateTime||x.start.date), allDay:!(x.start&&x.start.dateTime)}));
    STATE.gcalErr=null; renderGcalBanner();
  }catch(err){}
}
function gcalTime(iso){ if(!iso) return ''; const d=new Date(iso); const p=n=>String(n).padStart(2,'0'); return p(d.getHours())+':'+p(d.getMinutes()); }
function renderGcalBanner(){
  const el=document.getElementById('gcalBanner'); if(!el) return;
  if(!STATE.gcalToken){ el.innerHTML=`<button class="gcal-connect" onclick="connectGcal(true)">📅 連結 Google 日曆 · 看今日行程</button>`; return; }
  if(STATE.gcalErr){ el.innerHTML=`<div class="gcal-bar err">📅 讀日曆失敗（${STATE.gcalErr}）— 若是 403 多半 Calendar API 未啟用；<a onclick="connectGcal(true)" style="cursor:pointer;text-decoration:underline">重試</a></div>`; return; }
  const evs=STATE.gcalEvents||[];
  if(!evs.length){ el.innerHTML=`<div class="gcal-bar empty">📅 今天沒有行程</div>`; return; }
  el.innerHTML=`<div class="gcal-bar"><span class="gcal-label">📅 今日</span>${evs.map(e=>`<span class="gcal-ev"><b>${e.allDay?'整天':gcalTime(e.start)}</b> ${esc(e.title)}</span>`).join('')}</div>`;
}

// 每分鐘自動更新倒數 + 檢查逾期
setInterval(()=>{ if(STATE.user && !document.getElementById('appView').classList.contains('hidden')){ renderBoard(); checkOverdue(); } }, 60000);
setInterval(()=>{ if(STATE.user && STATE.gcalToken && !document.getElementById('appView').classList.contains('hidden')) loadGcalToday(); }, 180000);   // Google 日曆每 3 分鐘刷新
// 記住上次登入身份（方便 demo）
const last = localStorage.getItem('usled_last_user');
if(last && userById(last)) login(last);
</script>
