<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="robots" content="noindex">
<title>USLED 題庫彙整 · 副本闖關</title>
<style>
:root{
  --bg:#11151c; --card:#1b2230; --card2:#212a3b; --line:#2c3850;
  --txt:#e7edf6; --muted:#8a98ad; --accent:#7c5cff; --accent2:#22c55e;
  --warn:#f59e0b; --bad:#ef4444; --chip:#283349;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--txt);font:15px/1.6 -apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;padding-bottom:90px}
header{position:sticky;top:0;z-index:30;background:rgba(17,21,28,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 14px}
h1{font-size:18px;margin:0 0 2px}
.sub{color:var(--muted);font-size:12.5px}
.bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px}
.search{flex:1;min-width:160px;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:8px 12px;font-size:14px}
.btn{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer;white-space:nowrap}
.btn:hover{border-color:var(--accent)}
.btn.go{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.btn.warn{color:var(--warn)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{background:var(--chip);border:1px solid var(--line);color:var(--muted);border-radius:20px;padding:5px 12px;font-size:12.5px;cursor:pointer;user-select:none}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip b{color:inherit;opacity:.7;font-weight:600;margin-left:4px}
.legend{margin:10px 14px 0;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:12.5px;color:var(--muted)}
.legend b{color:var(--txt)}
.wrap{padding:6px 12px}
.secthead{display:flex;align-items:center;gap:8px;margin:18px 2px 8px;font-size:15px;font-weight:800}
.secthead .n{color:var(--muted);font-weight:600;font-size:12.5px}
.secthead .selbtns{margin-left:auto;display:flex;gap:6px}
.secthead .mini{font-size:11.5px;color:var(--muted);background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:3px 8px;cursor:pointer}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.card.off{opacity:.42}
.cb{width:22px;height:22px;flex:0 0 auto;margin-top:2px;accent-color:var(--accent2);cursor:pointer}
.body{flex:1;min-width:0}
.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:5px}
.tag{font-size:11px;border-radius:6px;padding:1px 7px;border:1px solid var(--line);color:var(--muted)}
.tag.new{color:var(--accent2);border-color:#2c5}
.tag.old{color:var(--warn);border-color:#a70}
.tag.lv{color:var(--accent)}
.catsel{font-size:11px;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:2px 4px}
.q{font-weight:600;outline:none;border-radius:6px;padding:1px 2px}
.q:focus{background:#0d1118;box-shadow:0 0 0 1px var(--accent)}
.opts{margin-top:6px;display:grid;gap:4px}
.opt{display:flex;gap:8px;align-items:flex-start;font-size:13.5px;color:var(--muted);cursor:pointer;border-radius:6px;padding:2px 4px}
.opt .mk{flex:0 0 auto;width:18px;height:18px;border-radius:50%;border:1.5px solid var(--line);font-size:11px;display:flex;align-items:center;justify-content:center;margin-top:1px}
.opt.right{color:var(--accent2);font-weight:600}
.opt.right .mk{background:var(--accent2);border-color:var(--accent2);color:#06210f}
.opt .ot{outline:none;border-radius:4px;padding:0 2px;flex:1}
.opt .ot:focus{background:#0d1118;box-shadow:0 0 0 1px var(--accent)}
.del{color:var(--bad);background:none;border:none;font-size:12px;cursor:pointer;margin-top:4px}
footer{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(17,21,28,.97);border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:10px;align-items:center}
.count{font-size:14px}
.count b{color:var(--accent2);font-size:18px}
.spacer{flex:1}
.modal{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:16px}
.modal.on{display:flex}
.box{background:var(--card);border:1px solid var(--line);border-radius:14px;max-width:680px;width:100%;max-height:86vh;overflow:auto;padding:16px}
.box h3{margin:0 0 8px}
textarea{width:100%;min-height:240px;background:#0d1118;color:#cfe;border:1px solid var(--line);border-radius:10px;padding:10px;font:12px/1.5 ui-monospace,Menlo,Consolas,monospace}
.field{margin:8px 0}
.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:3px}
.field input,.field select{width:100%;background:#0d1118;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px}
.row4{display:grid;grid-template-columns:24px 1fr;gap:6px;align-items:center;margin:4px 0}
.note{font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>🎯 USLED 題庫彙整</h1>
  <div class="sub">勾選要用的題、可直接改字／改正解／改分類，最後按「匯出」把結果丟回給 Claude。修改會自動存在這台裝置。</div>
  <div class="bar">
    <input class="search" id="search" placeholder="🔍 搜尋題目或選項…">
    <button class="btn" id="toggleHide">只看已選</button>
    <button class="btn" id="addBtn">➕ 新增題</button>
    <button class="btn warn" id="resetBtn">重設</button>
  </div>
  <div class="chips" id="chips"></div>
</header>

<div class="legend" id="legend"></div>
<div class="wrap" id="list"></div>

<footer>
  <div class="count">已選 <b id="selN">0</b> / <span id="totN">0</span> 題</div>
  <div class="spacer"></div>
  <button class="btn go" id="exportBtn">📋 匯出給 Claude</button>
</footer>

<!-- 匯出 -->
<div class="modal" id="expModal">
  <div class="box">
    <h3>📋 匯出已選題目</h3>
    <div class="note">把下面整段複製貼回對話給 Claude，我就照這份寫進題庫。共 <b id="expN">0</b> 題。</div>
    <div style="margin:8px 0;display:flex;gap:8px">
      <button class="btn go" id="copyBtn">複製到剪貼簿</button>
      <button class="btn" id="closeExp">關閉</button>
    </div>
    <textarea id="expTxt" readonly></textarea>
  </div>
</div>

<!-- 新增 -->
<div class="modal" id="addModal">
  <div class="box">
    <h3>➕ 新增題目</h3>
    <div class="field"><label>分類</label><select id="aCat"></select></div>
    <div class="field"><label>題目</label><input id="aQ" placeholder="輸入題目"></div>
    <div class="note">四個選項，點左邊圓圈選正解：</div>
    <div id="aOpts"></div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn go" id="aSave">加入</button>
      <button class="btn" id="aCancel">取消</button>
    </div>
  </div>
</div>

const CATS = ['綜合','智力','工程','電學','組裝','業務','行政'];
const WHO = {
  '綜合':'全部人','智力':'全部人',
  '工程':'黃偉智、全看(你/陳譽昇)',
  '電學':'黃偉智、李尹蘋、全看',
  '組裝':'李尹蘋、全看',
  '業務':'莊鈺萱、全看',
  '行政':'李尹蘋、莊鈺萱、全看',
};

/* ================== 狀態 ================== */
const LS='usled_quiz_curation_v1';
let ST={sel:{},edit:{},added:[],hide:false,filter:'全部',q:''};
try{const s=JSON.parse(localStorage.getItem(LS));if(s)ST=Object.assign(ST,s);}catch(e){}
function save(){try{localStorage.setItem(LS,JSON.stringify(ST));}catch(e){}}

/* 建立全部題目(含 id) */
let ALL=[];
function buildAll(){
  ALL=[];let i=0;
  GROUPS.forEach(g=>{
    g.items.forEach(it=>{
      ALL.push({id:'q'+(i++),cat:g.cat,job:g.job,status:g.status,def:g.def,level:g.level||'',q:it[0],a:it[1].slice(),c:it[2],added:false});
    });
  });
  ST.added.forEach((it,k)=>{
    ALL.push({id:'a'+k,cat:it.cat,job:catJob(it.cat),status:'自訂',def:true,level:'',q:it.q,a:it.a.slice(),c:it.c,added:true});
  });
}
function catJob(c){return ({'綜合':'all','智力':'all','工程':'eng','電學':'eng,asm','組裝':'asm','業務':'sales','行政':'admin'})[c]||'all';}
function isSel(it){return (it.id in ST.sel)?ST.sel[it.id]:it.def;}
function cur(it){const e=ST.edit[it.id];if(!e)return it;return Object.assign({},it,e,{cat:e.cat||it.cat});}

/* ================== 渲染 ================== */
function render(){
  buildAll();
  // chips
  const chips=document.getElementById('chips');
  const cnt={};let tot=0,sel=0;
  ALL.forEach(it=>{const c=cur(it);cnt[c.cat]=(cnt[c.cat]||0)+1;tot++;if(isSel(it))sel++;});
  let ch='<span class="chip '+(ST.filter==='全部'?'on':'')+'" data-f="全部">全部<b>'+tot+'</b></span>';
  CATS.forEach(c=>{if(cnt[c])ch+='<span class="chip '+(ST.filter===c?'on':'')+'" data-f="'+c+'">'+c+'<b>'+cnt[c]+'</b></span>';});
  chips.innerHTML=ch;
  chips.querySelectorAll('.chip').forEach(el=>el.onclick=()=>{ST.filter=el.dataset.f;save();render();});
  document.getElementById('selN').textContent=sel;
  document.getElementById('totN').textContent=tot;
  document.getElementById('toggleHide').textContent=ST.hide?'顯示全部':'只看已選';
  // legend
  document.getElementById('legend').innerHTML='<b>誰會考到哪類：</b>'+CATS.map(c=>c+'＝'+WHO[c]).join('　·　')+'<br><span class="note">智力＋綜合人人都考；職務題只給對應的人（一人可多類，「全看」者全部都考）。</span>';
  // list
  const list=document.getElementById('list');list.innerHTML='';
  const q=(ST.q||'').trim();
  CATS.forEach(catName=>{
    const items=ALL.filter(it=>cur(it).cat===catName)
      .filter(it=>ST.filter==='全部'||ST.filter===catName)
      .filter(it=>!ST.hide||isSel(it))
      .filter(it=>{if(!q)return true;const c=cur(it);return (c.q+c.a.join('')).includes(q);});
    if(!items.length)return;
    const head=document.createElement('div');head.className='secthead';
    head.innerHTML='<span>'+catName+'</span><span class="n">('+items.length+'題 · '+WHO[catName]+')</span>'+
      '<span class="selbtns"><span class="mini" data-all="'+catName+'">全選</span><span class="mini" data-none="'+catName+'">全不選</span></span>';
    list.appendChild(head);
    head.querySelector('[data-all]').onclick=()=>{items.forEach(it=>ST.sel[it.id]=true);save();render();};
    head.querySelector('[data-none]').onclick=()=>{items.forEach(it=>ST.sel[it.id]=false);save();render();};
    items.forEach(it=>list.appendChild(card(it)));
  });
  if(!list.children.length)list.innerHTML='<p class="note" style="text-align:center;padding:30px">沒有符合的題目</p>';
}

function card(it){
  const c=cur(it);const on=isSel(it);
  const el=document.createElement('div');el.className='card'+(on?'':' off');
  const stTag = it.added?'<span class="tag lv">自訂</span>' : (it.status==='新擬'?'<span class="tag new">新擬</span>':'<span class="tag old">現有</span>');
  const lvTag = c.level?'<span class="tag lv">'+c.level+'</span>':'';
  let catOpts=CATS.map(x=>'<option'+(x===c.cat?' selected':'')+'>'+x+'</option>').join('');
  let opts='';
  c.a.forEach((o,i)=>{
    opts+='<div class="opt'+(i===c.c?' right':'')+'" data-opt="'+i+'"><span class="mk">'+(i===c.c?'✓':String.fromCharCode(65+i))+'</span><span class="ot" contenteditable="true" data-ot="'+i+'">'+esc(o)+'</span></div>';
  });
  el.innerHTML=
    '<input type="checkbox" class="cb" '+(on?'checked':'')+'>'+
    '<div class="body">'+
      '<div class="meta">'+stTag+lvTag+'<select class="catsel">'+catOpts+'</select>'+(it.added?'<button class="del">刪除</button>':'')+'</div>'+
      '<div class="q" contenteditable="true">'+esc(c.q)+'</div>'+
      '<div class="opts">'+opts+'</div>'+
    '</div>';
  // checkbox
  el.querySelector('.cb').onchange=e=>{ST.sel[it.id]=e.target.checked;save();el.classList.toggle('off',!e.target.checked);document.getElementById('selN').textContent=ALL.filter(x=>isSel(x)).length;};
  // category change
  el.querySelector('.catsel').onchange=e=>{ed(it).cat=e.target.value;save();render();};
  // question edit
  const qEl=el.querySelector('.q');
  qEl.onblur=()=>{ed(it).q=qEl.textContent.trim();save();};
  // option text edit
  el.querySelectorAll('.ot').forEach(o=>{o.onblur=()=>{const arr=(ST.edit[it.id]&&ST.edit[it.id].a)?ST.edit[it.id].a.slice():it.a.slice();arr[+o.dataset.ot]=o.textContent.trim();ed(it).a=arr;save();};});
  // set correct
  el.querySelectorAll('.opt').forEach(o=>{o.querySelector('.mk').onclick=()=>{ed(it).c=+o.dataset.opt;save();render();};});
  // delete (added)
  if(it.added){el.querySelector('.del').onclick=()=>{const k=+it.id.slice(1);ST.added.splice(k,1);// reindex sel/edit for added not tracked separately; simplest re-render
    save();render();};}
  return el;
}
function ed(it){if(!ST.edit[it.id])ST.edit[it.id]={};return ST.edit[it.id];}
function esc(s){return (s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ================== 工具列 ================== */
document.getElementById('search').oninput=e=>{ST.q=e.target.value;clearTimeout(window._t);window._t=setTimeout(()=>{save();render();},180);};
document.getElementById('toggleHide').onclick=()=>{ST.hide=!ST.hide;save();render();};
document.getElementById('resetBtn').onclick=()=>{if(confirm('確定清掉所有勾選與修改？(回到預設)')){ST={sel:{},edit:{},added:[],hide:false,filter:'全部',q:''};save();document.getElementById('search').value='';render();}};

/* 匯出 */
document.getElementById('exportBtn').onclick=()=>{
  buildAll();
  const out=ALL.filter(it=>isSel(it)).map(it=>{const c=cur(it);return {cat:c.cat,job:catJob(c.cat),q:c.q,a:c.a,c:c.c};});
  document.getElementById('expN').textContent=out.length;
  document.getElementById('expTxt').value='以下是我(Jason)選定的題庫，請寫進任務牆 QUIZ：\n\n'+JSON.stringify(out,null,1);
  document.getElementById('expModal').classList.add('on');
};
document.getElementById('closeExp').onclick=()=>document.getElementById('expModal').classList.remove('on');
document.getElementById('copyBtn').onclick=async()=>{const t=document.getElementById('expTxt');t.select();try{await navigator.clipboard.writeText(t.value);document.getElementById('copyBtn').textContent='已複製 ✓';}catch(e){document.execCommand('copy');document.getElementById('copyBtn').textContent='已複製 ✓';}setTimeout(()=>document.getElementById('copyBtn').textContent='複製到剪貼簿',1500);};

/* 新增題 */
const aCat=document.getElementById('aCat');aCat.innerHTML=CATS.map(c=>'<option>'+c+'</option>').join('');
const aOpts=document.getElementById('aOpts');
aOpts.innerHTML=[0,1,2,3].map(i=>'<div class="row4"><input type="radio" name="acorrect" value="'+i+'"'+(i===0?' checked':'')+'><input class="aopt" placeholder="選項 '+String.fromCharCode(65+i)+(i===0?'(預設正解)':'')+'"></div>').join('');
document.getElementById('addBtn').onclick=()=>document.getElementById('addModal').classList.add('on');
document.getElementById('aCancel').onclick=()=>document.getElementById('addModal').classList.remove('on');
document.getElementById('aSave').onclick=()=>{
  const q=document.getElementById('aQ').value.trim();
  const opts=[...document.querySelectorAll('.aopt')].map(x=>x.value.trim());
  const c=+document.querySelector('input[name=acorrect]:checked').value;
  if(!q||opts.some(o=>!o)){alert('請填完題目與四個選項');return;}
  ST.added.push({cat:aCat.value,q,a:opts,c});save();
  document.getElementById('aQ').value='';document.querySelectorAll('.aopt').forEach(x=>x.value='');
  document.getElementById('addModal').classList.remove('on');render();
};

render();
</script>
</body>
</html>
